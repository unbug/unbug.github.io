<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e2ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mambaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="memmambaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient2)"/>
  
  <!-- 标题 -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">记忆能力对比：Mamba vs MemMamba</text>
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666">在超长序列任务中的表现差异</text>
  
  <!-- 图表区域 -->
  <g transform="translate(100, 150)">
    <!-- 坐标轴 -->
    <line x1="0" y1="500" x2="1000" y2="500" stroke="#333" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="500" stroke="#333" stroke-width="3"/>
    
    <!-- Y轴标签 -->
    <text x="-50" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333" transform="rotate(-90, -50, 50)">记忆保留率 (%)</text>
    <text x="-50" y="250" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333" transform="rotate(-90, -50, 250)">50%</text>
    <text x="-50" y="500" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333" transform="rotate(-90, -50, 500)">0%</text>
    <text x="-50" y="0" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333" transform="rotate(-90, -50, 0)">100%</text>
    
    <!-- X轴标签 -->
    <text x="0" y="540" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">0</text>
    <text x="200" y="540" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">10K</text>
    <text x="400" y="540" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">20K</text>
    <text x="600" y="540" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">30K</text>
    <text x="800" y="540" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">40K</text>
    <text x="1000" y="540" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">60K</text>
    <text x="500" y="570" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#333">序列长度 (Token)</text>
    
    <!-- Mamba 曲线 - 指数衰减 -->
    <path d="M 0 50 L 200 150 L 400 300 L 600 450 L 800 480 L 1000 495" 
          fill="none" stroke="url(#mambaGradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Mamba 区域填充 -->
    <path d="M 0 50 L 200 150 L 400 300 L 600 450 L 800 480 L 1000 495 L 1000 500 L 0 500 Z" 
          fill="url(#mambaGradient)" opacity="0.2"/>
    
    <!-- MemMamba 曲线 - 稳定保持 -->
    <path d="M 0 50 L 200 70 L 400 80 L 600 85 L 800 90 L 1000 88" 
          fill="none" stroke="url(#memmambaGradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- MemMamba 区域填充 -->
    <path d="M 0 50 L 200 70 L 400 80 L 600 85 L 800 90 L 1000 88 L 1000 500 L 0 500 Z" 
          fill="url(#memmambaGradient)" opacity="0.2"/>
    
    <!-- 数据点 - Mamba -->
    <circle cx="0" cy="50" r="8" fill="url(#mambaGradient)" filter="url(#shadow2)"/>
    <circle cx="200" cy="150" r="8" fill="url(#mambaGradient)" filter="url(#shadow2)"/>
    <circle cx="400" cy="300" r="8" fill="url(#mambaGradient)" filter="url(#shadow2)"/>
    <circle cx="600" cy="450" r="8" fill="url(#mambaGradient)" filter="url(#shadow2)"/>
    <circle cx="800" cy="480" r="8" fill="url(#mambaGradient)" filter="url(#shadow2)"/>
    <circle cx="1000" cy="495" r="8" fill="url(#mambaGradient)" filter="url(#shadow2)"/>
    
    <!-- 数据点 - MemMamba -->
    <circle cx="0" cy="50" r="8" fill="url(#memmambaGradient)" filter="url(#shadow2)"/>
    <circle cx="200" cy="70" r="8" fill="url(#memmambaGradient)" filter="url(#shadow2)"/>
    <circle cx="400" cy="80" r="8" fill="url(#memmambaGradient)" filter="url(#shadow2)"/>
    <circle cx="600" cy="85" r="8" fill="url(#memmambaGradient)" filter="url(#shadow2)"/>
    <circle cx="800" cy="90" r="8" fill="url(#memmambaGradient)" filter="url(#shadow2)"/>
    <circle cx="1000" cy="88" r="8" fill="url(#memmambaGradient)" filter="url(#shadow2)"/>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(850, 180)">
    <rect x="0" y="0" width="250" height="120" rx="10" fill="white" filter="url(#shadow2)"/>
    
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">图例</text>
    
    <circle cx="30" cy="65" r="8" fill="url(#mambaGradient)"/>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="14" fill="#333">Mamba - 记忆衰减</text>
    
    <circle cx="30" cy="95" r="8" fill="url(#memmambaGradient)"/>
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">MemMamba - 记忆稳定</text>
  </g>
  
  <!-- 关键标注 -->
  <g transform="translate(650, 320)">
    <rect x="0" y="0" width="280" height="140" rx="10" fill="white" filter="url(#shadow2)"/>
    
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">关键差异</text>
    
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="14" fill="#333">• 60K Token 时：</text>
    <text x="40" y="90" font-family="Arial, sans-serif" font-size="13" fill="#ff6b6b">Mamba: 几乎完全遗忘</text>
    <text x="40" y="115" font-family="Arial, sans-serif" font-size="13" fill="#51cf66">MemMamba: 保留 90%+</text>
  </g>
</svg>
