<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#1e293b">
    HRM 分层推理架构
  </text>
  
  <!-- Brain icon -->
  <circle cx="150" cy="120" r="40" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#fff">🧠</text>
  
  <!-- H-module (高层模块) -->
  <rect x="250" y="180" width="700" height="120" rx="15" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">
    高层模块 (H-module)
  </text>
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#dbeafe">
    缓慢、抽象的规划 · 整体策略 · 全局视角
  </text>
  
  <!-- Connection arrows -->
  <line x1="600" y1="300" x2="600" y2="360" stroke="#64748b" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="590,350 610,350 600,370" fill="#64748b"/>
  
  <line x1="600" y1="540" x2="600" y2="480" stroke="#64748b" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="590,490 610,490 600,470" fill="#64748b"/>
  
  <!-- L-module (低层模块) -->
  <rect x="250" y="360" width="700" height="120" rx="15" fill="#10b981" stroke="#059669" stroke-width="3"/>
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">
    低层模块 (L-module)
  </text>
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#d1fae5">
    快速、详细的计算 · 局部求解 · 并行处理
  </text>
  
  <!-- Input and Output -->
  <rect x="50" y="390" width="150" height="60" rx="10" fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <text x="125" y="425" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    问题输入
  </text>
  
  <rect x="1000" y="390" width="150" height="60" rx="10" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
  <text x="1075" y="425" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    答案输出
  </text>
  
  <!-- Arrows for input/output -->
  <line x1="200" y1="420" x2="250" y2="420" stroke="#64748b" stroke-width="3"/>
  <polygon points="235,410 255,410 245,430" fill="#64748b"/>
  
  <line x1="950" y1="420" x2="1000" y2="420" stroke="#64748b" stroke-width="3"/>
  <polygon points="985,410 1005,410 995,430" fill="#64748b"/>
  
  <!-- Process steps -->
  <rect x="100" y="580" width="1000" height="170" rx="15" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="600" y="620" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e293b">
    分层收敛过程
  </text>
  
  <circle cx="200" cy="680" r="30" fill="#3b82f6"/>
  <text x="200" y="690" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
  <text x="200" y="735" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">
    L-module 处理局部
  </text>
  
  <line x1="230" y1="680" x2="320" y2="680" stroke="#64748b" stroke-width="2"/>
  <polygon points="305,670 325,670 315,690" fill="#64748b"/>
  
  <circle cx="350" cy="680" r="30" fill="#3b82f6"/>
  <text x="350" y="690" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
  <text x="350" y="735" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">
    H-module 更新策略
  </text>
  
  <line x1="380" y1="680" x2="470" y2="680" stroke="#64748b" stroke-width="2"/>
  <polygon points="455,670 475,670 465,690" fill="#64748b"/>
  
  <circle cx="500" cy="680" r="30" fill="#3b82f6"/>
  <text x="500" y="690" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
  <text x="500" y="735" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">
    分配新子问题
  </text>
  
  <line x1="530" y1="680" x2="620" y2="680" stroke="#64748b" stroke-width="2"/>
  <polygon points="605,670 625,670 615,690" fill="#64748b"/>
  
  <circle cx="650" cy="680" r="30" fill="#3b82f6"/>
  <text x="650" y="690" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
  <text x="650" y="735" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">
    重置 L-module
  </text>
  
  <line x1="680" y1="680" x2="770" y2="680" stroke="#64748b" stroke-width="2"/>
  <polygon points="755,670 775,670 765,690" fill="#64748b"/>
  
  <circle cx="800" cy="680" r="30" fill="#10b981"/>
  <text x="800" y="690" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">✓</text>
  <text x="800" y="735" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475569">
    最终收敛
  </text>
</svg>