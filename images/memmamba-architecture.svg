<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3cfe2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="attentionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#333">MemMamba 架构设计</text>
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#666">模仿人类记笔记的创新记忆机制</text>
  
  <!-- 主要流程线 -->
  <line x1="100" y1="400" x2="1100" y2="400" stroke="#999" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- 输入 -->
  <rect x="100" y="350" width="120" height="100" rx="10" fill="url(#blockGradient)" filter="url(#shadow)"/>
  <text x="160" y="390" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">输入序列</text>
  <text x="160" y="420" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">x₁, x₂, ..., xₙ</text>
  
  <!-- MemMamba 层 1 -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="180" height="400" rx="15" fill="#fff" stroke="#667eea" stroke-width="3" filter="url(#shadow)"/>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">MemMamba 层 1</text>
    
    <!-- Note Block -->
    <rect x="20" y="70" width="140" height="70" rx="8" fill="url(#noteGradient)"/>
    <text x="90" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Note Block</text>
    <text x="90" y="125" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">提取关键信息</text>
    
    <!-- 跨 Token 注意力 -->
    <rect x="20" y="160" width="140" height="70" rx="8" fill="url(#attentionGradient)"/>
    <text x="90" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">跨 Token</text>
    <text x="90" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">注意力</text>
    
    <!-- 状态池 -->
    <rect x="20" y="250" width="140" height="60" rx="8" fill="#ffecd2" stroke="#fcb69f" stroke-width="2"/>
    <text x="90" y="278" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">状态池</text>
    <text x="90" y="298" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">s̃₁</text>
    
    <!-- Mamba 块 -->
    <rect x="20" y="330" width="140" height="50" rx="8" fill="#a8edea" stroke="#6dd5ed" stroke-width="2"/>
    <text x="90" y="360" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Mamba 块</text>
  </g>
  
  <!-- 连接线 -->
  <line x1="220" y1="400" x2="280" y2="400" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="400" x2="520" y2="400" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- MemMamba 层 2 -->
  <g transform="translate(520, 200)">
    <rect x="0" y="0" width="180" height="400" rx="15" fill="#fff" stroke="#667eea" stroke-width="3" filter="url(#shadow)"/>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">MemMamba 层 2</text>
    
    <!-- Note Block -->
    <rect x="20" y="70" width="140" height="70" rx="8" fill="url(#noteGradient)"/>
    <text x="90" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Note Block</text>
    <text x="90" y="125" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">提取关键信息</text>
    
    <!-- 跨 Token 注意力 -->
    <rect x="20" y="160" width="140" height="70" rx="8" fill="url(#attentionGradient)"/>
    <text x="90" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">跨 Token</text>
    <text x="90" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">注意力</text>
    
    <!-- 状态池 -->
    <rect x="20" y="250" width="140" height="60" rx="8" fill="#ffecd2" stroke="#fcb69f" stroke-width="2"/>
    <text x="90" y="278" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">状态池</text>
    <text x="90" y="298" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">s̃₂</text>
    
    <!-- Mamba 块 -->
    <rect x="20" y="330" width="140" height="50" rx="8" fill="#a8edea" stroke="#6dd5ed" stroke-width="2"/>
    <text x="90" y="360" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Mamba 块</text>
  </g>
  
  <!-- 跨层注意力 -->
  <g transform="translate(750, 280)">
    <rect x="0" y="0" width="120" height="240" rx="12" fill="url(#attentionGradient)" filter="url(#shadow)"/>
    <text x="60" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white" transform="rotate(-90, 60, 120)">跨层注意力</text>
  </g>
  
  <!-- 状态池聚合 -->
  <rect x="900" y="320" width="120" height="160" rx="12" fill="#ffecd2" stroke="#fcb69f" stroke-width="3" filter="url(#shadow)"/>
  <text x="960" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">聚合</text>
  <text x="960" y="405" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">状态池</text>
  <text x="960" y="435" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">s̃₁, s̃₂, ...</text>
  
  <!-- 输出 -->
  <rect x="1050" y="350" width="120" height="100" rx="10" fill="url(#blockGradient)" filter="url(#shadow)"/>
  <text x="1110" y="390" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">输出序列</text>
  <text x="1110" y="420" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">y₁, y₂, ..., yₙ</text>
  
  <!-- 连接线 -->
  <line x1="700" y1="400" x2="750" y2="400" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="870" y1="400" x2="900" y2="400" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1020" y1="400" x2="1050" y2="400" stroke="#667eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 图例 -->
  <g transform="translate(50, 650)">
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">图例：</text>
    
    <rect x="0" y="50" width="30" height="20" rx="4" fill="url(#noteGradient)"/>
    <text x="40" y="67" font-family="Arial, sans-serif" font-size="14" fill="#333">Note Block - 提取关键信息</text>
    
    <rect x="280" y="50" width="30" height="20" rx="4" fill="url(#attentionGradient)"/>
    <text x="320" y="67" font-family="Arial, sans-serif" font-size="14" fill="#333">注意力机制</text>
    
    <rect x="0" y="90" width="30" height="20" rx="4" fill="#ffecd2" stroke="#fcb69f" stroke-width="2"/>
    <text x="40" y="107" font-family="Arial, sans-serif" font-size="14" fill="#333">状态池 - 存储笔记</text>
    
    <rect x="280" y="90" width="30" height="20" rx="4" fill="#a8edea" stroke="#6dd5ed" stroke-width="2"/>
    <text x="320" y="107" font-family="Arial, sans-serif" font-size="14" fill="#333">Mamba 基础模块</text>
  </g>
</svg>
