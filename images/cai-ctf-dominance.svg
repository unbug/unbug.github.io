<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">CAI：征服全球CTF竞赛的AI网络安全超级特工</text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">2025年五大国际CTF竞赛表现</text>
  
  <!-- 竞赛图表区域 -->
  <g transform="translate(100, 160)">
    <!-- 图表背景 -->
    <rect x="0" y="0" width="1000" height="500" fill="rgba(255,255,255,0.03)" rx="15"/>
    
    <!-- 图例 -->
    <circle cx="850" cy="30" r="8" fill="url(#aiGradient)"/>
    <text x="870" y="35" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">CAI 排名</text>
    <circle cx="850" cy="60" r="8" fill="#ff6b6b"/>
    <text x="870" y="65" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">参赛队伍数</text>
    
    <!-- 竞赛数据点 -->
    <!-- HTB AI vs Humans -->
    <g transform="translate(50, 80)">
      <rect x="0" y="0" width="180" height="100" fill="rgba(0,212,255,0.1)" rx="8"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" text-anchor="middle">HTB "AI vs Humans"</text>
      <text x="90" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">#1</text>
      <text x="90" y="78" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">163支队伍 · 19/20旗</text>
    </g>
    
    <!-- Cyber Apocalypse -->
    <g transform="translate(260, 80)">
      <rect x="0" y="0" width="180" height="100" fill="rgba(0,212,255,0.1)" rx="8"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" text-anchor="middle">Cyber Apocalypse</text>
      <text x="90" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">#859</text>
      <text x="90" y="78" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">8,129支队伍 · 30/77旗</text>
    </g>
    
    <!-- Dragos OT CTF -->
    <g transform="translate(470, 80)">
      <rect x="0" y="0" width="180" height="100" fill="rgba(0,212,255,0.15)" rx="8"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" text-anchor="middle">Dragos OT CTF</text>
      <text x="90" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">#6</text>
      <text x="90" y="78" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">1,200+支队伍 · 32/34旗</text>
    </g>
    
    <!-- UWSP Pointer Overflow -->
    <g transform="translate(680, 80)">
      <rect x="0" y="0" width="180" height="100" fill="rgba(0,212,255,0.1)" rx="8"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" text-anchor="middle">UWSP Pointer</text>
      <text x="90" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">#21</text>
      <text x="90" y="78" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">635支队伍 · 58解题</text>
    </g>
    
    <!-- Neurogrid CTF - 冠军 -->
    <g transform="translate(260, 220)">
      <rect x="0" y="0" width="480" height="120" fill="rgba(255,215,0,0.15)" rx="8" filter="url(#glow)"/>
      <text x="240" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffd700" text-anchor="middle">🏆 Neurogrid CTF - 总冠军 🏆</text>
      <text x="240" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">#1 · $50,000 大奖</text>
      <text x="240" y="100" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">41/45旗 · 33,917分 · 1,925分优势夺冠</text>
    </g>
    
    <!-- 关键数据亮点 -->
    <g transform="translate(50, 380)">
      <rect x="0" y="0" width="900" height="80" fill="rgba(0,212,255,0.08)" rx="10"/>
      <text x="450" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff" text-anchor="middle">🚀 关键性能指标</text>
      <text x="150" y="60" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Neurogrid: 161分/分钟</text>
      <text x="450" y="60" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Dragos: 比最快人类快9.8分钟</text>
      <text x="750" y="60" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">成本降低: 98%</text>
    </g>
  </g>
  
  <!-- 底部标注 -->
  <text x="600" y="720" font-family="Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">数据来源：Alias Robotics (2025) · arXiv:2512.02654</text>
</svg>