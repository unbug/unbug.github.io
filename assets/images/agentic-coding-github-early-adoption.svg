<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Title area -->
  <text x="400" y="48" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Agentic Coding on GitHub</text>
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">AI Agent 编码工具的早期采用模式</text>
  
  <!-- Dataset info -->
  <rect x="60" y="95" width="680" height="50" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="118" text-anchor="middle" fill="#cbd5e1" font-size="12">AIDev-pop · 2,361 个仓库 · 25,264 条 Agent PR</text>
  <text x="400" y="135" text-anchor="middle" fill="#64748b" font-size="10">GitHub Copilot · OpenAI Codex · Claude Code</text>
  
  <!-- Three key findings -->
  <!-- Finding 1: Low adoption median -->
  <rect x="60" y="165" width="215" height="130" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="167" y="192" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">采用现状</text>
  
  <!-- Bar chart visualization -->
  <rect x="85" y="210" width="170" height="14" rx="3" fill="#334155"/>
  <rect x="85" y="210" width="8" height="14" rx="3" fill="#ef4444"/>
  <text x="265" y="221" text-anchor="start" fill="#94a3b8" font-size="10">中位数: 1-2 PR/季度</text>
  
  <rect x="85" y="232" width="170" height="14" rx="3" fill="#334155"/>
  <rect x="85" y="232" width="12" height="14" rx="3" fill="#f97316"/>
  <text x="265" y="243" text-anchor="start" fill="#94a3b8" font-size="10">基准: 36 PR/参与者</text>
  
  <rect x="85" y="254" width="170" height="14" rx="3" fill="#334155"/>
  <rect x="85" y="254" width="160" height="14" rx="3" fill="#ef4444"/>
  <text x="265" y="265" text-anchor="start" fill="#94a3b8" font-size="10">长尾分布 · 早期阶段</text>
  
  <!-- Finding 2: Small projects more active -->
  <rect x="292" y="165" width="215" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="192" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">小项目更积极</text>
  
  <!-- Bar chart: small vs large -->
  <rect x="317" y="210" width="165" height="14" rx="3" fill="#334155"/>
  <rect x="317" y="210" width="130" height="14" rx="3" fill="#22c55e"/>
  <text x="487" y="221" text-anchor="start" fill="#94a3b8" font-size="10">小型(1-5人): 高参与率</text>
  
  <rect x="317" y="232" width="165" height="14" rx="3" fill="#334155"/>
  <rect x="317" y="232" width="80" height="14" rx="3" fill="#4ade80"/>
  <text x="487" y="243" text-anchor="start" fill="#94a3b8" font-size="10">中型: 中等参与率</text>
  
  <rect x="317" y="254" width="165" height="14" rx="3" fill="#334155"/>
  <rect x="317" y="254" width="50" height="14" rx="3" fill="#86efac"/>
  <text x="487" y="265" text-anchor="start" fill="#94a3b8" font-size="10">大型: 低参与率</text>
  
  <!-- Finding 3: Single human oversight -->
  <rect x="524" y="165" width="215" height="130" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="632" y="192" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">单人监督主导</text>
  
  <!-- Human-Agent collaboration diagram -->
  <circle cx="580" cy="240" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="244" text-anchor="middle" fill="#93c5fd" font-size="11">人类</text>
  
  <path d="M 605 240 L 620 240" stroke="#6366f1" stroke-width="2"/>
  
  <circle cx="640" cy="240" r="22" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="244" text-anchor="middle" fill="#c4b5fd" font-size="11">Agent</text>
  
  <text x="632" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">一人审查 · 多人协作罕见</text>
  
  <!-- Key insight box -->
  <rect x="60" y="315" width="680" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="342" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">核心发现</text>
  
  <!-- Three insight points -->
  <rect x="85" y="358" width="200" height="70" rx="8" fill="#0f172a"/>
  <text x="185" y="380" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">反直觉: 小项目更积极</text>
  <text x="185" y="400" fill="#94a3b8" font-size="10">决策链短 · 试错成本低</text>
  <text x="185" y="416" fill="#94a3b8" font-size="10">人力短缺驱动自动化需求</text>
  
  <rect x="300" y="358" width="200" height="70" rx="8" fill="#0f172a"/>
  <text x="400" y="380" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">角色转变: 编写 → 审查</text>
  <text x="400" y="400" fill="#94a3b8" font-size="10">人类从编码者变为审查者</text>
  <text x="400" y="416" fill="#94a3b8" font-size="10">单人监督 → 未来多人协作</text>
  
  <rect x="515" y="358" width="200" height="70" rx="8" fill="#0f172a"/>
  <text x="615" y="380" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">早期采用阶段</text>
  <text x="615" y="400" fill="#94a3b8" font-size="10">中位数仅1-2条PR/季度</text>
  <text x="615" y="416" fill="#94a3b8" font-size="10">长尾分布 · 尚未主流化</text>
  
  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" fill="#64748b" font-size="10">Rochester Institute of Technology · KDD 2026 Workshop · arXiv:2607.14037</text>
  
  <!-- Decorative -->
  <circle cx="780" cy="30" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="760" cy="20" r="2" fill="#8b5cf6" opacity="0.3"/>
</svg>
