<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1f4e"/>
    </linearGradient>
  </defs>

  <rect width="960" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">ALAR 性能实测: Token 节省率 vs 准确率</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">Agentic Search | Tool Use | 跨模型一致性 (7B/13B/Large)</text>

  <!-- Chart area -->
  <rect x="100" y="75" width="760" height="300" rx="8" fill="#0f172a"/>

  <!-- Y axis: Token reduction % -->
  <text x="90" y="95" text-anchor="end" font-size="11" fill="#64748b">100%</text>
  <line x1="100" y1="93" x2="860" y2="93" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="155" text-anchor="end" font-size="11" fill="#64748b">75%</text>
  <line x1="100" y1="153" x2="860" y2="153" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="215" text-anchor="end" font-size="11" fill="#64748b">50%</text>
  <line x1="100" y1="213" x2="860" y2="213" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="275" text-anchor="end" font-size="11" fill="#64748b">25%</text>
  <line x1="100" y1="273" x2="860" y2="273" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="335" text-anchor="end" font-size="11" fill="#64748b">0%</text>
  <line x1="100" y1="333" x2="860" y2="333" stroke="#1e293b" stroke-width="1"/>

  <!-- Agentic Search group -->
  <!-- Baseline: 100% (reference) -->
  <rect x="145" y="95" width="30" height="238" rx="3" fill="#64748b" opacity="0.3"/>

  <!-- ALAR: 43.6% reduction -->
  <rect x="185" y="225" width="30" height="108" rx="3" fill="#3b82f6"/>
  <text x="200" y="218" text-anchor="middle" font-size="10" fill="#93c5fd">43.6%</text>

  <!-- Tool Use group -->
  <!-- Baseline: 100% (reference) -->
  <rect x="345" y="95" width="30" height="238" rx="3" fill="#64748b" opacity="0.3"/>

  <!-- ALAR: 84.6% reduction -->
  <rect x="385" y="125" width="30" height="208" rx="3" fill="#10b981"/>
  <text x="400" y="118" text-anchor="middle" font-size="10" fill="#6ee7b7">84.6%</text>

  <!-- Accuracy comparison (right side) -->
  <!-- Agentic Search accuracy -->
  <rect x="545" y="95" width="30" height="238" rx="3" fill="#64748b" opacity="0.3"/>
  <text x="560" y="88" text-anchor="middle" font-size="10" fill="#cbd5e1">基线</text>

  <rect x="585" y="98" width="30" height="235" rx="3" fill="#fbbf24"/>
  <text x="600" y="91" text-anchor="middle" font-size="10" fill="#fde68a">持平</text>

  <!-- Tool Use accuracy -->
  <rect x="745" y="95" width="30" height="238" rx="3" fill="#64748b" opacity="0.3"/>
  <text x="760" y="88" text-anchor="middle" font-size="10" fill="#cbd5e1">基线</text>

  <rect x="785" y="95" width="30" height="241" rx="3" fill="#fbbf24"/>
  <text x="800" y="88" text-anchor="middle" font-size="10" fill="#fde68a">持平</text>

  <!-- X axis labels -->
  <text x="175" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">Agentic Search</text>
  <text x="200" y="375" text-anchor="middle" font-size="9" fill="#64748b">(Token节省)</text>

  <text x="375" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">Tool Use</text>
  <text x="400" y="375" text-anchor="middle" font-size="9" fill="#64748b">(Token节省)</text>

  <text x="560" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">Agentic Search</text>
  <text x="560" y="375" text-anchor="middle" font-size="9" fill="#64748b">(准确率)</text>

  <text x="760" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">Tool Use</text>
  <text x="760" y="375" text-anchor="middle" font-size="9" fill="#64748b">(准确率)</text>

  <!-- Legend -->
  <rect x="280" y="390" width="400" height="50" rx="6" fill="#1e293b"/>
  <rect x="295" y="400" width="14" height="12" rx="2" fill="#3b82f6"/>
  <text x="316" y="410" font-size="11" fill="#cbd5e1">Agentic Search Token节省</text>
  <rect x="470" y="400" width="14" height="12" rx="2" fill="#10b981"/>
  <text x="491" y="410" font-size="11" fill="#cbd5e1">Tool Use Token节省</text>
  <rect x="630" y="400" width="14" height="12" rx="2" fill="#fbbf24"/>
  <text x="651" y="410" font-size="11" fill="#cbd5e1">准确率对比 (基线=持平)</text>

  <!-- Key insight -->
  <rect x="30" y="450" width="900" height="25" rx="6" fill="#78350f"/>
  <text x="480" y="467" text-anchor="middle" font-size="12" fill="#fde68a">跨模型一致性: 效率收益与模型规模无关 (7B/13B/Large 均获得相似节省比例)</text>
</svg>
