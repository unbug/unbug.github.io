<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="alienGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景填充 -->
  <rect width="800" height="450" fill="url(#bgGradient)"/>

  <!-- 概念空间网格 -->
  <g opacity="0.2">
    <line x1="0" y1="225" x2="800" y2="225" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-width="1"/>
    <!-- 网格线 -->
    <line x1="100" y1="50" x2="100" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="50" x2="200" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="300" y1="50" x2="300" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="500" y1="50" x2="500" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="50" x2="600" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="700" y1="50" x2="700" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="100" x2="750" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="150" x2="750" y2="150" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="200" x2="750" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="250" x2="750" y2="250" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="300" x2="750" y2="300" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="350" x2="750" y2="350" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- 人类思维区域（左侧密集区） -->
  <g>
    <!-- 人类区域光晕 -->
    <ellipse cx="200" cy="225" rx="120" ry="100" fill="url(#alienGlow)" opacity="0.5"/>
    <!-- 标题 -->
    <text x="200" y="80" text-anchor="middle" fill="#ffcc00" font-family="Arial" font-size="16" font-weight="bold">人类思维区</text>
    <!-- 人类思维原子（密集、重复） -->
    <circle cx="180" cy="200" r="8" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="220" cy="190" r="7" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="160" cy="240" r="9" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="240" cy="250" r="7" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="200" cy="280" r="6" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="140" cy="180" r="5" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="260" cy="170" r="5" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="170" cy="300" r="6" fill="#ff6b6b" filter="url(#glow)"/>
    <circle cx="230" cy="310" r="5" fill="#ff6b6b" filter="url(#glow)"/>
    <!-- LLM 连线（重复利用相同原子） -->
    <line x1="180" y1="200" x2="220" y2="190" stroke="#ffcc00" stroke-width="2" opacity="0.6"/>
    <line x1="220" y1="190" x2="240" y2="250" stroke="#ffcc00" stroke-width="2" opacity="0.6"/>
    <line x1="160" y1="240" x2="200" y2="280" stroke="#ffcc00" stroke-width="2" opacity="0.6"/>
    <text x="200" y="360" text-anchor="middle" fill="#ffcc00" font-family="Arial" font-size="12">Claude 4.5 Opus: 8.1% 覆盖率</text>
    <text x="200" y="380" text-anchor="middle" fill="#ffcc00" font-family="Arial" font-size="12">前 10% 原子占比: 35.2%</text>
  </g>

  <!-- Alien Science 区域（右侧广阔区） -->
  <g>
    <!-- 外星区域光晕 -->
    <ellipse cx="600" cy="225" rx="150" ry="120" fill="url(#alienGlow)" opacity="0.3"/>
    <!-- 标题 -->
    <text x="600" y="80" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="16" font-weight="bold">Alien Science 探索区</text>
    <!-- 外星思维原子（分散、多样） -->
    <circle cx="520" cy="170" r="6" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="580" cy="150" r="5" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="650" cy="180" r="7" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="550" cy="230" r="6" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="620" cy="250" r="5" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="680" cy="220" r="6" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="530" cy="290" r="5" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="600" cy="310" r="7" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="670" cy="290" r="5" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="500" cy="200" r="4" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="700" cy="160" r="4" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="720" cy="260" r="4" fill="#00ff88" filter="url(#glow)"/>
    <!-- Alien 连线（探索新组合） -->
    <line x1="520" y1="170" x2="650" y2="180" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
    <line x1="550" y1="230" x2="680" y2="220" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
    <line x1="530" y1="290" x2="670" y2="290" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
    <text x="600" y="360" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="12">Alien Sampler: 28.9% 覆盖率</text>
    <text x="600" y="380" text-anchor="middle" fill="#00ff88" font-family="Arial" font-size="12">前 10% 原子占比: 4.7%</text>
  </g>

  <!-- 中间对比箭头 -->
  <g>
    <line x1="350" y1="225" x2="450" y2="225" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
    <polygon points="440,220 450,225 440,230" fill="#ffffff" opacity="0.8"/>
    <text x="400" y="210" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="11">从加速到补充</text>
  </g>

  <!-- 底部数据总结 -->
  <g>
    <rect x="150" y="400" width="500" height="40" rx="5" fill="#000000" opacity="0.5"/>
    <text x="400" y="425" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="14">
      基于 7,339 篇 LLM 论文 · 39,028 个概念单元 · 约 2,500 个思想原子
    </text>
  </g>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="20" font-weight="bold">
    Alien Science: 探索人类思维的盲区
  </text>
</svg>