<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="url(#bgGrad)"/>

  <!-- Title area -->
  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">SkillCoach：自进化评分评估智能体技能使用</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" fill="#555">从固定体系到轨迹级元能力——技能选择本身比执行更脆弱</text>

  <!-- Central diagram: Self-evolving rubrics -->
  <rect x="230" y="90" width="400" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="430" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">自进化评分框架</text>

  <!-- Step 1: Trajectory collection -->
  <rect x="260" y="135" width="140" height="50" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="330" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">真实交互轨迹</text>

  <!-- Arrow -->
  <line x1="400" y1="160" x2="430" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="430,155 440,160 430,165" fill="#555"/>

  <!-- Step 2: Auto-derive rubrics -->
  <rect x="440" y="135" width="140" height="50" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="510" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">自动推导评分标准</text>

  <!-- Arrow down -->
  <line x1="510" y1="185" x2="510" y2="210" stroke="#555" stroke-width="2"/>
  <polygon points="507,208 510,216 513,208" fill="#555"/>

  <!-- Step 3: Continuous improvement -->
  <rect x="440" y="215" width="140" height="50" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="510" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">持续改进评分体系</text>

  <!-- Feedback loop arrow -->
  <path d="M440,240 Q380,240 330,240 Q260,240 260,160" stroke="#28a745" stroke-width="1.5" fill="none"/>
  <polygon points="260,156 268,161 260,164" fill="#28a745"/>

  <!-- Left panel: Key insight -->
  <rect x="30" y="100" width="180" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="120" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">核心突破</text>

  <!-- Meta-capability -->
  <rect x="45" y="145" width="150" height="65" rx="4" fill="#e3f2fd"/>
  <text x="120" y="167" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">轨迹级元能力</text>
  <text x="120" y="185" text-anchor="middle" font-size="9" fill="#1565c0">技能使用定义为过程</text>
  <text x="120" y="200" text-anchor="middle" font-size="9" fill="#1565c0">能力而非任务成功</text>

  <!-- No manual annotation -->
  <rect x="45" y="220" width="150" height="65" rx="4" fill="#fff3cd"/>
  <text x="120" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">无需人工标注</text>
  <text x="120" y="260" text-anchor="middle" font-size="9" fill="#856404">从真实轨迹自动推导</text>
  <text x="120" y="275" text-anchor="middle" font-size="9" fill="#856404">评分标准，非固定体系</text>

  <!-- Right panel: Key data -->
  <rect x="650" y="100" width="180" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="740" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">关键发现</text>

  <!-- Big stat -->
  <rect x="665" y="145" width="150" height="70" rx="6" fill="#f8d7da"/>
  <text x="740" y="182" text-anchor="middle" font-size="28" font-weight="bold" fill="#721c24">98→78</text>
  <text x="740" y="205" text-anchor="middle" font-size="10" fill="#721c24">Gemini 3.1 Pro选择分数骤降</text>

  <!-- Interpretation -->
  <rect x="665" y="225" width="150" height="90" rx="6" fill="#fff3cd"/>
  <text x="740" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">技能选择比执行更脆弱</text>
  <text x="740" y="265" text-anchor="middle" font-size="9" fill="#856404">找到正确技能后执行尚可，</text>
  <text x="740" y="280" text-anchor="middle" font-size="9" fill="#856404">但选择本身在干扰下极其脆弱</text>

  <!-- Bottom insight -->
  <rect x="30" y="420" width="800" height="50" rx="6" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
  <text x="430" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c5460">核心洞察：技能选择能力是比执行能力更脆弱的元能力——在干扰项存在时大模型的选择分数骤降20分</text>

  <!-- Source -->
  <text x="430" y="495" text-anchor="middle" font-size="11" fill="#999">Source: HKUST(GZ) + JD.com, arXiv:2607.01874 (SkillCoach)</text>

  <!-- Paradigm Radar badge -->
  <rect x="700" y="495" width="120" height="24" rx="3" fill="#fff3cd"/>
  <text x="760" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#856404">AI Paradigm Radar</text>

  <!-- Article number -->
  <rect x="40" y="495" width="100" height="24" rx="3" fill="#e3f2fd"/>
  <text x="90" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Article #90</text>

  <!-- Date badge -->
  <rect x="40" y="522" width="100" height="20" rx="3" fill="#e8f5e9"/>
  <text x="90" y="536" text-anchor="middle" font-size="8" fill="#2e7d32">Published: 2026-07-05</text>
</svg>
