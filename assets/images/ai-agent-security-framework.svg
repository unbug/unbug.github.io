<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold">AI Agent 安全框架与隐私保护</text>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0">MCPShield · TRiSM · GDPR 合规</text>
  
  <!-- MCPShield Shield Icon -->
  <g transform="translate(150, 150)">
    <path d="M50 10 L120 30 L120 80 Q120 120 50 140 Q -20 120 -20 80 L-20 30 Z" fill="url(#shieldGrad)" filter="url(#glow)"/>
    <path d="M50 40 L90 55 L90 80 Q90 100 50 115 Q 10 100 10 80 L10 55 Z" fill="#ffffff" opacity="0.3"/>
    <text x="50" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">MCPShield</text>
    <text x="50" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">形式化验证</text>
  </g>
  
  <!-- TRiSM Lock Icon -->
  <g transform="translate(400, 150)">
    <rect x="-30" y="-40" width="60" height="80" rx="10" ry="10" fill="url(#lockGrad)" filter="url(#glow)"/>
    <path d="M-20 -10 L20 -10 L20 10 L-20 10 Z" fill="#ffffff" opacity="0.3"/>
    <rect x="-15" y="-35" width="30" height="15" rx="3" ry="3" fill="#ffffff" opacity="0.5"/>
    <text x="0" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">TRiSM</text>
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">信任风险管理</text>
  </g>
  
  <!-- GDPR Scale Icon -->
  <g transform="translate(650, 150)">
    <line x1="0" y1="40" x2="0" y2="-20" stroke="#00ff88" stroke-width="3"/>
    <polygon points="0,-20 -25,0 25,0" fill="none" stroke="#00ff88" stroke-width="3" stroke-dasharray="5,3"/>
    <circle cx="-30" cy="20" r="15" fill="url(#shieldGrad)"/>
    <circle cx="30" cy="20" r="15" fill="url(#shieldGrad)"/>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">GDPR</text>
    <text x="0" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">合规架构</text>
  </g>
  
  <!-- Connection Lines -->
  <line x1="270" y1="170" x2="340" y2="170" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="520" y1="170" x2="590" y2="170" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Bottom Info -->
  <rect x="100" y="250" width="600" height="120" rx="8" ry="8" fill="#0a0a1a" opacity="0.6"/>
  <text x="400" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" font-weight="bold">安全建设路线图</text>
  
  <text x="150" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">短期 (3 个月)</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">中期 (6-12 个月)</text>
  <text x="650" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">长期 (1-2 年)</text>
  
  <text x="150" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">基础设施加固 · 权限审计</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">形式化验证 · 动态评估</text>
  <text x="650" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">自动化 TRiSM · 标准化认证</text>
  
  <!-- Footer -->
  <line x1="100" y1="380" x2="700" y2="380" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#606080">2026 年 AI Agent 安全研究综述</text>
</svg>