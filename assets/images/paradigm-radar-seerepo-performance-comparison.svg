<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">纯视觉 vs 混合模式——性能与成本对比</text>
  <text x="600" y="75" text-anchor="middle" font-size="13" fill="#90a4ae">SWE-bench Verified Pass@1 结果（500 个 Python 项目实例）</text>
  
  <!-- Chart area -->
  <rect x="80" y="100" width="1040" height="380" rx="8" fill="#0d47a1" opacity="0.2"/>
  
  <!-- Y axis labels (accuracy %) -->
  <text x="100" y="140" text-anchor="end" font-size="11" fill="#90a4ae">80%</text>
  <line x1="130" y1="135" x2="1100" y2="135" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <text x="100" y="210" text-anchor="end" font-size="11" fill="#90a4ae">70%</text>
  <line x1="130" y1="205" x2="1100" y2="205" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <text x="100" y="280" text-anchor="end" font-size="11" fill="#90a4ae">60%</text>
  <line x1="130" y1="275" x2="1100" y2="275" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <text x="100" y="350" text-anchor="end" font-size="11" fill="#90a4ae">50%</text>
  <line x1="130" y1="345" x2="1100" y2="345" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <text x="100" y="420" text-anchor="end" font-size="11" fill="#90a4ae">40%</text>
  <line x1="130" y1="415" x2="1100" y2="415" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <!-- X axis labels -->
  <text x="300" y="460" text-anchor="middle" font-size="12" fill="#ef9a9a">GPT-5-mini</text>
  <text x="600" y="460" text-anchor="middle" font-size="12" fill="#ffcc80">Kimi K2.5</text>
  <text x="900" y="460" text-anchor="middle" font-size="12" fill="#a5d6a7">Doubao</text>
  
  <!-- GPT-5-mini bars -->
  <!-- Pure Text: 55.0% -->
  <rect x="230" y="280" width="40" height="140" rx="2" fill="#ef9a9a"/>
  <text x="250" y="275" text-anchor="middle" font-size="11" fill="#ffffff">55.0%</text>
  
  <!-- Pure Visual: 41.4% -->
  <rect x="280" y="365" width="40" height="55" rx="2" fill="#b71c1c"/>
  <text x="300" y="360" text-anchor="middle" font-size="11" fill="#ef9a9a">41.4%</text>
  
  <!-- Hybrid: 55.4% -->
  <rect x="330" y="278" width="40" height="142" rx="2" fill="#a5d6a7"/>
  <text x="350" y="273" text-anchor="middle" font-size="11" fill="#ffffff">55.4%</text>
  
  <!-- Kimi K2.5 bars -->
  <!-- Pure Text: 68.8% -->
  <rect x="530" y="152" width="40" height="268" rx="2" fill="#ffcc80"/>
  <text x="550" y="147" text-anchor="middle" font-size="11" fill="#ffffff">68.8%</text>
  
  <!-- Pure Visual: 55.0% -->
  <rect x="580" y="230" width="40" height="190" rx="2" fill="#e65100"/>
  <text x="600" y="225" text-anchor="middle" font-size="11" fill="#ffcc80">55.0%</text>
  
  <!-- Hybrid: 70.6% -->
  <rect x="630" y="142" width="40" height="278" rx="2" fill="#a5d6a7"/>
  <text x="650" y="137" text-anchor="middle" font-size="11" fill="#ffffff">70.6%</text>
  
  <!-- Doubao bars -->
  <!-- Pure Text: 51.0% -->
  <rect x="830" y="310" width="40" height="110" rx="2" fill="#a5d6a7"/>
  <text x="850" y="305" text-anchor="middle" font-size="11" fill="#ffffff">51.0%</text>
  
  <!-- Pure Visual: 16.9% -->
  <rect x="880" y="420" width="40" height="0" rx="2" fill="#b71c1c"/>
  <text x="900" y="415" text-anchor="middle" font-size="11" fill="#ef9a9a">16.9%</text>
  
  <!-- Hybrid: 52.0% -->
  <rect x="930" y="305" width="40" height="115" rx="2" fill="#a5d6a7"/>
  <text x="950" y="300" text-anchor="middle" font-size="11" fill="#ffffff">52.0%</text>
  
  <!-- Legend -->
  <rect x="80" y="500" width="16" height="12" rx="2" fill="#ef9a9a"/>
  <text x="105" y="511" font-size="11" fill="#b0bec5">纯文本基线</text>
  
  <rect x="230" y="500" width="16" height="12" rx="2" fill="#b71c1c"/>
  <text x="255" y="511" font-size="11" fill="#b0bec5">纯视觉模式</text>
  
  <rect x="390" y="500" width="16" height="12" rx="2" fill="#a5d6a7"/>
  <text x="415" y="511" font-size="11" fill="#b0bec5">混合模式</text>
  
  <!-- Key insight box -->
  <rect x="600" y="495" width="520" height="35" rx="4" fill="#1b5e20" opacity="0.3"/>
  <text x="860" y="517" text-anchor="middle" font-size="12" fill="#a5d6a7">混合模式：准确率持平或微升 · Token 成本降低 3-26%</text>
  
  <!-- Token cost comparison (bottom section) -->
  <text x="600" y="560" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Token 成本变化</text>
  
  <rect x="200" y="575" width="200" height="35" rx="4" fill="#b71c1c" opacity="0.3"/>
  <text x="300" y="597" text-anchor="middle" font-size="11" fill="#ef9a9a">GPT-5-mini: +42%</text>
  
  <rect x="500" y="575" width="200" height="35" rx="4" fill="#b71c1c" opacity="0.3"/>
  <text x="600" y="597" text-anchor="middle" font-size="11" fill="#ef9a9a">Doubao: +268%</text>
  
  <rect x="800" y="575" width="200" height="35" rx="4" fill="#1b5e20" opacity="0.3"/>
  <text x="900" y="597" text-anchor="middle" font-size="11" fill="#a5d6a7">混合模式: -3% ~ -26%</text>
  
  <!-- Footer -->
  <text x="600" y="620" text-anchor="middle" font-size="11" fill="#546e7a">Source: arXiv:2606.14061 | SWE-bench Verified (500 instances)</text>
</svg>
