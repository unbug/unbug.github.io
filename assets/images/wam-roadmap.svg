<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">From World Action Models to Embodied Brains</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#64748b">A Roadmap for Open-World Physical Intelligence (arXiv:2607.11689)</text>

  <!-- Evolution Arrow -->
  <line x1="150" y1="120" x2="650" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Stage 1: Traditional World Models -->
  <rect x="60" y="140" width="200" height="100" rx="8" fill="white" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="160" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Traditional World Models</text>
  <line x1="80" y1="178" x2="240" y2="178" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="198" text-anchor="middle" font-size="11" fill="#64748b">Predict next state distribution</text>
  <text x="160" y="215" text-anchor="middle" font-size="11" fill="#64748b">Closed environments only</text>
  <text x="160" y="232" text-anchor="middle" font-size="11" fill="#ef4444">Limitation: "See &amp; Think", not "Do"</text>

  <!-- Stage 2: WAMs -->
  <rect x="300" y="140" width="200" height="100" rx="8" fill="url(#blue)" stroke="#2563eb" filter="url(#shadow)"/>
  <text x="400" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="white">World Action Models (WAMs)</text>
  <line x1="320" y1="178" x2="480" y2="178" stroke="#93c5fd" stroke-width="1"/>
  <text x="400" y="198" text-anchor="middle" font-size="11" fill="#dbeafe">Action space as internal representation</text>
  <text x="400" y="215" text-anchor="middle" font-size="11" fill="#dbeafe">Tool calls, controller commands, logs</text>
  <text x="400" y="232" text-anchor="middle" font-size="11" fill="#fbbf24">Key: Bridge prediction to action</text>

  <!-- Stage 3: Embodied Brain -->
  <rect x="540" y="140" width="200" height="100" rx="8" fill="url(#green)" stroke="#059669" filter="url(#shadow)"/>
  <text x="640" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="white">Embodied Brain</text>
  <line x1="560" y1="178" x2="720" y2="178" stroke="#a7f3d0" stroke-width="1"/>
  <text x="640" y="198" text-anchor="middle" font-size="11" fill="#ecfdf5">Physical Harness + Shared Contract</text>
  <text x="640" y="215" text-anchor="middle" font-size="11" fill="#ecfdf5">Closed-loop post-training</text>
  <text x="640" y="232" text-anchor="middle" font-size="11" fill="#fbbf24">Goal: Open-world physical intelligence</text>

  <!-- Three Gaps Section -->
  <rect x="50" y="280" width="700" height="160" rx="8" fill="white" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="400" y="310" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Three Structural Gaps</text>

  <!-- Gap 1 -->
  <rect x="70" y="325" width="200" height="100" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <circle cx="90" cy="345" r="8" fill="#f59e0b"/>
  <text x="90" y="349" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  <text x="170" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Representation Incompatibility</text>
  <text x="170" y="368" text-anchor="middle" font-size="10" fill="#a16207">Models from different sources lack unified semantic alignment</text>
  <text x="170" y="385" text-anchor="middle" font-size="10" fill="#a16207">Data silos across heterogeneous systems</text>

  <!-- Gap 2 -->
  <rect x="300" y="325" width="200" height="100" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <circle cx="320" cy="345" r="8" fill="#3b82f6"/>
  <text x="320" y="349" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  <text x="400" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Missing Benchmarks &amp; Standards</text>
  <text x="400" y="368" text-anchor="middle" font-size="10" fill="#1d4ed8">No unified benchmark for WAM capabilities</text>
  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#1d4ed8">Open-world evaluation remains undefined</text>

  <!-- Gap 3 -->
  <rect x="530" y="325" width="200" height="100" rx="6" fill="#ede9fe" stroke="#8b5cf6"/>
  <circle cx="550" cy="345" r="8" fill="#8b5cf6"/>
  <text x="550" y="349" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>
  <text x="630" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">System Fragmentation</text>
  <text x="630" y="368" text-anchor="middle" font-size="10" fill="#6d28d9">Data collection, training, deployment in separate toolchains</text>
  <text x="630" y="385" text-anchor="middle" font-size="10" fill="#6d28d9">No unified protocol for cross-platform collaboration</text>

  <!-- Solution Framework -->
  <rect x="50" y="470" width="700" height="110" rx="8" fill="white" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="400" y="498" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Solution: Embodied Brain Framework</text>

  <!-- Physical Harness -->
  <rect x="70" y="510" width="180" height="60" rx="6" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="160" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="white">Physical Harness</text>
  <text x="160" y="555" text-anchor="middle" font-size="9" fill="#ddd6fe">Maps model output to tool calls, control signals, verification logs</text>

  <!-- Shared Contract -->
  <rect x="310" y="510" width="180" height="60" rx="6" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="400" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="white">Shared Contract</text>
  <text x="400" y="555" text-anchor="middle" font-size="9" fill="#fde68a">Unified interface for heterogeneous models, data, tasks &amp; platforms</text>

  <!-- Closed-Loop -->
  <rect x="550" y="510" width="180" height="60" rx="6" fill="url(#green)" filter="url(#shadow)"/>
  <text x="640" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="white">Closed-Loop Post-Training</text>
  <text x="640" y="555" text-anchor="middle" font-size="9" fill="#ecfdf5">Action-Verify-Learn cycle for continuous self-improvement</text>

  <!-- Paradigm Shift Arrow -->
  <line x1="200" y1="470" x2="600" y2="470" stroke="#94a3b8" stroke-width="1.5"/>
  <defs>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
