<svg xmlns="http://www.w3.org/2000/svg" width="700" height="550" viewBox="0 0 700 550">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="550" fill="url(#bgGradient)" rx="8" ry="8"/>
  
  <!-- Title -->
  <text x="350" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#212529">
    五层次 AI 治理框架
  </text>
  <text x="350" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6c757d">
    A Five-Layer Framework for AI Governance
  </text>
  
  <!-- Level 1: Regulatory Mandates -->
  <rect x="150" y="80" width="400" height="70" fill="#ffffff" stroke="#343a40" stroke-width="1" rx="6" ry="6"/>
  <rect x="150" y="80" width="400" height="6" fill="#dc3545" rx="6" ry="6"/>
  <text x="350" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#212529">
    Level 1: Regulatory Mandates
  </text>
  <text x="350" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">
    监管指令
  </text>
  
  <!-- Level 2: Standards -->
  <rect x="180" y="160" width="340" height="70" fill="#ffffff" stroke="#343a40" stroke-width="1" rx="6" ry="6"/>
  <rect x="180" y="160" width="340" height="6" fill="#0d6efd" rx="6" ry="6"/>
  <text x="350" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#212529">
    Level 2: Standards
  </text>
  <text x="350" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">
    标准规范
  </text>
  
  <!-- Level 3: Assessment Methodologies -->
  <rect x="210" y="240" width="280" height="70" fill="#ffffff" stroke="#343a40" stroke-width="1" rx="6" ry="6"/>
  <rect x="210" y="240" width="280" height="6" fill="#198754" rx="6" ry="6"/>
  <text x="350" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#212529">
    Level 3: Assessment
  </text>
  <text x="350" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">
    评估方法
  </text>
  
  <!-- Level 4: Certification Processes -->
  <rect x="240" y="320" width="220" height="70" fill="#ffffff" stroke="#343a40" stroke-width="1" rx="6" ry="6"/>
  <rect x="240" y="320" width="220" height="6" fill="#ffc107" rx="6" ry="6"/>
  <text x="350" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#212529">
    Level 4: Certification
  </text>
  <text x="350" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">
    认证流程
  </text>
  
  <!-- Level 5: Governance Practices -->
  <rect x="270" y="400" width="160" height="70" fill="#ffffff" stroke="#343a40" stroke-width="1" rx="6" ry="6"/>
  <rect x="270" y="400" width="160" height="6" fill="#6610f2" rx="6" ry="6"/>
  <text x="350" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#212529">
    Level 5: Practices
  </text>
  <text x="350" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">
    治理实践
  </text>
  
  <!-- Arrow indicators -->
  <polygon points="350,155 347,162 353,162" fill="#495057"/>
  <polygon points="350,235 347,242 353,242" fill="#495057"/>
  <polygon points="350,315 347,322 353,322" fill="#495057"/>
  <polygon points="350,395 347,402 353,402" fill="#495057"/>
  
  <!-- Legend -->
  <text x="350" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
    从监管指令到日常实践的层级递进
  </text>
</svg>
