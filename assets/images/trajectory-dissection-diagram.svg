<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .box { stroke-width: 2; rx: 5; ry: 5; }
      .arrow { stroke: #999; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="25" class="title" text-anchor="middle">Agent 轨迹解剖：从结果评估到过程诊断</text>
  <text x="400" y="42" class="subtitle" text-anchor="middle">138k 轨迹分析揭示五大模型家族的行为差异</text>
  
  <!-- Traditional vs New -->
  <rect x="20" y="60" width="350" height="180" fill="#ffebee" stroke="#e57373" class="box"/>
  <text x="195" y="85" class="label" text-anchor="middle" font-weight="bold">传统评估（结果导向）</text>
  
  <!-- Flow -->
  <rect x="40" y="100" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="120" class="label" text-anchor="middle">Agent 执行任务</text>
  
  <line x1="195" y1="130" x2="195" y2="145" stroke="#999" stroke-width="2"/>
  <polygon points="195,145 190,140 200,140" fill="#999"/>
  
  <rect x="40" y="150" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="170" class="label" text-anchor="middle">最终结果：成功/失败</text>
  
  <line x1="195" y1="180" x2="195" y2="195" stroke="#999" stroke-width="2"/>
  <polygon points="195,195 190,190 200,190" fill="#999"/>
  
  <rect x="40" y="200" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="220" class="label" text-anchor="middle">Pass@1 准确率</text>
  
  <!-- Limitation -->
  <rect x="40" y="240" width="310" height="30" fill="#ffebee" stroke="#e57373" rx="3"/>
  <text x="195" y="260" class="label" text-anchor="middle">局限：无法诊断失败原因</text>
  
  <!-- Arrow -->
  <line x1="380" y1="150" x2="420" y2="150" stroke="#999" stroke-width="2"/>
  <polygon points="420,145 430,150 420,155" fill="#999"/>
  
  <!-- Trajectory Dissection (right) -->
  <rect x="430" y="60" width="350" height="180" fill="#e8f5e9" stroke="#81c784" class="box"/>
  <text x="605" y="85" class="label" text-anchor="middle" font-weight="bold">轨迹解剖（过程诊断）</text>
  
  <!-- Flow -->
  <rect x="450" y="100" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="605" y="120" class="label" text-anchor="middle">Agent 执行任务</text>
  
  <line x1="605" y1="130" x2="605" y2="145" stroke="#999" stroke-width="2"/>
  <polygon points="605,145 600,140 610,140" fill="#999"/>
  
  <!-- Trajectory analysis -->
  <rect x="470" y="150" width="270" height="40" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="605" y="168" class="label" text-anchor="middle" font-weight="bold">轨迹级指标</text>
  <text x="605" y="182" class="label" text-anchor="middle">工具调用序列、状态转换、错误模式</text>
  
  <!-- Behavior profiling -->
  <rect x="470" y="200" width="270" height="30" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="605" y="220" class="label" text-anchor="middle">行为画像：五大模型家族差异</text>
  
  <!-- Results table -->
  <rect x="20" y="270" width="760" height="150" fill="#fff" stroke="#ccc" rx="5"/>
  <text x="400" y="295" class="label" text-anchor="middle" font-weight="bold">五大模型家族行为差异</text>
  
  <!-- Table headers -->
  <line x1="20" y1="310" x2="780" y2="310" stroke="#ccc"/>
  <text x="60" y="325" class="label" font-weight="bold">模型家族</text>
  <text x="250" y="325" class="label" font-weight="bold">典型行为模式</text>
  <text x="450" y="325" class="label" font-weight="bold">失败主因</text>
  <text x="650" y="325" class="label" font-weight="bold">轨迹特征</text>
  
  <!-- Row 1 -->
  <line x1="20" y1="340" x2="780" y2="340" stroke="#eee"/>
  <text x="60" y="355" class="label">GPT-5</text>
  <text x="250" y="355" class="label">系统探索型</text>
  <text x="450" y="355" class="label">过度规划</text>
  <text x="650" y="355" class="label">长轨迹、多工具调用</text>
  
  <!-- Row 2 -->
  <line x1="20" y1="370" x2="780" y2="370" stroke="#eee"/>
  <text x="60" y="385" class="label">Claude</text>
  <text x="250" y="385" class="label">直接执行型</text>
  <text x="450" y="385" class="label">工具误用</text>
  <text x="650" y="385" class="label">短轨迹、少回溯</text>
  
  <!-- Row 3 -->
  <line x1="20" y1="400" x2="780" y2="400" stroke="#eee"/>
  <text x="60" y="415" class="label">Gemini</text>
  <text x="250" y="415" class="label">迭代优化型</text>
  <text x="450" y="415" class="label">状态管理</text>
  <text x="650" y="415" class="label">中等轨迹、多次修正</text>
  
  <!-- Key insight -->
  <rect x="20" y="430" width="760" height="30" fill="#e3f2fd" stroke="#90caf9" rx="3"/>
  <text x="400" y="450" class="label" text-anchor="middle">核心发现：从结果评估到过程诊断——轨迹级指标揭示模型家族的行为差异和失败模式</text>
</svg>
