<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Agent 记忆四维分类法</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#7f8c8d">基于 MIT/IBM/Xerox PARC (arXiv:2606.06448) 的系统级特征分析</text>

  <!-- Main quadrant area -->
  <rect x="120" y="75" width="560" height="380" fill="#ffffff" stroke="#bdc3c7" stroke-width="1.5" rx="4"/>

  <!-- X axis: 存储粒度 -->
  <line x1="120" y1="455" x2="680" y2="455" stroke="#3498db" stroke-width="2"/>
  <text x="120" y="475" text-anchor="middle" font-size="11" fill="#3498db">token-level</text>
  <text x="400" y="475" text-anchor="middle" font-size="11" fill="#3498db">document-level</text>
  <text x="680" y="475" text-anchor="middle" font-size="11" fill="#3498db">session-level</text>
  <text x="400" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">存储粒度 →</text>

  <!-- Y axis: 访问模式 -->
  <line x1="120" y1="75" x2="120" y2="455" stroke="#e74c3c" stroke-width="2"/>
  <text x="100" y="85" text-anchor="end" font-size="11" fill="#e74c3c">graph-based</text>
  <text x="100" y="265" text-anchor="end" font-size="11" fill="#e74c3c">structured indexing</text>
  <text x="100" y="445" text-anchor="end" font-size="11" fill="#e74c3c">flat retrieval</text>
  <text x="65" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50" transform="rotate(-90,65,265)">访问模式 →</text>

  <!-- Grid lines -->
  <line x1="400" y1="75" x2="400" y2="455" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="265" x2="680" y2="265" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Dimension labels on right and bottom -->
  <text x="700" y="130" text-anchor="start" font-size="10" fill="#9b59b6">更新机制:</text>
  <text x="700" y="145" text-anchor="start" font-size="10" fill="#9b59b6">append-only</text>
  <text x="700" y="160" text-anchor="start" font-size="10" fill="#9b59b6">versioned</text>
  <text x="700" y="175" text-anchor="start" font-size="10" fill="#9b59b6">incremental</text>

  <text x="700" y="200" text-anchor="start" font-size="10" fill="#e67e22">控制流:</text>
  <text x="700" y="215" text-anchor="start" font-size="10" fill="#e67e22">passive storage</text>
  <text x="700" y="230" text-anchor="start" font-size="10" fill="#e67e22">LLM-mediated</text>
  <text x="700" y="245" text-anchor="start" font-size="10" fill="#e67e22">agentic control</text>

  <!-- System dots (positioned in quadrant based on architecture) -->
  <!-- Simple systems: flat retrieval + passive storage + append-only -->
  <circle cx="180" cy="400" r="5" fill="#3498db" opacity="0.8"/>
  <text x="190" y="403" font-size="9" fill="#2c3e50">VectorDB</text>

  <circle cx="200" cy="380" r="5" fill="#3498db" opacity="0.8"/>
  <text x="210" y="383" font-size="9" fill="#2c3e50">Simple Cache</text>

  <!-- Mid-tier: structured indexing + LLM-mediated -->
  <circle cx="350" cy="280" r="6" fill="#2ecc71" opacity="0.8"/>
  <text x="360" y="283" font-size="9" fill="#2c3e50">LangChain Memory</text>

  <circle cx="420" cy="300" r="6" fill="#2ecc71" opacity="0.8"/>
  <text x="430" y="303" font-size="9" fill="#2c3e50">AutoGen ChatHistory</text>

  <circle cx="380" cy="250" r="6" fill="#2ecc71" opacity="0.8"/>
  <text x="390" y="253" font-size="9" fill="#2c3e50">CrewAI Memory</text>

  <!-- Complex systems: graph-based + agentic control -->
  <circle cx="600" cy="140" r="7" fill="#e74c3c" opacity="0.8"/>
  <text x="610" y="143" font-size="9" fill="#2c3e50">GraphRAG</text>

  <circle cx="560" cy="160" r="7" fill="#e74c3c" opacity="0.8"/>
  <text x="570" y="163" font-size="9" fill="#2c3e50">MemGPT</text>

  <circle cx="620" cy="120" r="7" fill="#e74c3c" opacity="0.8"/>
  <text x="630" y="123" font-size="9" fill="#2c3e50">Harness-1</text>

  <!-- Medium-complexity: structured + LLM-mediated -->
  <circle cx="480" cy="320" r="5" fill="#f39c12" opacity="0.8"/>
  <text x="490" y="323" font-size="9" fill="#2c3e50">Zep Memory</text>

  <!-- Legend -->
  <rect x="160" y="520" width="12" height="12" fill="#3498db" opacity="0.8"/>
  <text x="178" y="531" font-size="10" fill="#2c3e50">简单系统 (flat retrieval)</text>

  <rect x="340" y="520" width="12" height="12" fill="#2ecc71" opacity="0.8"/>
  <text x="358" y="531" font-size="10" fill="#2c3e50">中等系统 (structured indexing)</text>

  <rect x="560" y="520" width="12" height="12" fill="#e74c3c" opacity="0.8"/>
  <text x="578" y="531" font-size="10" fill="#2c3e50">复杂系统 (graph-based)</text>

  <!-- Arrow annotations -->
  <path d="M 690 300 L 690 400" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6"/>
    </marker>
  </defs>
</svg>
