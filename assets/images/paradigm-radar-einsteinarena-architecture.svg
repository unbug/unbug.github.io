<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .box { stroke-width: 2; rx: 5; ry: 5; }
      .arrow { stroke: #999; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="25" class="title" text-anchor="middle">EinsteinArena：集体智能科学发现平台架构</text>
  <text x="400" y="42" class="subtitle" text-anchor="middle">从工具使用者到科学发现者的范式转变</text>
  
  <!-- Single Agent (left) -->
  <rect x="20" y="60" width="350" height="180" fill="#ffebee" stroke="#e57373" class="box"/>
  <text x="195" y="85" class="label" text-anchor="middle" font-weight="bold">传统单 Agent 科学发现</text>
  
  <!-- Flow -->
  <rect x="40" y="100" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="120" class="label" text-anchor="middle">单 Agent 生成假设</text>
  
  <line x1="195" y1="130" x2="195" y2="145" stroke="#999" stroke-width="2"/>
  <polygon points="195,145 190,140 200,140" fill="#999"/>
  
  <rect x="40" y="150" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="170" class="label" text-anchor="middle">单 Agent 验证假设</text>
  
  <line x1="195" y1="180" x2="195" y2="195" stroke="#999" stroke-width="2"/>
  <polygon points="195,195 190,190 200,190" fill="#999"/>
  
  <rect x="40" y="200" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="220" class="label" text-anchor="middle">单 Agent 得出结论</text>
  
  <!-- Limitation -->
  <rect x="40" y="240" width="310" height="30" fill="#ffebee" stroke="#e57373" rx="3"/>
  <text x="195" y="260" class="label" text-anchor="middle">局限：搜索空间有限、易陷入局部最优</text>
  
  <!-- Arrow -->
  <line x1="380" y1="150" x2="420" y2="150" stroke="#999" stroke-width="2"/>
  <polygon points="420,145 430,150 420,155" fill="#999"/>
  
  <!-- EinsteinArena (right) -->
  <rect x="430" y="60" width="350" height="180" fill="#e8f5e9" stroke="#81c784" class="box"/>
  <text x="605" y="85" class="label" text-anchor="middle" font-weight="bold">EinsteinArena（集体智能）</text>
  
  <!-- Multi-agent flow -->
  <rect x="450" y="100" width="270" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="585" y="120" class="label" text-anchor="middle">多 Agent 并行生成假设</text>
  
  <line x1="585" y1="130" x2="585" y2="145" stroke="#999" stroke-width="2"/>
  <polygon points="585,145 580,140 590,140" fill="#999"/>
  
  <!-- Collaboration layer -->
  <rect x="470" y="150" width="230" height="40" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="585" y="168" class="label" text-anchor="middle" font-weight="bold">集体协作层</text>
  <text x="585" y="182" class="label" text-anchor="middle">假设融合、交叉验证、知识共享</text>
  
  <!-- Results -->
  <rect x="470" y="200" width="230" height="30" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="585" y="220" class="label" text-anchor="middle">多 Agent 并行验证</text>
  
  <!-- Results table -->
  <rect x="20" y="270" width="760" height="150" fill="#fff" stroke="#ccc" rx="5"/>
  <text x="400" y="295" class="label" text-anchor="middle" font-weight="bold">实验成果：12 项 SOTA 突破</text>
  
  <!-- Table headers -->
  <line x1="20" y1="310" x2="780" y2="310" stroke="#ccc"/>
  <text x="60" y="325" class="label" font-weight="bold">科学问题</text>
  <text x="250" y="325" class="label" font-weight="bold">传统方法</text>
  <text x="450" y="325" class="label" font-weight="bold">EinsteinArena</text>
  <text x="650" y="325" class="label" font-weight="bold">提升幅度</text>
  
  <!-- Row 1 -->
  <line x1="20" y1="340" x2="780" y2="340" stroke="#eee"/>
  <text x="60" y="355" class="label">Kissing Number</text>
  <text x="250" y="355" class="label">593</text>
  <text x="450" y="355" class="label" fill="#81c784" font-weight="bold">604</text>
  <text x="650" y="355" class="label">+11</text>
  
  <!-- Row 2 -->
  <line x1="20" y1="370" x2="780" y2="370" stroke="#eee"/>
  <text x="60" y="385" class="label">材料科学</text>
  <text x="250" y="385" class="label">3 项发现</text>
  <text x="450" y="385" class="label" fill="#81c784" font-weight="bold">7 项发现</text>
  <text x="650" y="385" class="label">+133%</text>
  
  <!-- Row 3 -->
  <line x1="20" y1="400" x2="780" y2="400" stroke="#eee"/>
  <text x="60" y="415" class="label">数学证明</text>
  <text x="250" y="415" class="label">12 个定理</text>
  <text x="450" y="415" class="label" fill="#81c784" font-weight="bold">19 个定理</text>
  <text x="650" y="415" class="label">+58%</text>
  
  <!-- Key insight -->
  <rect x="20" y="430" width="760" height="30" fill="#e3f2fd" stroke="#90caf9" rx="3"/>
  <text x="400" y="450" class="label" text-anchor="middle">核心发现：集体智能驱动的科学发现——多 Agent 协作突破单 Agent 搜索空间限制</text>
</svg>
