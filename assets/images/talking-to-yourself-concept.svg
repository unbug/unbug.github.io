<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)" rx="20"/>

  <text x="400" y="60" font-family="'Comic Sans MS', cursive, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#1f2937">
    🗣️ 让模型"自言自语"
  </text>
  <text x="400" y="90" font-family="'Comic Sans MS', cursive, sans-serif" font-size="18" text-anchor="middle" fill="#4b5563">
    告别灾难性遗忘！
  </text>

  <g transform="translate(150, 140)">
    <circle cx="80" cy="80" r="60" fill="url(#brainGrad)" filter="url(#shadow)"/>
    <circle cx="80" cy="80" r="45" fill="#a5b4fc"/>
    <text x="80" y="68" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1e1b4b">🧠</text>
    <text x="80" y="92" font-family="'Comic Sans MS', cursive, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e1b4b">
      LLM
    </text>
    <text x="80" y="170" font-family="'Comic Sans MS', cursive, sans-serif" font-size="14" text-anchor="middle" fill="#374151">
      基础模型
    </text>
  </g>

  <g transform="translate(330, 130)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="45" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">💬</text>
    <text x="70" y="75" font-family="'Comic Sans MS', cursive, sans-serif" font-size="11" text-anchor="middle" fill="#374151">
      自我对话
    </text>
    <text x="70" y="130" font-family="'Comic Sans MS', cursive, sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">
      𝒟self
    </text>
  </g>

  <g transform="translate(550, 140)">
    <circle cx="80" cy="80" r="60" fill="url(#brainGrad)" filter="url(#shadow)"/>
    <circle cx="80" cy="80" r="45" fill="#fef3c7"/>
    <text x="80" y="68" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#92400e">✅</text>
    <text x="80" y="92" font-family="'Comic Sans MS', cursive, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#92400e">
      微调后
    </text>
    <text x="80" y="170" font-family="'Comic Sans MS', cursive, sans-serif" font-size="14" text-anchor="middle" fill="#374151">
      既学新技能
    </text>
    <text x="80" y="190" font-family="'Comic Sans MS', cursive, sans-serif" font-size="14" text-anchor="middle" fill="#374151">
      又不忘旧知识
    </text>
  </g>

  <g transform="translate(220, 180)">
    <path d="M 0 20 L 80 20 L 70 10 M 80 20 L 70 30" stroke="url(#arrowGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <g transform="translate(460, 180)">
    <path d="M 0 20 L 80 20 L 70 10 M 80 20 L 70 30" stroke="url(#arrowGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <g transform="translate(400, 280)">
    <rect x="-180" y="0" width="360" height="80" rx="15" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="35" font-family="'Comic Sans MS', cursive, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1f2937">
      Sa-sft = 自我增强微调
    </text>
    <text x="0" y="60" font-family="'Comic Sans MS', cursive, sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">
      𝒟mix = 𝒟task ∪ 𝒟self
    </text>
  </g>

  <g transform="translate(50, 350)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive, sans-serif" font-size="14" fill="#374151">
      📊 50个测试场景，40个最佳结果！
    </text>
  </g>

  <g transform="translate(550, 350)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive, sans-serif" font-size="14" fill="#374151">
      🎯 准确率仅下降1.6%（普通微调下降10.2%）
    </text>
  </g>

</svg>
