<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" fill="none">
  <rect width="700" height="420" fill="#0d1b2a" rx="12"/>
  
  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" fill="#e6f1ff" font-size="18" font-weight="bold" font-family="system-ui">同等预算下：单智能体 vs 多智能体</text>
  <text x="350" y="58" text-anchor="middle" fill="#8b949e" font-size="12" font-family="system-ui">Equal Token Budget: Single-Agent vs Multi-Agent</text>
  
  <!-- Divider -->
  <line x1="100" y1="75" x2="600" y2="75" stroke="#30363d" stroke-width="1"/>
  
  <!-- Left: Single Agent -->
  <rect x="60" y="90" width="240" height="280" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="180" y="118" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold" font-family="system-ui">单智能体</text>
  <text x="180" y="135" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui">Single-Agent</text>
  
  <!-- Single agent diagram -->
  <rect x="120" y="150" width="120" height="60" rx="6" fill="#0d419d" opacity="0.6"/>
  <text x="180" y="175" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="system-ui">LLM</text>
  <text x="180" y="193" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="system-ui">Unified Context</text>
  
  <line x1="180" y1="210" x2="180" y2="240" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  
  <text x="180" y="260" text-anchor="middle" fill="#e6f1ff" font-size="11" font-family="system-ui">推理推理推理推理</text>
  <text x="180" y="278" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui">Full context utilization</text>
  
  <line x1="100" y1="295" x2="260" y2="295" stroke="#30363d" stroke-width="0.5"/>
  
  <!-- Key metric -->
  <text x="180" y="318" text-anchor="middle" fill="#3fb950" font-size="28" font-weight="bold" font-family="system-ui">最优</text>
  <text x="180" y="338" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui">性能最优</text>
  
  <!-- Right: Multi Agent -->
  <rect x="400" y="90" width="240" height="280" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="520" y="118" text-anchor="middle" fill="#f85149" font-size="14" font-weight="bold" font-family="system-ui">多智能体</text>
  <text x="520" y="135" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui">Multi-Agent</text>
  
  <!-- Multi agent diagram -->
  <rect x="445" y="150" width="60" height="35" rx="4" fill="#6e40c9" opacity="0.5"/>
  <text x="475" y="172" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="system-ui">Agent A</text>
  
  <rect x="535" y="150" width="60" height="35" rx="4" fill="#6e40c9" opacity="0.5"/>
  <text x="565" y="172" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="system-ui">Agent B</text>
  
  <!-- Connection with bottleneck symbol -->
  <line x1="505" y1="167" x2="535" y2="167" stroke="#f85149" stroke-width="1.5"/>
  <text x="520" y="162" text-anchor="middle" fill="#f85149" font-size="9" font-family="system-ui">瓶颈</text>
  
  <rect x="445" y="200" width="60" height="35" rx="4" fill="#6e40c9" opacity="0.5"/>
  <text x="475" y="222" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="system-ui">Agent C</text>
  
  <rect x="535" y="200" width="60" height="35" rx="4" fill="#6e40c9" opacity="0.5"/>
  <text x="565" y="222" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="system-ui">Agent D</text>
  
  <line x1="505" y1="217" x2="535" y2="217" stroke="#f85149" stroke-width="1.5"/>
  <text x="520" y="212" text-anchor="middle" fill="#f85149" font-size="9" font-family="system-ui">瓶颈</text>
  
  <line x1="520" y1="235" x2="520" y2="260" stroke="#f85149" stroke-width="0.5" stroke-dasharray="2,2"/>
  
  <text x="520" y="280" text-anchor="middle" fill="#e6f1ff" font-size="11" font-family="system-ui">信息衰减 + 通信开销</text>
  <text x="520" y="298" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui">Data processing inequality</text>
  
  <line x1="420" y1="315" x2="580" y2="315" stroke="#30363d" stroke-width="0.5"/>
  
  <!-- Key metric -->
  <text x="520" y="338" text-anchor="middle" fill="#f85149" font-size="28" font-weight="bold" font-family="system-ui">次优</text>
  <text x="520" y="355" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui">通信损耗</text>
  
  <!-- Center comparison arrow -->
  <text x="350" y="240" text-anchor="middle" fill="#e6f1ff" font-size="32" font-family="system-ui">≥</text>
  
  <!-- Bottom: Key insight -->
  <rect x="150" y="380" width="400" height="30" rx="6" fill="#1f2937" stroke="#30363d" stroke-width="0.5"/>
  <text x="350" y="400" text-anchor="middle" fill="#e6f1ff" font-size="11" font-family="system-ui">结论：固定预算下，单智能体 = 最强默认架构</text>
</svg>