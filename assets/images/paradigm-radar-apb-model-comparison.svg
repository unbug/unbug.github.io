<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, sans-serif">
  <rect width="1200" height="500" fill="#f8fafc" rx="8"/>
  <text x="600" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">模型表现对比 — 长程规划衰减与工具鲁棒性</text>
  
  <!-- Chart area -->
  <rect x="100" y="60" width="500" height="300" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="350" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">长程规划准确率衰减曲线</text>
  
  <!-- Y axis -->
  <line x1="140" y1="100" x2="140" y2="340" stroke="#94a3b8"/>
  <text x="130" y="105" text-anchor="end" font-size="10" fill="#64748b">100%</text>
  <text x="130" y="180" text-anchor="end" font-size="10" fill="#64748b">75%</text>
  <text x="130" y="255" text-anchor="end" font-size="10" fill="#64748b">50%</text>
  <text x="130" y="330" text-anchor="end" font-size="10" fill="#64748b">25%</text>
  
  <!-- X axis -->
  <line x1="140" y1="340" x2="580" y2="340" stroke="#94a3b8"/>
  <text x="160" y="360" text-anchor="middle" font-size="10" fill="#64748b">3步</text>
  <text x="250" y="360" text-anchor="middle" font-size="10" fill="#64748b">5步</text>
  <text x="340" y="360" text-anchor="middle" font-size="10" fill="#64748b">8步</text>
  <text x="430" y="360" text-anchor="middle" font-size="10" fill="#64748b">10步</text>
  <text x="520" y="360" text-anchor="middle" font-size="10" fill="#64748b">15步+</text>
  
  <!-- Data lines -->
  <!-- Best model: ~72% at 3-5 steps, ~41% at 10+ steps -->
  <polyline points="160,140 250,148 340,190 430,230 520,270" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="160" cy="140" r="4" fill="#3b82f6"/>
  <circle cx="250" cy="148" r="4" fill="#3b82f6"/>
  <circle cx="340" cy="190" r="4" fill="#3b82f6"/>
  <circle cx="430" cy="230" r="4" fill="#3b82f6"/>
  <circle cx="520" cy="270" r="4" fill="#3b82f6"/>
  
  <!-- Worst model: ~55% at 3-5 steps, ~18% at 10+ steps -->
  <polyline points="160,200 250,210 340,260 430,300 520,325" fill="none" stroke="#ef4444" stroke-width="3"/>
  <circle cx="160" cy="200" r="4" fill="#ef4444"/>
  <circle cx="250" cy="210" r="4" fill="#ef4444"/>
  <circle cx="340" cy="260" r="4" fill="#ef4444"/>
  <circle cx="430" cy="300" r="4" fill="#ef4444"/>
  <circle cx="520" cy="325" r="4" fill="#ef4444"/>
  
  <!-- Average model -->
  <polyline points="160,170 250,180 340,225 430,265 520,298" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  
  <!-- Legend -->
  <rect x="160" y="375" width="15" height="3" fill="#3b82f6"/>
  <text x="180" y="380" font-size="10" fill="#475569">最佳模型 (~72%→~41%)</text>
  <rect x="350" y="375" width="15" height="3" fill="#f59e0b"/>
  <text x="370" y="380" font-size="10" fill="#475569">平均模型</text>
  <rect x="500" y="375" width="15" height="3" fill="#ef4444"/>
  <text x="520" y="380" font-size="10" fill="#475569">最差模型 (~55%→~18%)</text>
  
  <!-- Right side: Tool Robustness comparison -->
  <rect x="640" y="60" width="500" height="300" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="890" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">工具鲁棒性 — 准确率下降幅度</text>
  
  <!-- Bar chart -->
  <!-- Redundant Tool Robustness -->
  <text x="670" y="120" font-size="12" font-weight="bold" fill="#334155">冗余工具设置:</text>
  <rect x="670" y="135" width="380" height="25" rx="4" fill="#dbeafe"/>
  <text x="680" y="152" font-size="11" fill="#1e40af">最佳模型: -15% (下降较小)</text>
  
  <rect x="670" y="168" width="380" height="25" rx="4" fill="#fee2e2"/>
  <text x="680" y="185" font-size="11" fill="#991b1b">最差模型: -42% (下降近三倍)</text>
  
  <!-- Corrupted Tool Robustness -->
  <text x="670" y="230" font-size="12" font-weight="bold" fill="#334155">损坏工具设置:</text>
  <rect x="670" y="245" width="380" height="25" rx="4" fill="#fef3c7"/>
  <text x="680" y="262" font-size="11" fill="#92400e">所有模型: &lt;60% (无一达标)</text>
  
  <!-- Key insight box -->
  <rect x="670" y="295" width="380" height="50" rx="6" fill="#fef2f2"/>
  <text x="860" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">关键发现</text>
  <text x="860" y="333" text-anchor="middle" font-size="10" fill="#991b1b">无模型在损坏工具下保持&gt;60%准确率</text>
  
  <!-- Bottom: Calibration rejection -->
  <rect x="100" y="400" width="1040" height="80" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="620" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">不可解任务识别 — 正确拒绝率分布</text>
  
  <!-- Distribution bars -->
  <rect x="200" y="445" width="80" height="25" rx="4" fill="#fee2e2"/>
  <text x="240" y="462" text-anchor="middle" font-size="10" fill="#991b1b">~8%</text>
  
  <rect x="300" y="445" width="80" height="25" rx="4" fill="#ffedd5"/>
  <text x="340" y="462" text-anchor="middle" font-size="10" fill="#9a3412">~15%</text>
  
  <rect x="400" y="445" width="80" height="25" rx="4" fill="#fef3c7"/>
  <text x="440" y="462" text-anchor="middle" font-size="10" fill="#92400e">~22%</text>
  
  <rect x="500" y="445" width="80" height="25" rx="4" fill="#fef9c3"/>
  <text x="540" y="462" text-anchor="middle" font-size="10" fill="#854d0e">~28%</text>
  
  <rect x="600" y="445" width="80" height="25" rx="4" fill="#fef3c7"/>
  <text x="640" y="462" text-anchor="middle" font-size="10" fill="#92400e">~30%</text>
  
  <rect x="700" y="445" width="80" height="25" rx="4" fill="#d1fae5"/>
  <text x="740" y="462" text-anchor="middle" font-size="10" fill="#065f46">~35%</text>
  
  <!-- Range indicator -->
  <line x1="180" y1="490" x2="820" y2="490" stroke="#94a3b8" stroke-width="1"/>
  <text x="170" y="495" text-anchor="end" font-size="10" fill="#64748b">最差</text>
  <text x="830" y="495" font-size="10" fill="#64748b">最佳: 34.7%</text>
  
  <!-- Systematic finding -->
  <rect x="200" y="498" width="800" height="20" rx="4" fill="#fef2f2"/>
  <text x="600" y="512" text-anchor="middle" font-size="10" fill="#dc2626">系统性特征: "过度自信" — 倾向于相信任何任务都可完成</text>
</svg>
