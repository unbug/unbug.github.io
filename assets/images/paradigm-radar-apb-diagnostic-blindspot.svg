<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="Arial, sans-serif">
  <rect width="1200" height="450" fill="#f8fafc" rx="8"/>
  <text x="600" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">端到端成功率的诊断盲区</text>
  
  <!-- Two agents side by side -->
  <!-- Agent A: Planning correct, execution failed -->
  <rect x="60" y="70" width="480" height="350" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#16a34a">Agent A: 规划正确 · 执行失败</text>
  
  <!-- Agent A flow -->
  <rect x="120" y="125" width="360" height="40" rx="6" fill="#dcfce7"/>
  <text x="300" y="150" text-anchor="middle" font-size="13" fill="#166534">Step 1: 选择工具A ✓ (正确)</text>
  
  <rect x="120" y="175" width="360" height="40" rx="6" fill="#dcfce7"/>
  <text x="300" y="200" text-anchor="middle" font-size="13" fill="#166534">Step 2: 选择工具B ✓ (正确)</text>
  
  <rect x="120" y="225" width="360" height="40" rx="6" fill="#dcfce7"/>
  <text x="300" y="250" text-anchor="middle" font-size="13" fill="#166534">Step 3: 选择工具C ✓ (正确)</text>
  
  <rect x="120" y="275" width="360" height="40" rx="6" fill="#dcfce7"/>
  <text x="300" y="300" text-anchor="middle" font-size="13" fill="#166534">Step 4: 执行工具C ✗ (超时/错误)</text>
  
  <!-- Result -->
  <rect x="120" y="335" width="360" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="300" y="363" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">结果: 失败 (执行层问题)</text>
  
  <!-- Agent B: Planning wrong -->
  <rect x="660" y="70" width="480" height="350" rx="12" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="900" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">Agent B: 规划错误 · 执行失败</text>
  
  <!-- Agent B flow -->
  <rect x="720" y="125" width="360" height="40" rx="6" fill="#fee2e2"/>
  <text x="900" y="150" text-anchor="middle" font-size="13" fill="#991b1b">Step 1: 选择工具D ✗ (错误选择)</text>
  
  <rect x="720" y="175" width="360" height="40" rx="6" fill="#fee2e2"/>
  <text x="900" y="200" text-anchor="middle" font-size="13" fill="#991b1b">Step 2: 选择工具E ✗ (方向偏离)</text>
  
  <rect x="720" y="225" width="360" height="40" rx="6" fill="#fee2e2"/>
  <text x="900" y="250" text-anchor="middle" font-size="13" fill="#991b1b">Step 3: 选择工具F ✗ (继续错误)</text>
  
  <rect x="720" y="275" width="360" height="40" rx="6" fill="#fee2e2"/>
  <text x="900" y="300" text-anchor="middle" font-size="13" fill="#991b1b">Step 4: 执行工具F ✗ (错误结果)</text>
  
  <!-- Result -->
  <rect x="720" y="335" width="360" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="900" y="363" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">结果: 失败 (规划层问题)</text>
  
  <!-- Bottom comparison -->
  <rect x="60" y="400" width="1080" height="35" rx="6" fill="#fef3c7"/>
  <text x="600" y="423" text-anchor="middle" font-size="13" fill="#92400e">相同结果(失败) → 完全不同原因 → 端到端成功率无法区分!</text>
</svg>
