<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="860" height="540" fill="#fafafa"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">成本与延迟对比：LLM Hook 方案的工程权衡</text>

  <!-- Left Y-axis: Cost ($) -->
  <text x="50" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" transform="rotate(-90,50,80)">成本 ($/385 case)</text>

  <!-- Right Y-axis: Latency (ms) -->
  <text x="810" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" transform="rotate(90,810,80)">延迟 (ms/case)</text>

  <!-- X-axis labels -->
  <g font-size="11" fill="#555">
    <text x="120" y="470" text-anchor="middle">Deterministic</text>
    <text x="280" y="470" text-anchor="middle">Vec-Only</text>
    <text x="440" y="470" text-anchor="middle">Inscribe-Time LLM</text>
    <text x="600" y="470" text-anchor="middle">Mutation-Time Hook</text>
  </g>

  <!-- Cost bars (left axis, scale: $0-$1.0) -->
  <!-- Deterministic: ~$0.02 -->
  <rect x="85" y="430" width="70" height="10" rx="2" fill="#2ecc71"/>
  <text x="120" y="426" text-anchor="middle" font-size="9" fill="#27ae60">$0.02</text>

  <!-- Vec-Only: ~$0.05 -->
  <rect x="245" y="430" width="70" height="25" rx="2" fill="#f39c12"/>
  <text x="280" y="426" text-anchor="middle" font-size="9" fill="#e67e22">$0.05</text>

  <!-- Inscribe-Time LLM: ~$0.17 -->
  <rect x="405" y="430" width="70" height="85" rx="2" fill="#e67e22"/>
  <text x="440" y="426" text-anchor="middle" font-size="9" fill="#d35400">$0.17</text>

  <!-- Mutation-Time Hook: ~$0.17 -->
  <rect x="565" y="430" width="70" height="85" rx="2" fill="#e67e22"/>
  <text x="600" y="426" text-anchor="middle" font-size="9" fill="#d35400">$0.17</text>

  <!-- Latency bars (right axis, scale: 0-2500ms) -->
  <!-- Deterministic: ~128ms avg (64-191ms range) -->
  <rect x="85" y="380" width="70" height="40" rx="2" fill="#3498db"/>
  <text x="120" y="376" text-anchor="middle" font-size="9" fill="#2980b9">64-191ms</text>

  <!-- Vec-Only: ~50ms -->
  <rect x="245" y="390" width="70" height="30" rx="2" fill="#3498db"/>
  <text x="280" y="386" text-anchor="middle" font-size="9" fill="#2980b9">~50ms</text>

  <!-- Inscribe-Time LLM: ~1500ms (one DeepSeek call) -->
  <rect x="405" y="230" width="70" height="200" rx="2" fill="#e74c3c"/>
  <text x="440" y="226" text-anchor="middle" font-size="9" fill="#c0392b">~1500ms</text>

  <!-- Mutation-Time Hook: ~2300ms -->
  <rect x="565" y="200" width="70" height="230" rx="2" fill="#e74c3c"/>
  <text x="600" y="196" text-anchor="middle" font-size="9" fill="#c0392b">~2300ms</text>

  <!-- Cost scale (left) -->
  <line x1="75" y1="430" x2="75" y2="380" stroke="#ccc" stroke-width="1"/>
  <text x="72" y="432" text-anchor="end" font-size="9" fill="#666">$0</text>
  <text x="72" y="405" text-anchor="end" font-size="9" fill="#666">$0.10</text>
  <text x="72" y="382" text-anchor="end" font-size="9" fill="#666">$0.20</text>

  <!-- Latency scale (right) -->
  <line x1="745" y1="420" x2="745" y2="180" stroke="#ccc" stroke-width="1"/>
  <text x="748" y="422" text-anchor="start" font-size="9" fill="#666">0ms</text>
  <text x="748" y="350" text-anchor="start" font-size="9" fill="#666">1000ms</text>
  <text x="748" y="278" text-anchor="start" font-size="9" fill="#666">2000ms</text>

  <!-- Legend -->
  <rect x="120" y="500" width="14" height="14" rx="2" fill="#27ae60"/>
  <text x="140" y="511" font-size="10" fill="#333">低成本 (&lt;$0.05)</text>

  <rect x="280" y="500" width="14" height="14" rx="2" fill="#f39c12"/>
  <text x="300" y="511" font-size="10" fill="#333">中等成本 ($0.05-0.17)</text>

  <rect x="460" y="500" width="14" height="14" rx="2" fill="#e67e22"/>
  <text x="480" y="511" font-size="10" fill="#333">高成本 ($0.17)</text>

  <rect x="640" y="500" width="14" height="14" rx="2" fill="#3498db"/>
  <text x="660" y="511" font-size="10" fill="#333">低延迟 (&lt;200ms)</text>

  <rect x="760" y="500" width="14" height="14" rx="2" fill="#e74c3c"/>
  <text x="780" y="511" font-size="10" fill="#333">高延迟 (&gt;1000ms)</text>

  <!-- Key insight box -->
  <rect x="60" y="520" width="740" height="0" rx="4" fill="none"/>

  <!-- Source -->
  <text x="430" y="538" text-anchor="middle" font-size="9" fill="#999">Source: Yang, Cornell University / DeepLethe (arXiv:2606.15903v2)</text>

  <!-- Annotation arrows -->
  <line x1="440" y1="315" x2="440" y2="378" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="445" y="350" font-size="9" fill="#c0392b">recall热路径不受影响</text>

  <line x1="600" y1="315" x2="600" y2="378" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="605" y="350" font-size="9" fill="#c0392b">recall热路径不受影响</text>

  <!-- Cost comparison note -->
  <rect x="60" y="480" width="740" height="36" rx="4" fill="#f0f4f8" stroke="#b3d9f2" stroke-width="1"/>
  <text x="430" y="498" text-anchor="middle" font-size="11" fill="#1a5276">LLM hook方案成本极低：每385-case约$0.17 | 延迟代价：deterministic为64-191ms，mutation-time hook约2300ms</text>
  <text x="430" y="512" text-anchor="middle" font-size="10" fill="#666">关键优势：recall热路径完全不受影响，遗忘评估在独立pipeline中运行</text>
</svg>
