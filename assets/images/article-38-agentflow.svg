<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#fafbfc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">AgentFlow: Typed Graph DSL for Multi-Agent Harness Synthesis</text>
  
  <!-- Search Space Box -->
  <rect x="50" y="60" width="300" height="200" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="200" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Search Space</text>
  <text x="200" y="108" text-anchor="middle" font-size="11" fill="#555">Agent Roles</text>
  <text x="200" y="128" text-anchor="middle" font-size="11" fill="#555">Prompts</text>
  <text x="200" y="148" text-anchor="middle" font-size="11" fill="#555">Tools</text>
  <text x="200" y="168" text-anchor="middle" font-size="11" fill="#555">Communication Topology</text>
  <text x="200" y="188" text-anchor="middle" font-size="11" fill="#555">Coordination Protocol</text>
  <text x="200" y="218" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Typed constraints ensure validity</text>
  
  <!-- Feedback Loop -->
  <g transform="translate(400, 100)">
    <circle cx="80" cy="80" r="70" fill="none" stroke="#4CAF50" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="80" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Feedback Loop</text>
    
    <!-- Inner cycle -->
    <path d="M 80 15 L 120 40 L 120 120 L 80 145 L 40 120 L 40 40 Z" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="80" y="60" text-anchor="middle" font-size="10" fill="#2E7D32">Propose</text>
    <text x="80" y="78" text-anchor="middle" font-size="10" fill="#2E7D32">Execute</text>
    <text x="80" y="96" text-anchor="middle" font-size="10" fill="#2E7D32">Score</text>
    <text x="80" y="114" text-anchor="middle" font-size="10" fill="#2E7D32">Diagnose</text>
    
    <!-- Arrows -->
    <polygon points="118,38 122,42 116,44" fill="#4CAF50"/>
    <polygon points="118,122 116,118 122,116" fill="#4CAF50"/>
    <polygon points="42,122 44,118 38,116" fill="#4CAF50"/>
    <polygon points="42,42 38,44 44,40" fill="#4CAF50"/>
  </g>
  
  <!-- Runtime Signals -->
  <rect x="550" y="60" width="200" height="200" rx="8" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
  <text x="650" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Runtime Signals</text>
  <text x="650" y="110" text-anchor="middle" font-size="11" fill="#333">Sanitizer Output</text>
  <text x="650" y="130" text-anchor="middle" font-size="11" fill="#333">Coverage Data</text>
  <text x="650" y="150" text-anchor="middle" font-size="11" fill="#333">Crash Traces</text>
  <text x="650" y="170" text-anchor="middle" font-size="11" fill="#333">Memory States</text>
  <text x="650" y="190" text-anchor="middle" font-size="11" fill="#333">Execution Paths</text>
  
  <!-- Result Box -->
  <rect x="250" y="300" width="300" height="100" rx="8" fill="#fce4ec" stroke="#E91E63" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#C2185B">Results</text>
  <text x="400" y="355" text-anchor="middle" font-size="12" fill="#333">TerminalBench-2: 84.3% (highest)</text>
  <text x="400" y="378" text-anchor="middle" font-size="12" fill="#333">Chrome: 10 zero-days (2 Critical CVE)</text>
  
  <!-- Arrow from search space to result -->
  <line x1="200" y1="260" x2="200" y2="290" stroke="#FF9800" stroke-width="2"/>
  <polygon points="196,288 200,296 204,288" fill="#FF9800"/>
  <line x1="200" y1="290" x2="350" y2="300" stroke="#FF9800" stroke-width="2"/>
  <polygon points="346,298 354,300 348,304" fill="#FF9800"/>
  
  <!-- Arrow from feedback to search space -->
  <path d="M 330 140 Q 280 100 250 140" fill="none" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Arrow from runtime to feedback -->
  <line x1="550" y1="160" x2="470" y2="160" stroke="#2196F3" stroke-width="2"/>
  <polygon points="472,156 464,160 472,164" fill="#2196F3"/>
  
  <!-- Bottom legend -->
  <text x="400" y="450" text-anchor="middle" font-size="11" fill="#888">Harness design: from manual art to automated engineering</text>
</svg>
