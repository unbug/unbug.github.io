<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>
  
  <!-- Main title -->
  <rect x="50" y="20" width="700" height="50" rx="8" fill="#1e293b"/>
  <text x="400" y="52" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">
    AGI 治理：前瞻性与价值对齐
  </text>
  
  <!-- Central concept -->
  <circle cx="400" cy="200" r="100" fill="url(#grad1)" opacity="0.8"/>
  <path d="M 360 200 L 380 180 L 420 180 L 440 200 L 420 220 L 380 220 Z" fill="white" opacity="0.9"/>
  
  <!-- Two key pillars -->
  <rect x="120" y="280" width="200" height="120" rx="8" fill="#dbeafe"/>
  <text x="220" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e40af" text-anchor="middle">前瞻性</text>
  <text x="220" y="340" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a" text-anchor="middle">非被动响应</text>
  <text x="220" y="365" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a" text-anchor="middle">主动治理策略</text>
  
  <rect x="480" y="280" width="200" height="120" rx="8" fill="#dcfce7"/>
  <text x="580" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">价值对齐</text>
  <text x="580" y="340" font-family="Arial, sans-serif" font-size="12" fill="#15803d" text-anchor="middle">人类价值观</text>
  <text x="580" y="365" font-family="Arial, sans-serif" font-size="12" fill="#15803d" text-anchor="middle">最小化风险</text>
  
  <!-- Bottom -->
  <rect x="50" y="430" width="700" height="40" rx="6" fill="#fef3c7"/>
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">
    核心：造福社会 · 安全可控
  </text>
  
</svg>
