<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proactiveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="alignmentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGradient)"/>

  <!-- Title -->
  <rect x="60" y="20" width="680" height="55" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <text x="400" y="53" text-anchor="middle" fill="#1e293b" font-size="24" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    AGI 治理：前瞻性与价值对齐
  </text>
  <text x="400" y="74" text-anchor="middle" fill="#64748b" font-size="14" font-family="system-ui, -apple-system, sans-serif">
    Proactive Governance & Value Alignment · Springer Nature 2025
  </text>

  <!-- Decorative circles -->
  <circle cx="750" cy="40" r="100" fill="#3b82f6" opacity="0.06"/>
  <circle cx="50" cy="380" r="120" fill="#10b981" opacity="0.06"/>
  <circle cx="400" cy="210" r="180" fill="#3b82f6" opacity="0.03"/>

  <!-- Center concept -->
  <g transform="translate(350, 100)">
    <circle cx="0" cy="0" r="55" fill="#3b82f6" opacity="0.85"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#10b981" stroke-width="2" opacity="0.7"/>
    <path d="M 0 -35 L 3 -25 L -3 -15 Z" fill="white"/>
    <text x="0" y="12" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      AGI 治理
    </text>
    <text x="0" y="32" text-anchor="middle" fill="#3b82f6" font-size="11" font-family="system-ui, -apple-system, sans-serif">
      Core Concepts
    </text>
  </g>

  <!-- Left card: Proactive Governance -->
  <g transform="translate(60, 180)">
    <rect width="320" height="200" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="320" height="4" rx="10" fill="url(#proactiveGradient)"/>
    <text x="160" y="30" text-anchor="middle" fill="#3b82f6" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🔮 前瞻性治理
    </text>
    <rect x="0" y="48" width="320" height="2" fill="#3b82f6" opacity="0.2"/>
    <g transform="translate(25, 62)">
      <text x="0" y="0" fill="#64748b" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">核心特点:</text>
      <text x="25" y="20" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 非被动响应式治理</text>
      <text x="25" y="40" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 主动预测未来趋势</text>
      <text x="25" y="60" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 提前制定应对策略</text>
      <text x="25" y="80" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 动态调整治理框架</text>
    </g>
  </g>

  <!-- Right card: Value Alignment -->
  <g transform="translate(420, 180)">
    <rect width="320" height="200" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="320" height="4" rx="10" fill="url(#alignmentGradient)"/>
    <text x="160" y="30" text-anchor="middle" fill="#10b981" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      ✨ 价值对齐
    </text>
    <rect x="0" y="48" width="320" height="2" fill="#10b981" opacity="0.2"/>
    <g transform="translate(25, 62)">
      <text x="0" y="0" fill="#64748b" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">核心价值:</text>
      <text x="25" y="20" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 人类价值观优先</text>
      <text x="25" y="40" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 最小化 AGI 风险</text>
      <text x="25" y="60" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 确保造福社会</text>
      <text x="25" y="80" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 安全可控发展</text>
    </g>
  </g>

  <!-- Bottom summary card -->
  <g transform="translate(160, 410)">
    <rect x="0" y="0" width="480" height="35" rx="6" fill="#f59e0b" opacity="0.85"/>
    <text x="240" y="18" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      ⚖️ 核心目标：造福社会 · 安全可控
    </text>
    <text x="240" y="32" text-anchor="middle" fill="white" font-size="10" font-family="system-ui, -apple-system, sans-serif">
      平衡创新与风险 · 实现 AGI 的可持续繁荣
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="770" cy="390" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="770" cy="30" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="30" cy="390" r="3" fill="#3b82f6" opacity="0.4"/>

  <!-- Footer -->
  <text x="400" y="405" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui, -apple-system, sans-serif">
    AGI Governance: Proactive Strategies & Value Alignment · DOI: 10.1007/s43681-024-00642-z
  </text>
</svg>
