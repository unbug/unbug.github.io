<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>

  <!-- 装饰性古文文字 -->
  <text x="50" y="80" fill="#e94560" opacity="0.1" font-size="60" font-family="serif">道</text>
  <text x="700" y="120" fill="#00ff88" opacity="0.08" font-size="50" font-family="serif">易</text>
  <text x="100" y="380" fill="#e94560" opacity="0.08" font-size="45" font-family="serif">术</text>
  <text x="650" y="360" fill="#00ff88" opacity="0.1" font-size="55" font-family="serif">理</text>

  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    文言文越狱攻击成功率
  </text>
  <text x="400" y="78" text-anchor="middle" fill="#aaaaaa" font-size="14" font-family="system-ui, -apple-system, sans-serif">
    CC-BOS vs 现有方法 (ASR: Attack Success Rate)
  </text>

  <!-- 主卡片 -->
  <rect x="60" y="100" width="680" height="260" rx="12" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- 图表区域 -->
  <g transform="translate(80, 130)">
    <!-- 模型标签和柱状图 -->
    <g>
      <!-- Gemini -->
      <text x="10" y="30" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">Gemini-2.5</text>
      <rect x="120" y="15" width="380" height="22" rx="4" fill="#1a1a2e" opacity="0.5"/>
      <rect x="120" y="15" width="380" height="22" rx="4" fill="url(#successGrad)" filter="url(#glow)"/>
      <text x="510" y="30" fill="#00ff88" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    </g>

    <!-- Claude -->
    <g>
      <text x="10" y="70" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">Claude-3.7</text>
      <rect x="120" y="55" width="380" height="22" rx="4" fill="#1a1a2e" opacity="0.5"/>
      <rect x="120" y="55" width="380" height="22" rx="4" fill="url(#successGrad)" filter="url(#glow)"/>
      <text x="510" y="70" fill="#00ff88" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    </g>

    <!-- GPT-4o -->
    <g>
      <text x="10" y="110" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">GPT-4o</text>
      <rect x="120" y="95" width="380" height="22" rx="4" fill="#1a1a2e" opacity="0.5"/>
      <rect x="120" y="95" width="380" height="22" rx="4" fill="url(#successGrad)" filter="url(#glow)"/>
      <text x="510" y="110" fill="#00ff88" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    </g>

    <!-- Deepseek -->
    <g>
      <text x="10" y="150" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">Deepseek-R</text>
      <rect x="120" y="135" width="380" height="22" rx="4" fill="#1a1a2e" opacity="0.5"/>
      <rect x="120" y="135" width="380" height="22" rx="4" fill="url(#successGrad)" filter="url(#glow)"/>
      <text x="510" y="150" fill="#00ff88" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    </g>

    <!-- Qwen -->
    <g>
      <text x="10" y="190" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">Qwen3</text>
      <rect x="120" y="175" width="380" height="22" rx="4" fill="#1a1a2e" opacity="0.5"/>
      <rect x="120" y="175" width="380" height="22" rx="4" fill="url(#successGrad)" filter="url(#glow)"/>
      <text x="510" y="190" fill="#00ff88" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    </g>

    <!-- Grok -->
    <g>
      <text x="10" y="230" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">Grok-3</text>
      <rect x="120" y="215" width="380" height="22" rx="4" fill="#1a1a2e" opacity="0.5"/>
      <rect x="120" y="215" width="380" height="22" rx="4" fill="url(#successGrad)" filter="url(#glow)"/>
      <text x="510" y="230" fill="#00ff88" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    </g>
  </g>

  <!-- 右侧信息卡片 -->
  <g transform="translate(560, 130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#0f3460" opacity="0.8"/>
    <text x="80" y="28" text-anchor="middle" fill="#00ff88" font-size="24" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">100%</text>
    <text x="80" y="50" text-anchor="middle" fill="#aaaaaa" font-size="12" font-family="system-ui, -apple-system, sans-serif">平均成功率</text>
    <text x="80" y="68" text-anchor="middle" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">6个主流大模型</text>

    <rect x="0" y="95" width="160" height="55" rx="8" fill="#0f3460" opacity="0.8"/>
    <text x="80" y="120" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">1.1-2.4次</text>
    <text x="80" y="140" text-anchor="middle" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">平均查询次数</text>

    <rect x="0" y="160" width="160" height="55" rx="8" fill="#0f3460" opacity="0.8"/>
    <text x="80" y="185" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">文言文 · 拉丁语 · 梵语</text>
    <text x="80" y="205" text-anchor="middle" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">跨语言有效</text>
  </g>

  <!-- 底部 -->
  <text x="400" y="395" text-anchor="middle" fill="#666666" font-size="12" font-family="system-ui, -apple-system, sans-serif">
    ICLR 2026 · Obscure but Effective: Classical Chinese Jailbreak
  </text>
</svg>
