<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="url(#bgGrad)"/>

  <!-- Title area -->
  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Lean4Agent：用依赖类型语言验证 Agent</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" fill="#555">FormalAgentLib + LeanEvolve = 从经验主义到数学证明</text>

  <!-- Central diagram: Formal verification loop -->
  <rect x="230" y="90" width="400" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="430" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">验证-修订闭环</text>

  <!-- Step 1: Agent Workflow -->
  <rect x="260" y="135" width="120" height="55" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="320" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Agent工作流</text>
  <text x="320" y="175" text-anchor="middle" font-size="9" fill="#1565c0">ReAct / Plan-Solve</text>

  <!-- Arrow -->
  <line x1="380" y1="162" x2="410" y2="162" stroke="#555" stroke-width="2"/>
  <polygon points="410,157 420,162 410,167" fill="#555"/>

  <!-- Step 2: FormalAgentLib -->
  <rect x="420" y="135" width="120" height="55" rx="6" fill="#e2d9f3" stroke="#6f42c1" stroke-width="2"/>
  <text x="480" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">FormalAgentLib</text>
  <text x="480" y="175" text-anchor="middle" font-size="9" fill="#4a235a">Lean4形式化建模</text>

  <!-- Arrow down -->
  <line x1="480" y1="190" x2="480" y2="215" stroke="#555" stroke-width="2"/>
  <polygon points="477,213 480,221 483,213" fill="#555"/>

  <!-- Step 3: Verification Result -->
  <rect x="420" y="220" width="120" height="55" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="480" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">验证结果</text>
  <text x="480" y="260" text-anchor="middle" font-size="9" fill="#856404">通过 / 发现缺陷</text>

  <!-- Arrow left (feedback) -->
  <line x1="420" y1="247" x2="380" y2="247" stroke="#dc3545" stroke-width="1.5"/>
  <polygon points="380,242 372,247 380,252" fill="#dc3545"/>

  <!-- Step 4: LeanEvolve -->
  <rect x="260" y="220" width="120" height="55" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="320" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">LeanEvolve</text>
  <text x="320" y="260" text-anchor="middle" font-size="9" fill="#155724">自动修订工作流</text>

  <!-- Arrow up (re-verify) -->
  <line x1="320" y1="220" x2="320" y2="190" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="317,192 320,184 323,192" fill="#28a745"/>

  <!-- Left panel: FormalAgentLib components -->
  <rect x="30" y="100" width="180" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="120" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">FormalAgentLib</text>

  <rect x="45" y="145" width="150" height="50" rx="4" fill="#e2d9f3"/>
  <text x="120" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">前置/后置条件</text>
  <text x="120" y="183" text-anchor="middle" font-size="9" fill="#4a235a">工具调用类型约束</text>

  <rect x="45" y="205" width="150" height="50" rx="4" fill="#e2d9f3"/>
  <text x="120" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">状态转移约束</text>
  <text x="120" y="243" text-anchor="middle" font-size="9" fill="#4a235a">类型系统编码</text>

  <rect x="45" y="265" width="150" height="50" rx="4" fill="#e2d9f3"/>
  <text x="120" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">终止性证明</text>
  <text x="120" y="303" text-anchor="middle" font-size="9" fill="#4a235a">无死循环保证</text>

  <rect x="45" y="325" width="150" height="50" rx="4" fill="#e2d9f3"/>
  <text x="120" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">语义一致性</text>
  <text x="120" y="363" text-anchor="middle" font-size="9" fill="#4a235a">确定性而非概率性</text>

  <!-- Right panel: Key results -->
  <rect x="650" y="100" width="180" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="740" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">实验结果</text>

  <!-- Big stat -->
  <rect x="665" y="145" width="150" height="70" rx="6" fill="#d4edda"/>
  <text x="740" y="182" text-anchor="middle" font-size="28" font-weight="bold" fill="#155724">+11.94%</text>
  <text x="740" y="205" text-anchor="middle" font-size="10" fill="#155724">验证工作流性能提升</text>

  <!-- LeanEvolve -->
  <rect x="665" y="225" width="150" height="70" rx="6" fill="#e3f2fd"/>
  <text x="740" y="262" text-anchor="middle" font-size="28" font-weight="bold" fill="#1565c0">+7.47%</text>
  <text x="740" y="285" text-anchor="middle" font-size="10" fill="#1565c0">LeanEvolve额外提升</text>

  <!-- Models -->
  <rect x="665" y="305" width="150" height="40" rx="4" fill="#f8f9fa"/>
  <text x="740" y="330" text-anchor="middle" font-size="10" fill="#495057">Claude Sonnet 4 · GPT-4o</text>

  <!-- Bottom insight -->
  <rect x="30" y="420" width="800" height="50" rx="6" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
  <text x="430" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c5460">核心突破：形式化验证从"事后审计"变为"设计驱动"，打破"形式方法只适用于理论场景"的认知</text>

  <!-- Source -->
  <text x="430" y="495" text-anchor="middle" font-size="11" fill="#999">Source: Ruida Wang et al., UC Berkeley, arXiv:2606.06523 (Lean4Agent)</text>

  <!-- Paradigm Radar badge -->
  <rect x="700" y="495" width="120" height="24" rx="3" fill="#fff3cd"/>
  <text x="760" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#856404">AI Paradigm Radar</text>

  <!-- Article number -->
  <rect x="40" y="495" width="100" height="24" rx="3" fill="#e3f2fd"/>
  <text x="90" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Article #95</text>

  <!-- Date badge -->
  <rect x="40" y="522" width="100" height="20" rx="3" fill="#e8f5e9"/>
  <text x="90" y="536" text-anchor="middle" font-size="8" fill="#2e7d32">Published: 2026-07-07</text>
</svg>
