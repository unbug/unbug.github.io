<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">A2A 协议交互流程</text>

  <!-- Subject Agent column -->
  <rect x="60" y="60" width="140" height="390" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#60a5fa">Subject Agent</text>

  <!-- Step 1: Request -->
  <rect x="75" y="120" width="110" height="50" rx="8" fill="#3b82f6" opacity="0.8"/>
  <text x="130" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">构造请求</text>
  <text x="130" y="157" text-anchor="middle" font-size="9" fill="#bfdbfe">{agent_response, test_input}</text>

  <!-- Arrow right -->
  <line x1="200" y1="145" x2="380" y2="145" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="380,145 370,139 370,151" fill="#60a5fa"/>
  <text x="290" y="135" text-anchor="middle" font-size="10" fill="#94a3b8">A2A Request</text>

  <!-- Judge Agent column -->
  <rect x="380" y="60" width="140" height="390" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#c084fc">Judge Agent</text>

  <!-- Step 2: Parse -->
  <rect x="395" y="120" width="110" height="50" rx="8" fill="#a855f7" opacity="0.8"/>
  <text x="450" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">解析请求</text>
  <text x="450" y="157" text-anchor="middle" font-size="9" fill="#e9d5ff">提取 agent_response</text>

  <!-- Arrow down -->
  <line x1="450" y1="170" x2="450" y2="200" stroke="#c084fc" stroke-width="2"/>
  <polygon points="450,200 445,190 455,190" fill="#c084fc"/>

  <!-- Step 3: MCP Call -->
  <rect x="395" y="200" width="110" height="50" rx="8" fill="#a855f7" opacity="0.8"/>
  <text x="450" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MCP 工具调用</text>
  <text x="450" y="237" text-anchor="middle" font-size="9" fill="#e9d5ff">code_executor → result</text>

  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="280" stroke="#c084fc" stroke-width="2"/>
  <polygon points="450,280 445,270 455,270" fill="#c084fc"/>

  <!-- Step 4: Score -->
  <rect x="395" y="280" width="110" height="50" rx="8" fill="#a855f7" opacity="0.8"/>
  <text x="450" y="302" text-anchor="middle" font-size="11" font-weight="bold" fill="white">评分计算</text>
  <text x="450" y="317" text-anchor="middle" font-size="9" fill="#e9d5ff">对比参考答案 → score</text>

  <!-- Arrow down -->
  <line x1="450" y1="330" x2="450" y2="360" stroke="#c084fc" stroke-width="2"/>
  <polygon points="450,360 445,350 455,350" fill="#c084fc"/>

  <!-- Step 5: Snapshot -->
  <rect x="395" y="360" width="110" height="50" rx="8" fill="#a855f7" opacity="0.8"/>
  <text x="450" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="white">生成快照</text>
  <text x="450" y="397" text-anchor="middle" font-size="9" fill="#e9d5ff">capture_snapshot()</text>

  <!-- Arrow left -->
  <line x1="380" y1="385" x2="200" y2="385" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="200,385 210,379 210,391" fill="#60a5fa"/>
  <text x="290" y="375" text-anchor="middle" font-size="10" fill="#94a3b8">A2A Response</text>

  <!-- Step 6: Receive -->
  <rect x="75" y="360" width="110" height="50" rx="8" fill="#3b82f6" opacity="0.8"/>
  <text x="130" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="white">接收响应</text>
  <text x="130" y="397" text-anchor="middle" font-size="9" fill="#bfdbfe">{score, details, snapshot}</text>

  <!-- Right side: MCP layer detail -->
  <rect x="580" y="60" width="180" height="390" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="670" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#e2e8f0">MCP 工具层</text>

  <!-- Tool boxes -->
  <rect x="595" y="110" width="150" height="36" rx="6" fill="#334155"/>
  <text x="670" y="132" text-anchor="middle" font-size="11" fill="#e2e8f0">代码执行沙箱</text>

  <rect x="595" y="160" width="150" height="36" rx="6" fill="#334155"/>
  <text x="670" y="182" text-anchor="middle" font-size="11" fill="#e2e8f0">网页浏览器</text>

  <rect x="595" y="210" width="150" height="36" rx="6" fill="#334155"/>
  <text x="670" y="232" text-anchor="middle" font-size="11" fill="#e2e8f0">医疗知识库</text>

  <rect x="595" y="260" width="150" height="36" rx="6" fill="#334155"/>
  <text x="670" y="282" text-anchor="middle" font-size="11" fill="#e2e8f0">静态分析器</text>

  <rect x="595" y="310" width="150" height="36" rx="6" fill="#334155"/>
  <text x="670" y="332" text-anchor="middle" font-size="11" fill="#e2e8f0">数学推理引擎</text>

  <!-- Connection from Judge to MCP -->
  <line x1="520" y1="225" x2="580" y2="225" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom: Protocol spec -->
  <rect x="60" y="465" width="700" height="25" rx="6" fill="#6366f1" opacity="0.15"/>
  <text x="400" y="482" text-anchor="middle" font-size="11" fill="#a5b4fc">A2A Protocol v1.0 — 结构化消息格式 · 语义互操作 · 版本协商 · 错误处理</text>
</svg>
