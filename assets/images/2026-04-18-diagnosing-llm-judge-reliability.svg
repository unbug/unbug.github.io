<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="300" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="300" y="42" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">LLM Judge Reliability</text>
  <text x="300" y="64" text-anchor="middle" font-size="12" fill="#666">Conformal Prediction Sets &amp; Transitivity Violations</text>
  
  <!-- Left: Transitivity Triangle -->
  <g transform="translate(100, 170)">
    <text x="0" y="-70" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Transitivity</text>
    
    <!-- Triangle -->
    <line x1="0" y1="-40" x2="55" y2="15" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="55" y1="15" x2="-55" y2="15" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="-55" y1="15" x2="0" y2="-40" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
    
    <!-- Nodes -->
    <circle cx="0" cy="-40" r="18" fill="#3b82f6"/>
    <text x="0" y="-35" text-anchor="middle" font-size="11" font-weight="bold" fill="white">A</text>
    
    <circle cx="55" cy="15" r="18" fill="#3b82f6"/>
    <text x="55" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">B</text>
    
    <circle cx="-55" cy="15" r="18" fill="#3b82f6"/>
    <text x="-55" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C</text>
    
    <!-- Violation label -->
    <text x="0" y="55" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">33-67% violation rate</text>
  </g>
  
  <!-- Right: Reliability Scale -->
  <g transform="translate(420, 170)">
    <text x="0" y="-70" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Reliability</text>
    
    <!-- Bar chart -->
    <rect x="-60" y="10" width="45" height="60" fill="#3b82f6" rx="4" opacity="0.85"/>
    <text x="-37" y="88" text-anchor="middle" font-size="9" fill="#666">Relevance</text>
    <text x="-37" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b82f6">3.0</text>
    
    <rect x="-10" y="30" width="45" height="40" fill="#f59e0b" rx="4" opacity="0.85"/>
    <text x="13" y="88" text-anchor="middle" font-size="9" fill="#666">Coherence</text>
    <text x="13" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="#f59e0b">3.9</text>
    
    <rect x="35" y="45" width="45" height="25" fill="#ef4444" rx="4" opacity="0.85"/>
    <text x="57" y="88" text-anchor="middle" font-size="9" fill="#666">Fluency</text>
    <text x="57" y="40" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">4.9</text>
    
    <!-- Scale label -->
    <text x="0" y="105" text-anchor="middle" font-size="9" fill="#999">Avg set size (1-5 scale)</text>
  </g>
  
  <!-- Arrow between sections -->
  <line x1="230" y1="170" x2="300" y2="170" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Bottom stats -->
  <text x="300" y="270" text-anchor="middle" font-size="11" fill="#999">N = 1,918 documents  |  rs = +0.576  |  p &lt; 10^{-100}</text>
  
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
