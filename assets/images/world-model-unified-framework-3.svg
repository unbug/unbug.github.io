<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- 装饰性几何图形 -->
  <circle cx="100" cy="100" r="50" fill="#f093fb" opacity="0.2"/>
  <circle cx="700" cy="300" r="70" fill="#f093fb" opacity="0.15"/>
  <rect x="600" y="50" width="100" height="100" fill="#f093fb" opacity="0.1" transform="rotate(45 650 100)"/>
  
  <!-- 神经网络节点装饰 -->
  <g opacity="0.3">
    <circle cx="200" cy="200" r="8" fill="#f093fb"/>
    <circle cx="250" cy="180" r="6" fill="#f093fb"/>
    <circle cx="300" cy="220" r="7" fill="#f093fb"/>
    <circle cx="350" cy="190" r="5" fill="#f093fb"/>
    <line x1="208" y1="200" x2="244" y2="183" stroke="#f093fb" stroke-width="2"/>
    <line x1="256" y1="183" x2="293" y2="215" stroke="#f093fb" stroke-width="2"/>
    <line x1="307" y1="217" x2="345" y2="195" stroke="#f093fb" stroke-width="2"/>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" filter="url(#shadow)">
    World Model
  </text>
  
  <!-- 副标题 -->
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.9">
    统一框架3
  </text>
  
  <!-- 底部装饰线 -->
  <line x1="250" y1="250" x2="550" y2="250" stroke="#f093fb" stroke-width="3" opacity="0.6"/>
  
  <!-- 图标占位符 -->
  <g transform="translate(400, 320)">
    <circle r="30" fill="#f093fb" opacity="0.3"/>
    <text y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">🤖</text>
  </g>
</svg>