<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#ecf0f1">Remember When It Matters: Proactive Memory Agent</text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#95a5a6">Meta AI | arXiv:2607.08716</text>

  <!-- Behavioral State Decay Concept -->
  <rect x="60" y="90" width="680" height="80" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="400" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Behavioral State Decay — Information Exists but No Longer Influences Decisions</text>

  <!-- Timeline showing decay -->
  <line x1="120" y1="145" x2="680" y2="145" stroke="#34495e" stroke-width="2"/>
  <circle cx="160" cy="145" r="6" fill="#2ecc71"/>
  <text x="160" y="165" text-anchor="middle" font-size="10" fill="#95a5a6">Step 1</text>
  <circle cx="300" cy="145" r="6" fill="#f1c40f"/>
  <text x="300" y="165" text-anchor="middle" font-size="10" fill="#95a5a6">Step 5</text>
  <circle cx="440" cy="145" r="6" fill="#e67e22"/>
  <text x="440" y="165" text-anchor="middle" font-size="10" fill="#95a5a6">Step 10</text>
  <circle cx="580" cy="145" r="6" fill="#e74c3c"/>
  <text x="580" y="165" text-anchor="middle" font-size="10" fill="#95a5a6">Step 20+</text>

  <!-- Dual Agent Architecture -->
  <rect x="60" y="200" width="340" height="180" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="230" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Dual-Agent Architecture</text>

  <!-- Action Agent -->
  <rect x="90" y="245" width="280" height="60" rx="6" fill="url(#actionGrad)"/>
  <text x="230" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#ecf0f1">Action Agent</text>
  <text x="230" y="290" text-anchor="middle" font-size="11" fill="#bdc3c7">Executes Task Actions</text>

  <!-- Memory Agent -->
  <rect x="90" y="315" width="280" height="60" rx="6" fill="url(#memoryGrad)"/>
  <text x="230" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#ecf0f1">Memory Agent</text>
  <text x="230" y="360" text-anchor="middle" font-size="11" fill="#bdc3c7">Extracts, Stores & Selectively Intervenes</text>

  <!-- Intervention Flow -->
  <rect x="420" y="200" width="320" height="180" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="580" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Selective Intervention Pipeline</text>

  <!-- Step 1: Monitor -->
  <rect x="445" y="245" width="270" height="30" rx="4" fill="#9b59b6"/>
  <text x="580" y="265" text-anchor="middle" font-size="12" fill="#ecf0f1">① Monitor Recent Trajectory</text>

  <!-- Step 2: Extract -->
  <rect x="445" y="283" width="270" height="30" rx="4" fill="#8e44ad"/>
  <text x="580" y="303" text-anchor="middle" font-size="12" fill="#ecf0f1">② Extract Key Information</text>

  <!-- Step 3: Evaluate -->
  <rect x="445" y="321" width="270" height="30" rx="4" fill="#7d3c98"/>
  <text x="580" y="341" text-anchor="middle" font-size="12" fill="#ecf0f1">③ Evaluate Decision Importance</text>

  <!-- Step 4: Inject -->
  <rect x="445" y="359" width="270" height="30" rx="4" fill="#6c3483"/>
  <text x="580" y="379" text-anchor="middle" font-size="12" fill="#ecf0f1">④ Inject Reminder (if threshold met)</text>

  <!-- Results Section -->
  <rect x="60" y="400" width="680" height="85" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="400" y="425" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Performance Gains (Claude Sonnet 4.5)</text>

  <!-- Terminal-Bench -->
  <rect x="90" y="440" width="300" height="28" rx="4" fill="#2ecc71"/>
  <text x="395" y="459" font-size="12" fill="#ecf0f1">Terminal-Bench 2.0: 37.6% → 45.9% (+8.3pp)</text>

  <!-- tau^2-Bench -->
  <rect x="410" y="440" width="300" height="28" rx="4" fill="#27ae60"/>
  <text x="715" y="459" font-size="12" fill="#ecf0f1">tau²-Bench: 55.0% → 61.8% (+6.8pp)</text>

</svg>
