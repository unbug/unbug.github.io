<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">五种操作模式矩阵</text>

  <!-- Axis labels -->
  <text x="60" y="100" text-anchor="middle" font-size="13" fill="#94a3b8" transform="rotate(-90,60,100)">环境保真度 →</text>
  <text x="400" y="475" text-anchor="middle" font-size="13" fill="#94a3b8">透明度 ← 封闭 | 开放 →</text>

  <!-- Grid -->
  <rect x="120" y="60" width="560" height="380" rx="8" fill="#1e293b"/>

  <!-- Quadrant grid lines -->
  <line x1="400" y1="60" x2="400" y2="440" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="250" x2="680" y2="250" stroke="#334155" stroke-width="1"/>

  <!-- Mode 1: Open Assessment (bottom-right) -->
  <rect x="420" y="270" width="240" height="150" rx="8" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
  <text x="540" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#a5b4fc">开放评估</text>
  <text x="540" y="320" text-anchor="middle" font-size="11" fill="#c7d2fe">Open Assessment</text>
  <text x="540" y="345" text-anchor="middle" font-size="10" fill="#94a3b8">高透明度 · 低环境保真度</text>
  <text x="540" y="365" text-anchor="middle" font-size="10" fill="#94a3b8">学术研究 · 基准竞赛</text>
  <text x="540" y="385" text-anchor="middle" font-size="10" fill="#94a3b8">298 Judge × 467 Subject</text>

  <!-- Mode 2: Privacy-Preserving (top-left) -->
  <rect x="140" y="80" width="240" height="150" rx="8" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <text x="260" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#fca5a5">隐私保护评估</text>
  <text x="260" y="130" text-anchor="middle" font-size="11" fill="#fecaca">Privacy-Preserving</text>
  <text x="260" y="155" text-anchor="middle" font-size="10" fill="#94a3b8">低透明度 · 中环境保真度</text>
  <text x="260" y="175" text-anchor="middle" font-size="10" fill="#94a3b8">加密通信 · 零知识证明</text>
  <text x="260" y="195" text-anchor="middle" font-size="10" fill="#94a3b8">商业闭源模型评估</text>

  <!-- Mode 3: Reproducible (bottom-left) -->
  <rect x="140" y="270" width="240" height="150" rx="8" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="2"/>
  <text x="260" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#fcd34d">可复现评估</text>
  <text x="260" y="320" text-anchor="middle" font-size="11" fill="#fef3c7">Reproducible</text>
  <text x="260" y="345" text-anchor="middle" font-size="10" fill="#94a3b8">低透明度 · 中环境保真度</text>
  <text x="260" y="365" text-anchor="middle" font-size="10" fill="#94a3b8">完整执行快照</text>
  <text x="260" y="385" text-anchor="middle" font-size="10" fill="#94a3b8">capture_snapshot()</text>

  <!-- Mode 4: Hybrid (top-right) -->
  <rect x="420" y="80" width="240" height="150" rx="8" fill="#ec4899" opacity="0.3" stroke="#ec4899" stroke-width="2"/>
  <text x="540" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#f9a8d4">混合模式</text>
  <text x="540" y="130" text-anchor="middle" font-size="11" fill="#fce7f3">Hybrid Mode</text>
  <text x="540" y="155" text-anchor="middle" font-size="10" fill="#94a3b8">混合透明度 · 中环境保真度</text>
  <text x="540" y="175" text-anchor="middle" font-size="10" fill="#94a3b8">公开评分 + 私有日志</text>
  <text x="540" y="195" text-anchor="middle" font-size="10" fill="#94a3b8">企业合规场景</text>

  <!-- Mode 5: Production-Aligned (center) -->
  <rect x="320" y="170" width="160" height="120" rx="8" fill="#10b981" opacity="0.4" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#6ee7b7">生产对齐评估</text>
  <text x="400" y="218" text-anchor="middle" font-size="10" fill="#a7f3d0">Production-Aligned</text>
  <text x="400" y="240" text-anchor="middle" font-size="9" fill="#6ee7b7">高透明度 · 高环境保真度</text>
  <text x="400" y="258" text-anchor="middle" font-size="9" fill="#a7f3d0">评估 = 生产环境</text>
  <text x="400" y="276" text-anchor="middle" font-size="9" fill="#a7f3d0">缩小测试-生产差距</text>

  <!-- Arrow annotations -->
  <line x1="140" y1="55" x2="680" y2="55" stroke="#64748b" stroke-width="1"/>
  <polygon points="680,55 670,51 670,59" fill="#64748b"/>
  <text x="400" y="48" text-anchor="middle" font-size="10" fill="#94a3b8">透明度</text>

  <line x1="115" y1="440" x2="115" y2="60" stroke="#64748b" stroke-width="1"/>
  <polygon points="115,60 111,70 119,70" fill="#64748b"/>
  <text x="105" y="250" text-anchor="middle" font-size="10" fill="#94a3b8" transform="rotate(-90,105,250)">环境保真度</text>
</svg>
