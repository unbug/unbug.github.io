<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plannerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="diagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9a3412;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="harnessGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Column tag -->
  <rect x="490" y="22" width="220" height="32" rx="16" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="43" font-family="sans-serif" font-size="14" font-weight="bold" fill="#93c5fd" text-anchor="middle">AI 范式雷达</text>

  <!-- Main Harness outer frame -->
  <rect x="60" y="75" width="1080" height="400" rx="16" fill="url(#harnessGrad)" stroke="#4f46e5" stroke-width="2" stroke-dasharray="10,4"/>
  <text x="80" y="100" font-family="monospace" font-size="13" fill="#818cf8">HARNESS: TypedGraph DSL</text>

  <!-- TASK INPUT box -->
  <rect x="80" y="115" width="160" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="160" y="145" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Task Input</text>
  <text x="160" y="162" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">goal / env</text>
  <text x="160" y="177" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">constraints</text>

  <!-- Arrow: Task → Proposer -->
  <line x1="240" y1="150" x2="298" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- PROPOSER box -->
  <rect x="300" y="110" width="160" height="80" rx="10" fill="url(#plannerGrad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="380" y="143" font-family="sans-serif" font-size="14" font-weight="bold" fill="#bfdbfe" text-anchor="middle">Proposer</text>
  <text x="380" y="162" font-family="monospace" font-size="10" fill="#93c5fd" text-anchor="middle">generate candidate</text>
  <text x="380" y="177" font-family="monospace" font-size="10" fill="#93c5fd" text-anchor="middle">harness variants</text>

  <!-- Arrow: Proposer → Executor -->
  <line x1="460" y1="150" x2="518" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- EXECUTE-OBSERVE-SCORE box -->
  <rect x="520" y="105" width="185" height="90" rx="10" fill="url(#execGrad)" stroke="#10b981" stroke-width="2"/>
  <text x="612" y="135" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Execute</text>
  <text x="612" y="152" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Observe</text>
  <text x="612" y="169" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Score</text>
  <text x="612" y="187" font-family="monospace" font-size="9.5" fill="#6ee7b7" text-anchor="middle">run &amp; collect signals</text>

  <!-- Arrow: Execute → Diagnoser -->
  <line x1="705" y1="150" x2="763" y2="150" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- DIAGNOSER box -->
  <rect x="765" y="110" width="165" height="80" rx="10" fill="url(#diagGrad)" stroke="#f97316" stroke-width="2"/>
  <text x="847" y="143" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fed7aa" text-anchor="middle">Diagnoser</text>
  <text x="847" y="162" font-family="monospace" font-size="10" fill="#fdba74" text-anchor="middle">pinpoint failures</text>
  <text x="847" y="177" font-family="monospace" font-size="10" fill="#fdba74" text-anchor="middle">runtime signals</text>

  <!-- Arrow: Diagnoser → back to Proposer (feedback loop, bottom arc) -->
  <path d="M847,190 Q847,280 380,280 Q313,280 313,195" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <rect x="530" y="264" width="130" height="26" rx="6" fill="#1e293b" stroke="#7f1d1d" stroke-width="1"/>
  <text x="595" y="282" font-family="sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">feedback loop</text>

  <!-- Arrow: Diagnoser → Output -->
  <line x1="930" y1="150" x2="988" y2="150" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- OUTPUT box -->
  <rect x="990" y="115" width="135" height="70" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="1057" y="145" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Optimized</text>
  <text x="1057" y="162" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Harness</text>
  <text x="1057" y="177" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">84.3% on TB-2</text>

  <!-- MEMORY / CONTEXT MODULE (middle row) -->
  <rect x="300" y="320" width="230" height="75" rx="10" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="343" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c4b5fd">📦 Context Folding</text>
  <text x="340" y="362" font-family="monospace" font-size="10" fill="#a78bfa">• raw buffer (short-term)</text>
  <text x="340" y="377" font-family="monospace" font-size="10" fill="#a78bfa">• folded summary (long-term)</text>

  <!-- Vertical connector: Execute ↔ Memory -->
  <line x1="612" y1="195" x2="530" y2="320" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- TOOLS MODULE -->
  <rect x="560" y="320" width="230" height="75" rx="10" fill="#1e293b" stroke="#0891b2" stroke-width="1.5"/>
  <text x="600" y="343" font-family="sans-serif" font-size="12" font-weight="bold" fill="#67e8f9">🔧 Tool Harness</text>
  <text x="600" y="362" font-family="monospace" font-size="10" fill="#22d3ee">• bash / code exec</text>
  <text x="600" y="377" font-family="monospace" font-size="10" fill="#22d3ee">• web search / APIs</text>

  <!-- PLANNING MODULE -->
  <rect x="820" y="320" width="230" height="75" rx="10" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
  <text x="860" y="343" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fde68a">🗺 Hierarchical Plan</text>
  <text x="860" y="362" font-family="monospace" font-size="10" fill="#fbbf24">• macro goals / milestones</text>
  <text x="860" y="377" font-family="monospace" font-size="10" fill="#fbbf24">• replan-not-retry</text>

  <!-- Score card: bottom left -->
  <rect x="60" y="500" width="340" height="100" rx="10" fill="#0f172a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="80" y="525" font-family="sans-serif" font-size="13" font-weight="bold" fill="#93c5fd">📊 TerminalBench-2 Leaderboard</text>
  <text x="80" y="548" font-family="monospace" font-size="12" fill="#6ee7b7">AgentFlow (multi-harness)  84.3%</text>
  <text x="80" y="565" font-family="monospace" font-size="12" fill="#e2e8f0">GPT-5.5 (single agent)     82.0%</text>
  <text x="80" y="582" font-family="monospace" font-size="12" fill="#94a3b8">Claude Opus 4.6            ~65%</text>
  <text x="80" y="599" font-family="monospace" font-size="12" fill="#6b7280">Baseline ReAct             ~40%</text>

  <!-- Main title -->
  <text x="750" y="540" font-family="sans-serif" font-size="32" font-weight="bold" fill="#f1f5f9" text-anchor="middle">
    Harness Agent 工程范式
  </text>
  <text x="750" y="578" font-family="sans-serif" font-size="17" fill="#94a3b8" text-anchor="middle">
    Long-Horizon 任务 · 反馈驱动 · 类型化编排
  </text>

  <!-- Glow accent circle -->
  <circle cx="1130" cy="500" r="55" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" filter="url(#softglow)"/>
  <circle cx="1130" cy="500" r="35" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
  <text x="1130" y="494" font-family="monospace" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">10 CVEs</text>
  <text x="1130" y="510" font-family="monospace" font-size="10" fill="#60a5fa" text-anchor="middle">Chrome</text>
</svg>
