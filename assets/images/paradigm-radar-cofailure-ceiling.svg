<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .box { stroke-width: 2; rx: 5; ry: 5; }
      .arrow { stroke: #999; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="25" class="title" text-anchor="middle">Co-Failure Ceiling：多模型组合的硬性天花板</text>
  <text x="400" y="42" class="subtitle" text-anchor="middle">跨 67 个模型、21 家提供商的实测——beta（共失败率）是硬性限制</text>
  
  <!-- Traditional view (left) -->
  <rect x="20" y="60" width="350" height="180" fill="#ffebee" stroke="#e57373" class="box"/>
  <text x="195" y="85" class="label" text-anchor="middle" font-weight="bold">传统观点（rho 误导）</text>
  
  <!-- Flow -->
  <rect x="40" y="100" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="120" class="label" text-anchor="middle">组合多个模型</text>
  
  <line x1="195" y1="130" x2="195" y2="145" stroke="#999" stroke-width="2"/>
  <polygon points="195,145 190,140 200,140" fill="#999"/>
  
  <rect x="40" y="150" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="170" class="label" text-anchor="middle">测量错误相关性 (rho)</text>
  
  <line x1="195" y1="180" x2="195" y2="195" stroke="#999" stroke-width="2"/>
  <polygon points="195,195 190,190 200,190" fill="#999"/>
  
  <rect x="40" y="200" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="195" y="220" class="label" text-anchor="middle">假设：降低 rho = 提升组合性能</text>
  
  <!-- Flaw -->
  <rect x="40" y="240" width="310" height="30" fill="#ffebee" stroke="#e57373" rx="3"/>
  <text x="195" y="260" class="label" text-anchor="middle">缺陷：忽略共失败率 beta（硬性天花板）</text>
  
  <!-- Arrow -->
  <line x1="380" y1="150" x2="420" y2="150" stroke="#999" stroke-width="2"/>
  <polygon points="420,145 430,150 420,155" fill="#999"/>
  
  <!-- Co-Failure Ceiling (right) -->
  <rect x="430" y="60" width="350" height="180" fill="#e8f5e9" stroke="#81c784" class="box"/>
  <text x="605" y="85" class="label" text-anchor="middle" font-weight="bold">Co-Failure Ceiling（新框架）</text>
  
  <!-- Flow -->
  <rect x="450" y="100" width="310" height="30" fill="#fff" stroke="#999" rx="3"/>
  <text x="605" y="120" class="label" text-anchor="middle">组合多个模型</text>
  
  <line x1="605" y1="130" x2="605" y2="145" stroke="#999" stroke-width="2"/>
  <polygon points="605,145 600,140 610,140" fill="#999"/>
  
  <!-- Two parameters -->
  <rect x="470" y="150" width="270" height="30" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="605" y="170" class="label" text-anchor="middle">beta（共失败率）：硬性天花板</text>
  
  <line x1="605" y1="180" x2="605" y2="195" stroke="#999" stroke-width="2"/>
  <polygon points="605,195 600,190 610,190" fill="#999"/>
  
  <rect x="470" y="200" width="270" height="30" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="605" y="220" class="label" text-anchor="middle">rho（错误指标）：可优化空间</text>
  
  <!-- Results table -->
  <rect x="20" y="270" width="760" height="150" fill="#fff" stroke="#ccc" rx="5"/>
  <text x="400" y="295" class="label" text-anchor="middle" font-weight="bold">关键数据：67 个模型、21 家提供商</text>
  
  <!-- Table headers -->
  <line x1="20" y1="310" x2="780" y2="310" stroke="#ccc"/>
  <text x="60" y="325" class="label" font-weight="bold">任务类型</text>
  <text x="250" y="325" class="label" font-weight="bold">beta（共失败率）</text>
  <text x="450" y="325" class="label" font-weight="bold">含义</text>
  <text x="650" y="325" class="label" font-weight="bold">优化空间</text>
  
  <!-- Row 1 -->
  <line x1="20" y1="340" x2="780" y2="340" stroke="#eee"/>
  <text x="60" y="355" class="label">开放数学</text>
  <text x="250" y="355" class="label" fill="#e57373" font-weight="bold">0.052</text>
  <text x="450" y="355" class="label">低估 2.5 倍</text>
  <text x="650" y="355" class="label">有限</text>
  
  <!-- Row 2 -->
  <line x1="20" y1="370" x2="780" y2="370" stroke="#eee"/>
  <text x="60" y="385" class="label">代码任务</text>
  <text x="250" y="385" class="label" fill="#ffb74d" font-weight="bold">0.079</text>
  <text x="450" y="385" class="label">中等天花板</text>
  <text x="650" y="385" class="label">中等</text>
  
  <!-- Row 3 -->
  <line x1="20" y1="400" x2="780" y2="400" stroke="#eee"/>
  <text x="60" y="415" class="label">自由回答</text>
  <text x="250" y="415" class="label" fill="#81c784" font-weight="bold">0.127</text>
  <text x="450" y="415" class="label">beta 升至最高</text>
  <text x="650" y="415" class="label">较大</text>
  
  <!-- Key insight -->
  <rect x="20" y="430" width="760" height="30" fill="#e3f2fd" stroke="#90caf9" rx="3"/>
  <text x="400" y="450" class="label" text-anchor="middle">核心发现：rho 是行业最大的误导指标——beta（共失败率）才是组合模型的硬性天花板</text>
</svg>
