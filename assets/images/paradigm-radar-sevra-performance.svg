<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">性能实测：SEVRA vs 基线方案</text>
  <text x="430" y="55" text-anchor="middle" font-size="12" fill="#666">三个基准测试集的准确率与Token消耗对比</text>

  <!-- Chart area -->
  <rect x="80" y="75" width="700" height="280" rx="4" fill="#fff" stroke="#dee2e6" stroke-width="1"/>

  <!-- Y axis labels (accuracy %) -->
  <text x="70" y="95" text-anchor="end" font-size="10" fill="#999">100%</text>
  <line x1="80" y1="92" x2="780" y2="92" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="145" text-anchor="end" font-size="10" fill="#999">90%</text>
  <line x1="80" y1="142" x2="780" y2="142" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="195" text-anchor="end" font-size="10" fill="#999">80%</text>
  <line x1="80" y1="192" x2="780" y2="192" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="245" text-anchor="end" font-size="10" fill="#999">70%</text>
  <line x1="80" y1="242" x2="780" y2="242" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="295" text-anchor="end" font-size="10" fill="#999">60%</text>
  <line x1="80" y1="292" x2="780" y2="292" stroke="#eee" stroke-width="0.5"/>

  <!-- MATH500 group -->
  <text x="230" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MATH500</text>

  <!-- SEVRA bar (76.3%) -->
  <rect x="140" y="192" width="50" height="100" rx="3" fill="#27ae60"/>
  <text x="165" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">76.3%</text>

  <!-- Always Verify bar (75.5%) -->
  <rect x="200" y="196" width="50" height="96" rx="3" fill="#e74c3c"/>
  <text x="225" y="189" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">75.5%</text>

  <!-- GSM8K group -->
  <text x="430" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">GSM8K</text>

  <!-- SEVRA bar (94.47%) -->
  <rect x="340" y="102" width="50" height="190" rx="3" fill="#27ae60"/>
  <text x="365" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">94.47%</text>

  <!-- Long Base bar (94.54%) -->
  <rect x="400" y="101" width="50" height="191" rx="3" fill="#e74c3c"/>
  <text x="425" y="94" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">94.54%</text>

  <!-- CommonsenseQA group -->
  <text x="630" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">CommonsenseQA</text>

  <!-- SEVRA bar (76.49%) -->
  <rect x="540" y="182" width="50" height="110" rx="3" fill="#27ae60"/>
  <text x="565" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">76.49%</text>

  <!-- Always Verify bar (72.32%) -->
  <rect x="600" y="208" width="50" height="84" rx="3" fill="#e74c3c"/>
  <text x="625" y="201" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">72.32%</text>

  <!-- Legend -->
  <rect x="140" y="390" width="12" height="12" rx="2" fill="#27ae60"/>
  <text x="158" y="400" font-size="10" fill="#333">SEVRA</text>

  <rect x="220" y="390" width="12" height="12" rx="2" fill="#e74c3c"/>
  <text x="238" y="400" font-size="10" fill="#333">Always Verify / Long Base</text>

  <!-- Source -->
  <text x="430" y="415" text-anchor="middle" font-size="10" fill="#999">Source: Acharjee Dip et al., Virginia Tech (arXiv:2606.19808v1)</text>
</svg>
