<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="errGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#d35400"/>
    </linearGradient>
    <linearGradient id="obsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#ecf0f1">Failure as a Process — CLI Coding Agent Trajectory Anatomy</text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#95a5a6">清华大学 × 阿里巴巴达摩院 | arXiv:2607.09510</text>

  <!-- Timeline axis -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#34495e" stroke-width="2"/>

  <!-- Step markers -->
  <g font-size="11" fill="#7f8c8d">
    <text x="80" y="160" text-anchor="middle">Step 0</text>
    <line x1="80" y1="135" x2="80" y2="145" stroke="#7f8c8d" stroke-width="1"/>
    <text x="260" y="160" text-anchor="middle">Step 5</text>
    <line x1="260" y1="135" x2="260" y2="145" stroke="#7f8c8d" stroke-width="1"/>
    <text x="440" y="160" text-anchor="middle">Step 10</text>
    <line x1="440" y1="135" x2="440" y2="145" stroke="#7f8c8d" stroke-width="1"/>
    <text x="620" y="160" text-anchor="middle">Step 15</text>
    <line x1="620" y1="135" x2="620" y2="145" stroke="#7f8c8d" stroke-width="1"/>
    <text x="720" y="160" text-anchor="middle">Step 20+</text>
    <line x1="720" y1="135" x2="720" y2="145" stroke="#7f8c8d" stroke-width="1"/>
  </g>

  <!-- t_err: median step 7 -->
  <rect x="196" y="100" width="3" height="100" fill="url(#errGrad)" rx="2"/>
  <text x="198" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#e74c3c">t_err</text>
  <text x="198" y="80" text-anchor="middle" font-size="11" fill="#e74c3c">Step 7 (median)</text>

  <!-- t_lock: ~step 10 -->
  <rect x="260" y="100" width="3" height="100" fill="url(#lockGrad)" rx="2"/>
  <text x="262" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#e67e22">t_lock</text>
  <text x="262" y="80" text-anchor="middle" font-size="11" fill="#e67e22">Irreversible</text>

  <!-- t_obs: ~step 20 -->
  <rect x="440" y="100" width="3" height="100" fill="url(#obsGrad)" rx="2"/>
  <text x="442" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f39c12">t_obs</text>
  <text x="442" y="80" text-anchor="middle" font-size="11" fill="#f39c12">Awareness</text>

  <!-- Repair window annotation -->
  <line x1="200" y1="200" x2="260" y2="200" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="230" y="220" text-anchor="middle" font-size="13" fill="#ecf0f1">Repair Window ≈ 3 steps</text>

  <!-- Visibility lag annotation -->
  <line x1="265" y1="240" x2="440" y2="240" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="352" y="260" text-anchor="middle" font-size="13" fill="#ecf0f1">Visibility Lag ≈ 10 steps</text>

  <!-- Error type distribution -->
  <rect x="60" y="300" width="340" height="170" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="230" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Error Type Distribution (63,000+ steps)</text>

  <!-- Cognitive errors bar -->
  <rect x="90" y="345" width="280" height="28" rx="4" fill="#e74c3c"/>
  <text x="380" y="364" font-size="13" fill="#ecf0f1">Cognitive Errors: 57.9%</text>

  <!-- Capability gap bar -->
  <rect x="90" y="382" width="159" height="28" rx="4" fill="#e67e22"/>
  <text x="259" y="401" font-size="13" fill="#ecf0f1">Capability Gap: 32.8%</text>

  <!-- Environmental bar -->
  <rect x="90" y="419" width="56" height="28" rx="4" fill="#3498db"/>
  <text x="156" y="438" font-size="13" fill="#ecf0f1">Environmental: 9.4%</text>

  <!-- Recovery stats -->
  <rect x="420" y="300" width="320" height="170" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="580" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Recovery Statistics</text>

  <!-- Success with errors -->
  <rect x="445" y="345" width="270" height="28" rx="4" fill="#2ecc71"/>
  <text x="725" y="364" font-size="13" fill="#ecf0f1">71% of success trajectories had errors</text>

  <!-- Success response rate -->
  <rect x="445" y="382" width="193" height="28" rx="4" fill="#27ae60"/>
  <text x="648" y="401" font-size="13" fill="#ecf0f1">Success response rate: 92%</text>

  <!-- Failure response rate -->
  <rect x="445" y="419" width="70" height="28" rx="4" fill="#c0392b"/>
  <text x="525" y="438" font-size="13" fill="#ecf0f1">Failure: 37%</text>

  <!-- Key insight box -->
  <rect x="60" y="485" width="680" height="0" rx="0"/>
</svg>
