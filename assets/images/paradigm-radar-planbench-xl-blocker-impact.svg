<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1f4e"/>
    </linearGradient>
  </defs>

  <rect width="960" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">三种阻塞扰动对模型准确率的影响</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">严重程度: 隐式失败 &gt; 显式失败 &gt; 语义误导 | GPT-5.4 崩溃式下降</text>

  <!-- Chart area -->
  <rect x="100" y="75" width="760" height="320" rx="8" fill="#0f172a"/>

  <!-- Y axis labels -->
  <text x="90" y="95" text-anchor="end" font-size="11" fill="#64748b">100%</text>
  <line x1="100" y1="93" x2="860" y2="93" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="155" text-anchor="end" font-size="11" fill="#64748b">75%</text>
  <line x1="100" y1="153" x2="860" y2="153" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="215" text-anchor="end" font-size="11" fill="#64748b">50%</text>
  <line x1="100" y1="213" x2="860" y2="213" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="275" text-anchor="end" font-size="11" fill="#64748b">25%</text>
  <line x1="100" y1="273" x2="860" y2="273" stroke="#1e293b" stroke-width="1"/>

  <text x="90" y="335" text-anchor="end" font-size="11" fill="#64748b">0%</text>
  <line x1="100" y1="333" x2="860" y2="333" stroke="#1e293b" stroke-width="1"/>

  <!-- Baseline (no blocker) - blue bars -->
  <!-- Gemini-3.1-Pro: 77.06% -->
  <rect x="145" y="108" width="25" height="225" rx="3" fill="#3b82f6"/>
  <!-- DeepSeek-V4: 63.08% -->
  <rect x="225" y="150" width="25" height="183" rx="3" fill="#3b82f6"/>
  <!-- GPT-5.4: 51.90% -->
  <rect x="305" y="187" width="25" height="146" rx="3" fill="#3b82f6"/>
  <!-- Gemini-3.5: 52.19% -->
  <rect x="385" y="186" width="25" height="147" rx="3" fill="#3b82f6"/>
  <!-- Llama-70B: 18.96% -->
  <rect x="465" y="294" width="25" height="39" rx="3" fill="#3b82f6"/>

  <!-- Explicit Failure - orange bars -->
  <!-- Gemini-3.1-Pro: ~50% -->
  <rect x="175" y="195" width="25" height="138" rx="3" fill="#f59e0b"/>
  <!-- DeepSeek-V4: ~40% -->
  <rect x="255" y="225" width="25" height="108" rx="3" fill="#f59e0b"/>
  <!-- GPT-5.4: ~25% -->
  <rect x="335" y="260" width="25" height="73" rx="3" fill="#f59e0b"/>
  <!-- Gemini-3.5: ~30% -->
  <rect x="415" y="248" width="25" height="85" rx="3" fill="#f59e0b"/>
  <!-- Llama-70B: ~8% -->
  <rect x="495" y="316" width="25" height="17" rx="3" fill="#f59e0b"/>

  <!-- Implicit Failure - red bars (most severe) -->
  <!-- Gemini-3.1-Pro: ~41% -->
  <rect x="205" y="220" width="25" height="113" rx="3" fill="#ef4444"/>
  <!-- DeepSeek-V4: ~28% -->
  <rect x="285" y="262" width="25" height="71" rx="3" fill="#ef4444"/>
  <!-- GPT-5.4: ~11% (CRASH) -->
  <rect x="365" y="310" width="25" height="23" rx="3" fill="#ef4444"/>
  <!-- Gemini-3.5: ~20% -->
  <rect x="445" y="280" width="25" height="53" rx="3" fill="#ef4444"/>
  <!-- Llama-70B: ~5% -->
  <rect x="525" y="321" width="25" height="12" rx="3" fill="#ef4444"/>

  <!-- X axis labels -->
  <text x="187" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">Gemini-3.1</text>
  <text x="297" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">DeepSeek-V4</text>
  <text x="407" y="360" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="bold">GPT-5.4</text>
  <text x="517" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">Gemini-3.5</text>

  <!-- Legend -->
  <rect x="280" y="380" width="400" height="50" rx="6" fill="#1e293b"/>
  <rect x="295" y="390" width="14" height="12" rx="2" fill="#3b82f6"/>
  <text x="316" y="400" font-size="11" fill="#cbd5e1">无干扰 (Baseline)</text>
  <rect x="440" y="390" width="14" height="12" rx="2" fill="#f59e0b"/>
  <text x="461" y="400" font-size="11" fill="#cbd5e1">显式失败</text>
  <rect x="530" y="390" width="14" height="12" rx="2" fill="#ef4444"/>
  <text x="551" y="400" font-size="11" fill="#cbd5e1">隐式失败 (最严重)</text>

  <!-- GPT-5.4 annotation -->
  <rect x="320" y="440" width="320" height="28" rx="6" fill="#7f1d1d"/>
  <text x="480" y="458" text-anchor="middle" font-size="12" fill="#fca5a5">GPT-5.4: 51.90% → 11.36% (隐式失败) | 降幅 78%</text>
</svg>
