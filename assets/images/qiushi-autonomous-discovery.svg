<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="850" cy="60" r="140" fill="#06b6d4" opacity="0.05"/>
  <circle cx="100" cy="520" r="200" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="450" cy="290" r="180" fill="#8b5cf6" opacity="0.03"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    启士发现引擎：真实光学平台上的自主科学发现
  </text>
  <text x="450" y="72" text-anchor="middle" fill="#aaaaaa" font-size="13" font-family="system-ui, -apple-system, sans-serif">
    Qiushi Discovery Engine · arXiv 2604.27092 · 2026
  </text>

  <!-- Central engine icon -->
  <g transform="translate(450, 130)">
    <circle cx="0" cy="0" r="65" fill="url(#cyanGradient)" filter="url(#glow)" opacity="0.85"/>
    <circle cx="0" cy="0" r="65" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.3"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      启士引擎
    </text>
    <text x="0" y="15" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="system-ui, -apple-system, sans-serif">
      自主科学发现
    </text>
  </g>

  <!-- Key metrics row -->
  <g transform="translate(60, 230)">
    <rect width="220" height="100" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="110" y="25" text-anchor="middle" fill="#06b6d4" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      规模数据
    </text>
    <rect x="0" y="40" width="220" height="2" fill="#06b6d4" opacity="0.5"/>
    <text x="110" y="60" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      1.46 亿 Tokens
    </text>
    <text x="110" y="80" text-anchor="middle" fill="#aaaaaa" font-size="11" font-family="system-ui, -apple-system, sans-serif">
      3,242 次 LLM 调用
    </text>
  </g>

  <g transform="translate(300, 230)">
    <rect width="220" height="100" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="110" y="25" text-anchor="middle" fill="#10b981" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      工具调用
    </text>
    <rect x="0" y="40" width="220" height="2" fill="#10b981" opacity="0.5"/>
    <text x="110" y="60" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      1,242 次工具调用
    </text>
    <text x="110" y="80" text-anchor="middle" fill="#aaaaaa" font-size="11" font-family="system-ui, -apple-system, sans-serif">
      163 条研究笔记
    </text>
  </g>

  <g transform="translate(540, 230)">
    <rect width="220" height="100" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="110" y="25" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      产出
    </text>
    <rect x="0" y="40" width="220" height="2" fill="#f59e0b" opacity="0.5"/>
    <text x="110" y="60" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      44 个脚本
    </text>
    <text x="110" y="80" text-anchor="middle" fill="#aaaaaa" font-size="11" font-family="system-ui, -apple-system, sans-serif">
      光学双线性交互
    </text>
  </g>

  <!-- Architecture diagram -->
  <g transform="translate(60, 360)">
    <rect width="780" height="190" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="390" y="25" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      双层架构与 Meta-Trace 记忆
    </text>
    <rect x="0" y="40" width="780" height="2" fill="#06b6d4" opacity="0.5"/>

    <!-- Layer 1: Research Phases -->
    <g transform="translate(30, 55)">
      <rect width="350" height="120" rx="8" fill="#0f3460" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
      <text x="175" y="25" text-anchor="middle" fill="#06b6d4" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
        非线性研究阶段
      </text>
      <text x="175" y="45" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        假设生成 -> 实验设计 -> 数据采集 -> 分析
      </text>
      <text x="175" y="65" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        迭代循环，非线性跳转
      </text>
      <text x="175" y="85" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        物理设备控制
      </text>
      <text x="175" y="105" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        理论验证
      </text>
    </g>

    <!-- Arrow -->
    <g transform="translate(390, 105)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#8b5cf6" stroke-width="2"/>
      <polygon points="35,-6 45,0 35,6" fill="#8b5cf6"/>
      <text x="20" y="-10" text-anchor="middle" fill="#8b5cf6" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        双向
      </text>
    </g>

    <!-- Layer 2: Meta-Trace -->
    <g transform="translate(440, 55)">
      <rect width="330" height="120" rx="8" fill="#1a1a3e" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
      <text x="165" y="25" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
        Meta-Trace 记忆
      </text>
      <text x="165" y="45" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        长程研究轨迹跟踪
      </text>
      <text x="165" y="65" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        自适应研究路径
      </text>
      <text x="165" y="85" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        稳定性保障
      </text>
      <text x="165" y="105" text-anchor="middle" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">
        知识累积
      </text>
    </g>
  </g>

  <!-- Bottom highlight -->
  <g transform="translate(150, 560)">
    <rect width="600" height="30" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="300" y="20" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      首个 AI 代理系统自主发现并实验验证非平凡物理机制
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="3" fill="#06b6d4" opacity="0.5"/>
  <circle cx="880" cy="560" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="880" cy="20" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="20" cy="560" r="3" fill="#8b5cf6" opacity="0.4"/>
</svg>
