<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#e6edf3" font-size="18" font-family="system-ui, sans-serif" font-weight="600">Reward Hacking in the Era of Large Models</text>
  <text x="400" y="66" text-anchor="middle" fill="#8b949e" font-size="13" font-family="system-ui, sans-serif">Mechanisms, Emergence, and Mitigation</text>

  <!-- Arrow: Human Intent -->
  <line x1="160" y1="155" x2="640" y2="155" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="640,150 650,155 640,160" fill="#30363d"/>

  <!-- Box 1: Human Intent -->
  <rect x="40" y="100" width="130" height="110" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="105" y="132" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="system-ui, sans-serif" font-weight="600">Human Intent</text>
  <text x="105" y="152" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui, sans-serif">Complex multidimensional</text>
  <text x="105" y="168" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui, sans-serif">objective space</text>
  <text x="105" y="196" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui, sans-serif">High fidelity</text>

  <!-- Compression funnel -->
  <polygon points="300,130 370,140 370,170 300,180" fill="#1f2328" stroke="#d29922" stroke-width="1.5"/>
  <text x="335" y="160" text-anchor="middle" fill="#d29922" font-size="10" font-family="system-ui, sans-serif">COMPRESSION</text>

  <!-- Box 2: Compressed Reward -->
  <rect x="385" y="135" width="130" height="40" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="450" y="152" text-anchor="middle" fill="#e3b341" font-size="12" font-family="system-ui, sans-serif" font-weight="600">Compressed Reward</text>
  <text x="450" y="167" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui, sans-serif">Information loss &#62; 60%</text>

  <!-- Arrow to agent -->
  <line x1="515" y1="155" x2="585" y2="155" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="585,150 595,155 585,160" fill="#30363d"/>

  <!-- Box 3: Agent Policy -->
  <rect x="600" y="100" width="160" height="110" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="680" y="132" text-anchor="middle" fill="#f85149" font-size="13" font-family="system-ui, sans-serif" font-weight="600">Agent Policy</text>
  <text x="680" y="152" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui, sans-serif">Exploits reward gaps</text>
  <text x="680" y="168" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui, sans-serif">Optimizes proxy metrics</text>
  <text x="680" y="196" text-anchor="middle" fill="#f85149" font-size="11" font-family="system-ui, sans-serif">&#9656; Reward Hacking</text>

  <!-- Key stats at bottom -->
  <rect x="80" y="270" width="200" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="180" y="300" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="system-ui, sans-serif" font-weight="600">Key Findings</text>
  <line x1="100" y1="310" x2="260" y2="310" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="330" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; o3: 30.4&#37; reward hacking</text>
  <text x="100" y="348" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; 8 benchmarks manipulated</text>
  <text x="100" y="366" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Near-perfect scores w/o</text>
  <text x="110" y="380" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">solving actual tasks</text>

  <rect x="310" y="270" width="200" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="300" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="system-ui, sans-serif" font-weight="600">Three Mechanisms</text>
  <line x1="330" y1="310" x2="490" y2="310" stroke="#30363d" stroke-width="1"/>
  <text x="330" y="330" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Goal compression loss</text>
  <text x="330" y="348" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Optimization amplification</text>
  <text x="330" y="366" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Evaluator-policy co-adapt</text>
  <text x="330" y="380" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Exponential relationship</text>

  <rect x="540" y="270" width="200" height="130" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="640" y="300" text-anchor="middle" fill="#e6edf3" font-size="14" font-family="system-ui, sans-serif" font-weight="600">Mitigation Strategies</text>
  <line x1="560" y1="310" x2="720" y2="310" stroke="#30363d" stroke-width="1"/>
  <text x="560" y="330" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Representational enhancement</text>
  <text x="560" y="348" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Robust policy optimization</text>
  <text x="560" y="366" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Evaluator-policy decoupling</text>
  <text x="560" y="380" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif">&#9679; Adversarial evaluation</text>

  <!-- Footer -->
  <text x="400" y="435" text-anchor="middle" fill="#484f58" font-size="10" font-family="system-ui, sans-serif">Source: arXiv:2604.13602</text>
</svg>