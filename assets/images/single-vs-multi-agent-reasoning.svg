<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#0d1b2a" rx="12"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1b3a5c" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Left side: Single Agent -->
  <text x="150" y="50" fill="#52b7d8" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">Single Agent (SAS)</text>
  
  <!-- Central brain/network node -->
  <circle cx="150" cy="200" r="80" fill="none" stroke="#52b7d8" stroke-width="2" opacity="0.6"/>
  <circle cx="150" cy="200" r="60" fill="none" stroke="#52b7d8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="150" cy="200" r="40" fill="none" stroke="#52b7d8" stroke-width="1" opacity="0.3"/>
  
  <!-- Central node -->
  <circle cx="150" cy="200" r="18" fill="#52b7d8" opacity="0.8"/>
  
  <!-- Inner connections -->
  <line x1="150" y1="200" x2="120" y2="170" stroke="#52b7d8" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="200" x2="180" y2="170" stroke="#52b7d8" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="200" x2="120" y2="230" stroke="#52b7d8" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="200" x2="180" y2="230" stroke="#52b7d8" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Satellites -->
  <circle cx="120" cy="170" r="8" fill="#52b7d8" opacity="0.6"/>
  <circle cx="180" cy="170" r="8" fill="#52b7d8" opacity="0.6"/>
  <circle cx="120" cy="230" r="8" fill="#52b7d8" opacity="0.6"/>
  <circle cx="180" cy="230" r="8" fill="#52b7d8" opacity="0.6"/>
  
  <!-- Equal sign in center -->
  <text x="300" y="195" fill="#e0e1dd" font-size="36" font-weight="bold" text-anchor="middle">=</text>
  <text x="300" y="225" fill="#e0e1dd" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui" opacity="0.6">Normalized Compute</text>
  
  <!-- Right side: Multi Agent -->
  <text x="450" y="50" fill="#a78bfa" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">Multi Agent (MAS)</text>
  
  <!-- Multiple small nodes with cross connections -->
  <!-- Top row -->
  <circle cx="380" cy="100" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="450" cy="80" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="520" cy="100" r="6" fill="#a78bfa" opacity="0.6"/>
  <!-- Middle row -->
  <circle cx="400" cy="140" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="450" cy="140" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="500" cy="140" r="6" fill="#a78bfa" opacity="0.6"/>
  <!-- Bottom row -->
  <circle cx="390" cy="240" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="450" cy="260" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="510" cy="240" r="6" fill="#a78bfa" opacity="0.6"/>
  <!-- Extra nodes -->
  <circle cx="420" cy="200" r="6" fill="#a78bfa" opacity="0.4"/>
  <circle cx="480" cy="200" r="6" fill="#a78bfa" opacity="0.4"/>
  <circle cx="450" cy="320" r="6" fill="#a78bfa" opacity="0.4"/>
  
  <!-- Cross connections between MAS nodes (information flow) -->
  <line x1="380" y1="100" x2="450" y2="80" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="450" y1="80" x2="520" y2="100" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="380" y1="100" x2="400" y2="140" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="450" y1="80" x2="450" y2="140" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="520" y1="100" x2="500" y2="140" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="140" x2="450" y2="140" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="450" y1="140" x2="500" y2="140" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="140" x2="420" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="450" y1="140" x2="420" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="450" y1="140" x2="480" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="500" y1="140" x2="480" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="390" y1="240" x2="420" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="450" y1="260" x2="420" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="450" y1="260" x2="480" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <line x1="510" y1="240" x2="480" y2="200" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  
  <!-- DPI constraint arrow on right -->
  <path d="M 520 300 Q 500 280 480 270" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.7" marker-end="url(#arrowhead)"/>
  <text x="530" y="290" fill="#ef4444" font-size="11" font-family="system-ui" opacity="0.8">DPI: I(X;Z) ≤ I(X;Y)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Bottom label -->
  <text x="300" y="370" fill="#8d99ae" font-size="13" text-anchor="middle" font-family="system-ui">
    Data Processing Inequality: Chain processing cannot increase mutual information
  </text>
</svg>