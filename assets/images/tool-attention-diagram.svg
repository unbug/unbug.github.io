<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="520" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Tool Attention 工作流程</text>

  <!-- Step 1: User Input -->
  <rect x="30" y="60" width="160" height="50" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a5c">用户输入</text>
  <text x="110" y="98" text-anchor="middle" font-size="11" fill="#4a6a8a">User Input</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="85" x2="240" y2="85" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: ISO Scoring -->
  <rect x="250" y="60" width="160" height="50" rx="6" fill="#fef3e2" stroke="#e67e22" stroke-width="1.5"/>
  <text x="330" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4a1a">意图-模式重叠</text>
  <text x="330" y="98" text-anchor="middle" font-size="11" fill="#9a6a3a">ISO Scoring</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="85" x2="460" y2="85" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Step 3: State-Aware Gating -->
  <rect x="470" y="60" width="160" height="50" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="550" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5a2a">状态感知门控</text>
  <text x="550" y="98" text-anchor="middle" font-size="11" fill="#3a7a4a">State Gating</text>

  <!-- Arrow 3 -->
  <line x1="630" y1="85" x2="680" y2="85" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Lazy Schema Loading -->
  <rect x="690" y="60" width="80" height="50" rx="6" fill="#f0e6f6" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="730" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a2a7a">惰性加载</text>
  <text x="730" y="96" text-anchor="middle" font-size="10" fill="#7a5a9a">Lazy Load</text>

  <!-- Bottom section: Tool Pool -->
  <text x="400" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">工具池（120 tools）</text>

  <!-- Tool icons (simplified) -->
  <g transform="translate(100, 170)">
    <rect width="50" height="40" rx="4" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#666">tool_1</text>
  </g>
  <g transform="translate(160, 170)">
    <rect width="50" height="40" rx="4" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#666">tool_2</text>
  </g>
  <g transform="translate(220, 170)">
    <rect width="50" height="40" rx="4" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#666">tool_3</text>
  </g>
  <text x="290" y="195" text-anchor="middle" font-size="12" fill="#999">...</text>
  <g transform="translate(520, 170)">
    <rect width="50" height="40" rx="4" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#666">tool_119</text>
  </g>
  <g transform="translate(580, 170)">
    <rect width="50" height="40" rx="4" fill="#ddd" stroke="#999" stroke-width="1"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#666">tool_120</text>
  </g>

  <!-- Gating result: filtered tools -->
  <text x="400" y="240" text-anchor="middle" font-size="13" fill="#555">门控后保留 top-k 工具</text>

  <g transform="translate(250, 255)">
    <rect width="50" height="40" rx="4" fill="#b8e6b8" stroke="#27ae60" stroke-width="1.5"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#1a5a2a">tool_1</text>
  </g>
  <g transform="translate(310, 255)">
    <rect width="50" height="40" rx="4" fill="#b8e6b8" stroke="#27ae60" stroke-width="1.5"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#1a5a2a">tool_3</text>
  </g>
  <g transform="translate(370, 255)">
    <rect width="50" height="40" rx="4" fill="#b8e6b8" stroke="#27ae60" stroke-width="1.5"/>
    <text x="25" y="24" text-anchor="middle" font-size="9" fill="#1a5a2a">tool_7</text>
  </g>
  <text x="440" y="280" text-anchor="middle" font-size="12" fill="#999">...</text>

  <!-- Summary pool -->
  <rect x="120" y="320" width="560" height="45" rx="6" fill="#fef9e7" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5a1a">Schema 摘要池（Summary Pool）— 所有工具保留紧凑摘要</text>
  <text x="400" y="355" text-anchor="middle" font-size="10" fill="#9a7a2a">仅对 top-k 工具加载完整 JSON schema</text>

  <!-- Arrow down -->
  <line x1="400" y1="365" x2="400" y2="400" stroke="#d4a017" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- LLM Inference -->
  <rect x="280" y="410" width="240" height="50" rx="6" fill="#1a1a2e"/>
  <text x="400" y="433" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">LLM 推理</text>
  <text x="400" y="450" text-anchor="middle" font-size="11" fill="#aabbcc">Context-Inference</text>

  <!-- Token reduction callout -->
  <rect x="50" y="410" width="190" height="70" rx="6" fill="#fff3f3" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="145" y="433" text-anchor="middle" font-size="16" font-weight="bold" fill="#c0392b">95% tokens 减少</text>
  <text x="145" y="450" text-anchor="middle" font-size="11" fill="#8a3a3a">47.3k → 2.4k tokens</text>
  <text x="145" y="467" text-anchor="middle" font-size="10" fill="#aa5a5a">利用率 24% → 91%</text>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4a90d9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e67e22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#27ae60"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d4a017"/>
    </marker>
  </defs>
</svg>
