<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="url(#bgGrad)"/>

  <!-- Title area -->
  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">记忆巩固：知识更新与身份隔离</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" fill="#555">确定性函数 f: M^ep -> M^sem，身份哈希零漂移</text>

  <!-- Central diagram -->
  <rect x="230" y="90" width="400" height="300" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>

  <!-- Episodic Memory (left) -->
  <rect x="260" y="120" width="130" height="80" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="325" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Episodic Memory</text>
  <text x="325" y="168" text-anchor="middle" font-size="10" fill="#1565c0">M^ep · 交互记录</text>

  <!-- Arrow to consolidation function -->
  <line x1="390" y1="160" x2="430" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="430,155 440,160 430,165" fill="#555"/>

  <!-- Consolidation function -->
  <rect x="440" y="130" width="100" height="60" rx="6" fill="#f39c12"/>
  <text x="490" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">f: M^ep -></text>
  <text x="490" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">M^sem</text>

  <!-- Arrow to Semantic Knowledge -->
  <line x1="540" y1="160" x2="580" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="580,155 590,160 580,165" fill="#555"/>

  <!-- Semantic Knowledge (right) -->
  <rect x="590" y="120" width="130" height="80" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="655" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">Semantic Knowledge</text>
  <text x="655" y="168" text-anchor="middle" font-size="10" fill="#155724">M^sem · 独立存储</text>

  <!-- Identity Hash (bottom center) -->
  <rect x="390" y="230" width="100" height="60" rx="6" fill="#e2d9f3" stroke="#6f42c1" stroke-width="2"/>
  <text x="440" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a235a">Identity Hash</text>
  <text x="440" y="273" text-anchor="middle" font-size="9" fill="#4a235a">只读原始标识</text>

  <!-- Arrow from Identity to Planner -->
  <line x1="440" y1="290" x2="440" y2="320" stroke="#6f42c1" stroke-width="1.5"/>
  <polygon points="437,318 440,326 443,318" fill="#6f42c1"/>

  <!-- Planner -->
  <rect x="390" y="325" width="100" height="50" rx="6" fill="#cce5ff" stroke="#007bff" stroke-width="2"/>
  <text x="440" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#004085">Planner</text>
  <text x="440" y="365" text-anchor="middle" font-size="9" fill="#004085">只读访问 M^sem</text>

  <!-- Left panel: Three guarantees -->
  <rect x="30" y="100" width="180" height="270" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="120" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">三层设计保证</text>

  <rect x="45" y="145" width="150" height="65" rx="4" fill="#e3f2fd"/>
  <text x="120" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">结构引理</text>
  <text x="120" y="183" text-anchor="middle" font-size="9" fill="#1565c0">身份哈希输入集合</text>
  <text x="120" y="198" text-anchor="middle" font-size="9" fill="#1565c0">在巩固中保持不变</text>

  <rect x="45" y="220" width="150" height="65" rx="4" fill="#fff3cd"/>
  <text x="120" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">确定性聚合</text>
  <text x="120" y="258" text-anchor="middle" font-size="9" fill="#856404">可审计数据库行，</text>
  <text x="120" y="273" text-anchor="middle" font-size="9" fill="#856404">附置信度和溯源</text>

  <rect x="45" y="295" width="150" height="65" rx="4" fill="#e8f5e9"/>
  <text x="120" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">只读接口</text>
  <text x="120" y="333" text-anchor="middle" font-size="9" fill="#2e7d32">M^sem 与规划器</text>
  <text x="120" y="348" text-anchor="middle" font-size="9" fill="#2e7d32">无反向参数更新</text>

  <!-- Right panel: Key results -->
  <rect x="650" y="100" width="180" height="270" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="740" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">实证结果</text>

  <!-- Big stat -->
  <rect x="665" y="145" width="150" height="70" rx="6" fill="#d4edda"/>
  <text x="740" y="182" text-anchor="middle" font-size="28" font-weight="bold" fill="#155724">-79.82%</text>
  <text x="740" y="205" text-anchor="middle" font-size="10" fill="#155724">无效规划尝试减少</text>

  <!-- CI -->
  <rect x="665" y="225" width="150" height="40" rx="4" fill="#f8f9fa"/>
  <text x="740" y="250" text-anchor="middle" font-size="10" fill="#495057">95% CI: [78.02%, 81.49%]</text>

  <!-- Identity consistency -->
  <rect x="665" y="275" width="150" height="70" rx="6" fill="#e3f2fd"/>
  <text x="740" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">身份零漂移</text>
  <text x="740" y="322" text-anchor="middle" font-size="9" fill="#1565c0">跨轮次字节级一致</text>

  <!-- Bottom insight -->
  <rect x="30" y="420" width="800" height="50" rx="6" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
  <text x="430" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c5460">核心创新：将记忆巩固形式化为不改变身份的确定性函数——身份哈希隔离语义知识层</text>

  <!-- Source -->
  <text x="430" y="495" text-anchor="middle" font-size="11" fill="#999">Source: Xue Qin et al., arXiv:2607.01988v1 (Harbin Institute of Technology)</text>

  <!-- Paradigm Radar badge -->
  <rect x="700" y="495" width="120" height="24" rx="3" fill="#fff3cd"/>
  <text x="760" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#856404">AI Paradigm Radar</text>

  <!-- Article number -->
  <rect x="40" y="495" width="100" height="24" rx="3" fill="#e3f2fd"/>
  <text x="90" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Article #91</text>

  <!-- Date badge -->
  <rect x="40" y="522" width="100" height="20" rx="3" fill="#e8f5e9"/>
  <text x="90" y="536" text-anchor="middle" font-size="8" fill="#2e7d32">Published: 2026-07-06</text>
</svg>
