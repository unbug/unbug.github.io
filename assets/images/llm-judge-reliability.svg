<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#0d1b2a" rx="12"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1b3a5c" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="300" y="45" fill="#52b7d8" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">LLM Judge Reliability: Transitivity Violations</text>
  
  <!-- Triangle: A>B>C>A cycle (transitivity violation) -->
  <text x="300" y="100" fill="#8d99ae" font-size="13" text-anchor="middle" font-family="system-ui">Directed 3-Cycle Violation</text>
  
  <!-- Triangle vertices -->
  <circle cx="300" cy="160" r="22" fill="#52b7d8" opacity="0.3" stroke="#52b7d8" stroke-width="1.5"/>
  <text x="300" y="165" fill="#e0e1dd" font-size="18" font-weight="bold" text-anchor="middle">A</text>
  
  <circle cx="400" cy="270" r="22" fill="#52b7d8" opacity="0.3" stroke="#52b7d8" stroke-width="1.5"/>
  <text x="400" y="275" fill="#e0e1dd" font-size="18" font-weight="bold" text-anchor="middle">B</text>
  
  <circle cx="200" cy="270" r="22" fill="#52b7d8" opacity="0.3" stroke="#52b7d8" stroke-width="1.5"/>
  <text x="200" y="275" fill="#e0e1dd" font-size="18" font-weight="bold" text-anchor="middle">C</text>
  
  <!-- Arrow edges (directed) -->
  <!-- A -> B -->
  <path d="M 315 175 L 385 255" stroke="#52b7d8" stroke-width="2" opacity="0.8" marker-end="url(#arrowBlue)"/>
  <text x="365" y="215" fill="#52b7d8" font-size="12" text-anchor="middle" font-family="system-ui" opacity="0.8">A &gt; B</text>
  
  <!-- B -> C -->
  <path d="M 385 255 L 215 255" stroke="#52b7d8" stroke-width="2" opacity="0.8" marker-end="url(#arrowBlue)"/>
  <text x="300" y="250" fill="#52b7d8" font-size="12" text-anchor="middle" font-family="system-ui" opacity="0.8">B &gt; C</text>
  
  <!-- C -> A (violation!) -->
  <path d="M 215 255 L 285 175" stroke="#ef4444" stroke-width="2.5" opacity="0.9" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>
  <text x="235" y="215" fill="#ef4444" font-size="12" text-anchor="middle" font-family="system-ui" opacity="0.9" font-weight="bold">C &gt; A ✗</text>
  
  <!-- Red violation highlight -->
  <circle cx="300" cy="220" r="50" fill="#ef4444" opacity="0.05"/>
  <text x="300" y="225" fill="#ef4444" font-size="11" text-anchor="middle" font-family="system-ui" opacity="0.7">Transitivity Violation</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52b7d8" opacity="0.8"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" opacity="0.9"/>
    </marker>
  </defs>
  
  <!-- Conformal prediction set visualization -->
  <text x="300" y="330" fill="#8d99ae" font-size="13" text-anchor="middle" font-family="system-ui">Conformal Prediction Set Width as Reliability Indicator</text>
  
  <!-- Width 1 (certain) -->
  <rect x="140" y="345" width="80" height="20" rx="4" fill="#52b7d8" opacity="0.3" stroke="#52b7d8" stroke-width="1"/>
  <text x="180" y="359" fill="#e0e1dd" font-size="10" text-anchor="middle" font-family="system-ui">Width=1</text>
  <text x="180" y="380" fill="#52b7d8" font-size="10" text-anchor="middle" font-family="system-ui">Certain</text>
  
  <!-- Width 3 (moderate) -->
  <rect x="260" y="340" width="80" height="25" rx="4" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="300" y="355" fill="#e0e1dd" font-size="10" text-anchor="middle" font-family="system-ui">Width=3</text>
  <text x="300" y="380" fill="#a78bfa" font-size="10" text-anchor="middle" font-family="system-ui">Moderate</text>
  
  <!-- Width 5 (uncertain) -->
  <rect x="380" y="335" width="80" height="35" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="420" y="355" fill="#e0e1dd" font-size="10" text-anchor="middle" font-family="system-ui">Width=5</text>
  <text x="420" y="380" fill="#ef4444" font-size="10" text-anchor="middle" font-family="system-ui">Uncertain</text>
  
  <!-- Correlation arrow -->
  <path d="M 180 378 L 420 378" stroke="#8d99ae" stroke-width="0.5" opacity="0.3" marker-end="url(#arrowGray)"/>
  <text x="300" y="375" fill="#8d99ae" font-size="9" text-anchor="middle" font-family="system-ui">rs = +0.576</text>
  
  <!-- Arrow marker for gray -->
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8d99ae" opacity="0.3"/>
    </marker>
  </defs>
</svg>
