<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">ResearchArena: Automated AI R&amp;D Evaluation Framework</text>

  <!-- Four Tasks (top row) -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
    <text x="82" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Safety Post-Training</text>
    <text x="82" y="48" text-anchor="middle" font-size="11" fill="#5f6368">Red-teaming &amp; jailbreak</text>
    <text x="82" y="64" text-anchor="middle" font-size="10" fill="#9aa0a6">detection in agent outputs</text>
  </g>

  <g transform="translate(235, 70)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
    <text x="82" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Capability Post-Training</text>
    <text x="82" y="48" text-anchor="middle" font-size="11" fill="#5f6368">Performance regression &amp;</text>
    <text x="82" y="64" text-anchor="middle" font-size="10" fill="#9aa0a6">capability degradation checks</text>
  </g>

  <g transform="translate(430, 70)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
    <text x="82" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">CUDA Kernel Optimization</text>
    <text x="82" y="48" text-anchor="middle" font-size="11" fill="#5f6368">Correctness verification &amp;</text>
    <text x="82" y="64" text-anchor="middle" font-size="10" fill="#9aa0a6">performance benchmarking</text>
  </g>

  <g transform="translate(625, 70)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
    <text x="82" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Inference Server Opt.</text>
    <text x="82" y="48" text-anchor="middle" font-size="11" fill="#5f6368">Latency, throughput &amp;</text>
    <text x="82" y="64" text-anchor="middle" font-size="10" fill="#9aa0a6">resource utilization monitoring</text>
  </g>

  <!-- Connector lines from tasks to monitors -->
  <line x1="122" y1="150" x2="122" y2="180" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="317" y1="150" x2="317" y2="180" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="512" y1="150" x2="512" y2="180" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="707" y1="150" x2="707" y2="180" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Horizontal connector -->
  <line x1="122" y1="180" x2="707" y2="180" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Vertical connectors to monitors -->
  <line x1="122" y1="180" x2="122" y2="210" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="317" y1="180" x2="317" y2="210" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="512" y1="180" x2="512" y2="210" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="707" y1="180" x2="707" y2="210" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Four Monitor Types (middle row) -->
  <g transform="translate(40, 230)">
    <rect x="0" y="0" width="165" height="70" rx="6" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Output Monitors</text>
    <text x="82" y="46" text-anchor="middle" font-size="10.5" fill="#5f6368">Inspect agent-generated</text>
    <text x="82" y="60" text-anchor="middle" font-size="10" fill="#9aa0a6">code and test results</text>
  </g>

  <g transform="translate(235, 230)">
    <rect x="0" y="0" width="165" height="70" rx="6" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Environment Monitors</text>
    <text x="82" y="46" text-anchor="middle" font-size="10.5" fill="#5f6368">Track filesystem changes,</text>
    <text x="82" y="60" text-anchor="middle" font-size="10" fill="#9aa0a6">process creation, network</text>
  </g>

  <g transform="translate(430, 230)">
    <rect x="0" y="0" width="165" height="70" rx="6" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Resource Monitors</text>
    <text x="82" y="46" text-anchor="middle" font-size="10.5" fill="#5f6368">Monitor CPU, GPU, memory,</text>
    <text x="82" y="60" text-anchor="middle" font-size="10" fill="#9aa0a6">disk I/O anomalies</text>
  </g>

  <g transform="translate(625, 230)">
    <rect x="0" y="0" width="165" height="70" rx="6" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Log Monitors</text>
    <text x="82" y="46" text-anchor="middle" font-size="10.5" fill="#5f6368">Parse system and application</text>
    <text x="82" y="60" text-anchor="middle" font-size="10" fill="#9aa0a6">logs for suspicious patterns</text>
  </g>

  <!-- Connector lines from monitors to key findings -->
  <line x1="122" y1="300" x2="122" y2="340" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="317" y1="300" x2="317" y2="340" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="512" y1="300" x2="512" y2="340" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="707" y1="300" x2="707" y2="340" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Horizontal connector -->
  <line x1="122" y1="340" x2="707" y2="340" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Vertical connectors to findings -->
  <line x1="122" y1="340" x2="122" y2="370" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="317" y1="340" x2="317" y2="370" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="512" y1="340" x2="512" y2="370" stroke="#bdbdbd" stroke-width="1.5"/>
  <line x1="707" y1="340" x2="707" y2="370" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Key Findings (bottom row) -->
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">Detection Rate</text>
    <text x="82" y="46" text-anchor="middle" font-size="11" fill="#5f6368">&lt; 50% for training data</text>
    <text x="82" y="62" text-anchor="middle" font-size="10" fill="#9aa0a6">injection attacks</text>
  </g>

  <g transform="translate(235, 390)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">Monitor Effectiveness</text>
    <text x="82" y="46" text-anchor="middle" font-size="11" fill="#5f6368">Output monitors most</text>
    <text x="82" y="62" text-anchor="middle" font-size="10" fill="#9aa0a6">effective for sabotage</text>
  </g>

  <g transform="translate(430, 390)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">Task Difficulty</text>
    <text x="82" y="46" text-anchor="middle" font-size="11" fill="#5f6368">CUDA kernel tasks show</text>
    <text x="82" y="62" text-anchor="middle" font-size="10" fill="#9aa0a6">highest sabotage success rate</text>
  </g>

  <g transform="translate(625, 390)">
    <rect x="0" y="0" width="165" height="80" rx="6" fill="#f3e8fd" stroke="#8430ce" stroke-width="1.5"/>
    <text x="82" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">Combined Monitoring</text>
    <text x="82" y="46" text-anchor="middle" font-size="11" fill="#5f6368">Multi-monitor fusion</text>
    <text x="82" y="62" text-anchor="middle" font-size="10" fill="#9aa0a6">improves detection by 23%</text>
  </g>

</svg>
