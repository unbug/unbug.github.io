<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">SEVRA 服务决策架构</text>
  <text x="430" y="55" text-anchor="middle" font-size="12" fill="#666">五种决策路径的完整流程</text>

  <!-- Layer 1: Input -->
  <rect x="340" y="75" width="180" height="40" rx="6" fill="#34495e"/>
  <text x="430" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">用户请求 + 推理预算 B</text>

  <!-- Arrow down -->
  <line x1="430" y1="115" x2="430" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="427,138 430,146 433,138" fill="#555"/>

  <!-- Layer 2: Frozen Solver -->
  <rect x="290" y="145" width="280" height="50" rx="6" fill="#2c3e50"/>
  <text x="430" y="167" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">冻结求解器 (Frozen Solver)</text>
  <text x="430" y="185" text-anchor="middle" font-size="11" fill="#bdc3c7">生成初始答案 A_0，消耗 B tokens</text>

  <!-- Arrow down -->
  <line x1="430" y1="195" x2="430" y2="220" stroke="#555" stroke-width="2"/>
  <polygon points="427,218 430,226 433,218" fill="#555"/>

  <!-- Layer 3: SEVRA Controller -->
  <rect x="310" y="225" width="240" height="60" rx="8" fill="#e74c3c"/>
  <text x="430" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">SEVRA 控制器</text>
  <text x="430" y="268" text-anchor="middle" font-size="11" fill="#fadbd8">评估: A_0质量 + 剩余预算 + 翻转风险</text>

  <!-- Five paths branching -->
  <!-- Path A: Keep (leftmost) -->
  <line x1="370" y1="285" x2="160" y2="340" stroke="#27ae60" stroke-width="2"/>
  <polygon points="162,337 158,345 166,342" fill="#27ae60"/>
  <rect x="90" y="345" width="140" height="50" rx="6" fill="#27ae60"/>
  <text x="160" y="367" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">路径A: 保留</text>
  <text x="160" y="385" text-anchor="middle" font-size="10" fill="#d5f5e3">返回 A_0，零额外成本</text>

  <!-- Path B: Verify -->
  <line x1="400" y1="285" x2="310" y2="340" stroke="#2980b9" stroke-width="2"/>
  <polygon points="312,337 308,345 316,342" fill="#2980b9"/>
  <rect x="240" y="345" width="140" height="50" rx="6" fill="#2980b9"/>
  <text x="310" y="367" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">路径B: 验证</text>
  <text x="310" y="385" text-anchor="middle" font-size="10" fill="#d6eaf8">调用验证器 V，消耗 V tokens</text>

  <!-- Path C: Extend (center) -->
  <line x1="430" y1="285" x2="430" y2="340" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="427,338 430,346 433,338" fill="#8e44ad"/>
  <rect x="360" y="345" width="140" height="50" rx="6" fill="#8e44ad"/>
  <text x="430" y="367" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">路径C: 延长</text>
  <text x="430" y="385" text-anchor="middle" font-size="10" fill="#e8daef">追加推理，消耗 E tokens</text>

  <!-- Path D: Retry (right) -->
  <line x1="460" y1="285" x2="550" y2="340" stroke="#d35400" stroke-width="2"/>
  <polygon points="548,337 544,345 552,342" fill="#d35400"/>
  <rect x="480" y="345" width="140" height="50" rx="6" fill="#d35400"/>
  <text x="550" y="367" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">路径D: 重试</text>
  <text x="550" y="385" text-anchor="middle" font-size="10" fill="#fdebd0">重新求解，消耗 R tokens</text>

  <!-- Path E: Reject (rightmost) -->
  <line x1="490" y1="285" x2="700" y2="340" stroke="#c0392b" stroke-width="2"/>
  <polygon points="698,337 694,345 702,342" fill="#c0392b"/>
  <rect x="630" y="345" width="140" height="50" rx="6" fill="#c0392b"/>
  <text x="700" y="367" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">路径E: 拒绝</text>
  <text x="700" y="385" text-anchor="middle" font-size="10" fill="#fadbd8">返回空答案，放弃请求</text>

  <!-- Key insight box -->
  <rect x="60" y="420" width="740" height="45" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="430" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d6608">关键设计：SEVRA 本身是轻量级的——它不执行推理，只做决策。验证器 V 的开销远小于完整重新求解。</text>

  <!-- Source -->
  <text x="430" y="475" text-anchor="middle" font-size="10" fill="#999">Source: Acharjee Dip et al., Virginia Tech (arXiv:2606.19808v1)</text>
</svg>
