<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Title area -->
  <text x="400" y="48" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">StructAgent</text>
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Unified Causal Structure for Long-horizon Agents</text>
  
  <!-- Problem statement -->
  <rect x="60" y="95" width="340" height="70" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="230" y="120" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">原始交互历史</text>
  <text x="230" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">难以解释 · 难以验证 · 难以恢复</text>
  <text x="230" y="156" text-anchor="middle" fill="#64748b" font-size="10">累积观察 + 中间编辑 + 失败尝试</text>
  
  <!-- Arrow -->
  <path d="M 410 130 L 440 130" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/></marker></defs>
  
  <!-- Solution: Unified State -->
  <rect x="450" y="95" width="290" height="140" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="595" y="120" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">统一状态表示</text>
  
  <!-- State components -->
  <rect x="470" y="135" width="120" height="28" rx="5" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="530" y="153" text-anchor="middle" fill="#93c5fd" font-size="10">任务目标</text>
  
  <rect x="600" y="135" width="120" height="28" rx="5" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="660" y="153" text-anchor="middle" fill="#93c5fd" font-size="10">已完成步骤</text>
  
  <rect x="470" y="170" width="120" height="28" rx="5" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="530" y="188" text-anchor="middle" fill="#93c5fd" font-size="10">当前上下文</text>
  
  <rect x="600" y="170" width="120" height="28" rx="5" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="660" y="188" text-anchor="middle" fill="#93c5fd" font-size="10">已验证证据</text>
  
  <!-- Structured Workflow -->
  <rect x="450" y="250" width="290" height="70" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="595" y="275" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">结构化工作流</text>
  
  <!-- Three mechanisms -->
  <rect x="470" y="288" width="85" height="24" rx="4" fill="#312e81"/>
  <text x="512" y="304" text-anchor="middle" fill="#c4b5fd" font-size="9">进度检查点</text>
  
  <rect x="560" y="288" width="75" height="24" rx="4" fill="#312e81"/>
  <text x="597" y="304" text-anchor="middle" fill="#c4b5fd" font-size="9">证据驱动完成</text>
  
  <rect x="645" y="288" width="85" height="24" rx="4" fill="#312e81"/>
  <text x="687" y="304" text-anchor="middle" fill="#c4b5fd" font-size="9">目标性恢复</text>
  
  <!-- Performance metrics -->
  <rect x="60" y="250" width="340" height="170" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="230" y="278" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">OSWorld-Verified 结果</text>
  
  <!-- Qwen3.5-9B -->
  <rect x="85" y="295" width="290" height="22" rx="4" fill="#334155"/>
  <rect x="85" y="295" width="74" height="22" rx="4" fill="url(#accent)"/>
  <text x="385" y="310" text-anchor="start" fill="#e2e8f0" font-size="10">Qwen3.5-9B: 27% → 46.9%</text>
  
  <!-- Qwen3.5-27B -->
  <rect x="85" y="325" width="290" height="22" rx="4" fill="#334155"/>
  <rect x="85" y="325" width="164" height="22" rx="4" fill="url(#accent)"/>
  <text x="385" y="340" text-anchor="start" fill="#e2e8f0" font-size="10">Qwen3.5-27B: 31.6% → 62.2%</text>
  
  <!-- MiniMax-M3 -->
  <rect x="85" y="355" width="290" height="22" rx="4" fill="#334155"/>
  <rect x="85" y="355" width="229" height="22" rx="4" fill="url(#accent)"/>
  <text x="385" y="370" text-anchor="start" fill="#e2e8f0" font-size="10">MiniMax-M3: 78.9% (开源SOTA)</text>
  
  <!-- Minecraft generalization -->
  <rect x="60" y="435" width="340" height="45" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="230" y="455" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Minecraft 泛化验证</text>
  <text x="230" y="472" text-anchor="middle" fill="#94a3b8" font-size="10">统一因果结构 · 跨环境通用设计</text>
  
  <!-- UCSD + Aether AI -->
  <text x="400" y="490" text-anchor="middle" fill="#64748b" font-size="10">UC San Diego · Aether AI Lab · arXiv:2607.11388</text>
  
  <!-- Decorative -->
  <circle cx="780" cy="30" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="760" cy="20" r="2" fill="#8b5cf6" opacity="0.3"/>
</svg>
