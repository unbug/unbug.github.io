<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">AlphaZero 自对弈流水线</text>
  <text x="400" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Agent 自主实现的端到端 ML Pipeline</text>

  <!-- Pipeline flow: 6 stages -->
  <!-- Stage 1: Task Description -->
  <rect x="30" y="90" width="110" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="30" y="90" width="110" height="40" rx="8" fill="url(#blue)"/>
  <text x="85" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">任务描述</text>
  <text x="85" y="165" text-anchor="middle" fill="#94a3b8" font-size="11">AlphaZero</text>
  <text x="85" y="182" text-anchor="middle" fill="#94a3b8" font-size="11">Connect Four</text>
  <text x="85" y="200" text-anchor="middle" fill="#94a3b8" font-size="11">3h Budget</text>
  <text x="85" y="260" text-anchor="middle" fill="#64748b" font-size="10">简洁输入</text>
  <text x="85" y="276" text-anchor="middle" fill="#64748b" font-size="10">无参考实现</text>
  <text x="85" y="330" text-anchor="middle" fill="#64748b" font-size="10">研究品味</text>
  <text x="85" y="346" text-anchor="middle" fill="#64748b" font-size="10">涌现探测</text>

  <!-- Arrow 1 -->
  <polygon points="145,255 165,245 165,265" fill="#3b82f6" opacity="0.7"/>

  <!-- Stage 2: Agent -->
  <rect x="175" y="90" width="110" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="175" y="90" width="110" height="40" rx="8" fill="url(#purple)"/>
  <text x="230" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">编程Agent</text>
  <text x="230" y="165" text-anchor="middle" fill="#c4b5fd" font-size="11">Claude Opus</text>
  <text x="230" y="182" text-anchor="middle" fill="#c4b5fd" font-size="11">4.7 / GPT-</text>
  <text x="230" y="199" text-anchor="middle" fill="#c4b5fd" font-size="11">5.4 / Others</text>
  <text x="230" y="260" text-anchor="middle" fill="#64748b" font-size="10">知识检索</text>
  <text x="230" y="276" text-anchor="middle" fill="#64748b" font-size="10">系统设计</text>
  <text x="230" y="330" text-anchor="middle" fill="#64748b" font-size="10">代码生成</text>
  <text x="230" y="346" text-anchor="middle" fill="#64748b" font-size="10">调试优化</text>

  <!-- Arrow 2 -->
  <polygon points="290,255 310,245 310,265" fill="#8b5cf6" opacity="0.7"/>

  <!-- Stage 3: MCTS -->
  <rect x="320" y="90" width="120" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="320" y="90" width="120" height="40" rx="8" fill="url(#green)"/>
  <text x="380" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">MCTS 搜索</text>
  <circle cx="380" cy="170" r="28" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
  <circle cx="380" cy="170" r="18" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
  <circle cx="380" cy="170" r="8" fill="#34d399" opacity="0.4"/>
  <line x1="380" y1="142" x2="365" y2="130" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  <line x1="380" y1="142" x2="395" y2="130" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  <line x1="360" y1="170" x2="345" y2="170" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  <line x1="400" y1="170" x2="415" y2="170" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  <text x="380" y="210" text-anchor="middle" fill="#6ee7b7" font-size="9">Monte Carlo</text>
  <text x="380" y="225" text-anchor="middle" fill="#6ee7b7" font-size="9">Tree Search</text>
  <text x="380" y="260" text-anchor="middle" fill="#64748b" font-size="10">并行扩展</text>
  <text x="380" y="276" text-anchor="middle" fill="#64748b" font-size="10">模拟评估</text>
  <text x="380" y="330" text-anchor="middle" fill="#64748b" font-size="10">策略迭代</text>
  <text x="380" y="346" text-anchor="middle" fill="#64748b" font-size="10">价值收敛</text>

  <!-- Arrow 3 -->
  <polygon points="445,255 465,245 465,265" fill="#10b981" opacity="0.7"/>

  <!-- Stage 4: Neural Network -->
  <rect x="470" y="90" width="120" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="470" y="90" width="120" height="40" rx="8" fill="url(#amber)"/>
  <text x="530" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">深度网络</text>
  <!-- Network visualization -->
  <g opacity="0.7">
    <circle cx="500" cy="155" r="5" fill="#fbbf24"/>
    <circle cx="520" cy="155" r="5" fill="#fbbf24"/>
    <circle cx="540" cy="155" r="5" fill="#fbbf24"/>
    <circle cx="560" cy="155" r="5" fill="#fbbf24"/>
    <circle cx="500" cy="175" r="5" fill="#fbbf24"/>
    <circle cx="520" cy="175" r="5" fill="#fbbf24"/>
    <circle cx="540" cy="175" r="5" fill="#fbbf24"/>
    <circle cx="560" cy="175" r="5" fill="#fbbf24"/>
    <circle cx="500" cy="195" r="5" fill="#fbbf24"/>
    <circle cx="520" cy="195" r="5" fill="#fbbf24"/>
    <circle cx="540" cy="195" r="5" fill="#fbbf24"/>
    <circle cx="560" cy="195" r="5" fill="#fbbf24"/>
    <line x1="500" y1="155" x2="500" y2="175" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="500" y1="175" x2="500" y2="195" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="520" y1="155" x2="520" y2="175" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="520" y1="175" x2="520" y2="195" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="540" y1="155" x2="540" y2="175" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="540" y1="175" x2="540" y2="195" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="560" y1="155" x2="560" y2="175" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
    <line x1="560" y1="175" x2="560" y2="195" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
  </g>
  <text x="530" y="225" text-anchor="middle" fill="#fcd34d" font-size="9">策略头 + 价值头</text>
  <text x="530" y="242" text-anchor="middle" fill="#fcd34d" font-size="9">残差连接</text>
  <text x="530" y="260" text-anchor="middle" fill="#64748b" font-size="10">策略网络</text>
  <text x="530" y="276" text-anchor="middle" fill="#64748b" font-size="10">价值网络</text>
  <text x="530" y="330" text-anchor="middle" fill="#64748b" font-size="10">棋盘编码</text>
  <text x="530" y="346" text-anchor="middle" fill="#64748b" font-size="10">特征提取</text>

  <!-- Arrow 4 -->
  <polygon points="595,255 615,245 615,265" fill="#f59e0b" opacity="0.7"/>

  <!-- Stage 5: Self-Play -->
  <rect x="620" y="90" width="150" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="620" y="90" width="150" height="40" rx="8" fill="url(#amber)"/>
  <text x="695" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">自对弈循环</text>
  <!-- Connect Four board -->
  <rect x="660" y="130" width="70" height="50" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="672" cy="142" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="690" cy="142" r="5" fill="#eab308" opacity="0.6"/>
  <circle cx="708" cy="142" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="672" cy="155" r="5" fill="#eab308" opacity="0.6"/>
  <circle cx="690" cy="155" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="708" cy="155" r="5" fill="#eab308" opacity="0.6"/>
  <circle cx="672" cy="168" r="5" fill="#ef4444" opacity="0.6"/>
  <circle cx="690" cy="168" r="5" fill="#eab308" opacity="0.6"/>
  <circle cx="708" cy="168" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="695" y="195" text-anchor="middle" fill="#fcd34d" font-size="9">白 vs 黑</text>
  <text x="695" y="210" text-anchor="middle" fill="#fcd34d" font-size="9">自对弈</text>
  <text x="695" y="260" text-anchor="middle" fill="#64748b" font-size="10">数据生产</text>
  <text x="695" y="276" text-anchor="middle" fill="#64748b" font-size="10">回放缓冲</text>
  <text x="695" y="330" text-anchor="middle" fill="#64748b" font-size="10">训练更新</text>
  <text x="695" y="346" text-anchor="middle" fill="#64748b" font-size="10">策略迭代</text>

  <!-- Result banner -->
  <rect x="100" y="445" width="600" height="38" rx="6" fill="#0f2922" stroke="#10b981" stroke-width="1" opacity="0.9"/>
  <text x="400" y="468" text-anchor="middle" fill="#34d399" font-size="14" font-weight="600">Claude Opus 4.7: 7/8 胜 Pascal Pons | 其他Agent: 0-2/8 胜</text>

  <!-- Bottom note -->
  <text x="400" y="495" text-anchor="middle" fill="#475569" font-size="10">Sherwood, Aybar, Kaplan | arXiv:2604.25067 | 2026-04-27</text>
</svg>
