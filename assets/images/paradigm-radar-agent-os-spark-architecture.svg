<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="600" y="50" fill="#e2e8f0" font-size="26" font-family="Arial" font-weight="700" text-anchor="middle">RTX Spark 上的 Agent Runtime 架构</text>
  <rect x="100" y="100" width="1000" height="430" rx="24" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="138" fill="#ccfbf1" font-size="22" font-family="Arial" font-weight="700" text-anchor="middle">RTX Spark Notebook</text>
  <rect x="150" y="180" width="900" height="120" rx="16" fill="#134e4a"/>
  <text x="600" y="216" fill="#ecfeff" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">Windows Agent Framework Runtime</text>
  <rect x="180" y="236" width="180" height="42" rx="8" fill="#0f766e"/>
  <text x="270" y="262" fill="#ffffff" font-size="15" font-family="Arial" text-anchor="middle">文件系统域</text>
  <rect x="390" y="236" width="180" height="42" rx="8" fill="#0f766e"/>
  <text x="480" y="262" fill="#ffffff" font-size="15" font-family="Arial" text-anchor="middle">网络域</text>
  <rect x="600" y="236" width="180" height="42" rx="8" fill="#0f766e"/>
  <text x="690" y="262" fill="#ffffff" font-size="15" font-family="Arial" text-anchor="middle">UI 自动化域</text>
  <rect x="810" y="236" width="180" height="42" rx="8" fill="#0f766e"/>
  <text x="900" y="262" fill="#ffffff" font-size="15" font-family="Arial" text-anchor="middle">进程管理域</text>
  <rect x="150" y="330" width="430" height="120" rx="16" fill="#1d4ed8"/>
  <text x="365" y="366" fill="#dbeafe" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">128GB 统一内存</text>
