  <rect x="620" y="330" width="430" height="120" rx="16" fill="#7c3aed"/>
  <text x="835" y="366" fill="#ede9fe" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">Blackwell GPU Engine</text>
  <text x="835" y="394" fill="#f5f3ff" font-size="15" font-family="Arial" text-anchor="middle">1 PFLOP AI 性能</text>
  <text x="835" y="420" fill="#ddd6fe" font-size="15" font-family="Arial" text-anchor="middle">支撑本地推理和低时延多工具任务</text>
  <text x="600" y="492" fill="#64748b" font-size="14" font-family="Arial" text-anchor="middle">结论：硬件、运行时与系统能力域在同一台设备上闭环</text>
