<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="exponentialGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sigmoidGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid lines -->
  <g stroke="#2a2a4a" stroke-width="1" opacity="0.5">
    <line x1="100" y1="50" x2="700" y2="50"/>
    <line x1="100" y1="125" x2="700" y2="125"/>
    <line x1="100" y1="200" x2="700" y2="200"/>
    <line x1="100" y1="275" x2="700" y2="275"/>
    <line x1="100" y1="350" x2="700" y2="350"/>
    <line x1="100" y1="50" x2="100" y2="350"/>
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="300" y1="50" x2="300" y2="350"/>
    <line x1="400" y1="50" x2="400" y2="350"/>
    <line x1="500" y1="50" x2="500" y2="350"/>
    <line x1="600" y1="50" x2="600" y2="350"/>
    <line x1="700" y1="50" x2="700" y2="350"/>
  </g>
  
  <!-- Axes labels -->
  <g fill="#8888aa" font-family="Arial, sans-serif" font-size="14">
    <text x="400" y="380" text-anchor="middle">Time →</text>
    <text x="60" y="200" text-anchor="middle" transform="rotate(-90, 60, 200)">AI Capability</text>
    <text x="100" y="365" text-anchor="middle">2019</text>
    <text x="300" y="365" text-anchor="middle">2022</text>
    <text x="450" y="365" text-anchor="middle">2025</text>
    <text x="600" y="365" text-anchor="middle">2028</text>
  </g>
  
  <!-- Exponential curve (METR view) - dashed red -->
  <path d="M 100 340 Q 200 330 300 300 Q 400 250 500 180 Q 600 80 700 30" 
        stroke="url(#exponentialGradient)" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  
  <!-- Sigmoid curve (new paper view) - solid cyan -->
  <path d="M 100 340 Q 200 330 300 300 Q 400 220 480 150 Q 540 100 600 80 Q 650 70 700 65" 
        stroke="url(#sigmoidGradient)" stroke-width="4" fill="none"/>
  
  <!-- Inflection point marker -->
  <circle cx="480" cy="150" r="8" fill="#00d9ff"/>
  <circle cx="480" cy="150" r="4" fill="#1a1a2e"/>
  
  <!-- Legend -->
  <g font-family="Arial, sans-serif">
    <rect x="550" y="80" width="20" height="3" fill="url(#exponentialGradient)" stroke-dasharray="8,4"/>
    <text x="580" y="85" fill="#e94560" font-size="14">METR: Exponential</text>
    <rect x="550" y="105" width="20" height="4" fill="url(#sigmoidGradient)"/>
    <text x="580" y="110" fill="#00d9ff" font-size="14">New: Sigmoid (Plateau)</text>
    <circle cx="560" cy="135" r="6" fill="#00d9ff"/>
    <text x="580" y="140" fill="#ffffff" font-size="14">Inflection Point (2025)</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
    AI Growth: Exponential vs Plateau
  </text>
</svg>
