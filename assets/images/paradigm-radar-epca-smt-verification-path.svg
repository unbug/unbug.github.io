<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <rect width="900" height="450" fill="#0f172a" rx="8"/>
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="-apple-system, sans-serif">SMT 求解器验证路径</text>

  <!-- Input: Formula Set -->
  <g transform="translate(100, 200)">
    <rect x="-65" y="-40" width="130" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="-18" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold" font-family="monospace">输入公式集</text>
    <text x="0" y="0" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">F_intent: Transfer(A,B,5K)</text>
    <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">F_constraint: Balance(A)>=5K</text>
  </g>

  <!-- Arrow -->
  <line x1="165" y1="200" x2="230" y2="200" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="225,195 235,200 225,205" fill="#3b82f6"/>

  <!-- Z3 Solver Core -->
  <g transform="translate(340, 200)">
    <rect x="-80" y="-45" width="160" height="90" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="-22" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold" font-family="monospace">Z3 SMT Solver</text>

    <!-- Internal components -->
    <rect x="-65" y="-8" width="50" height="22" rx="3" fill="#a78bfa" opacity="0.15"/>
    <text x="-40" y="7" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">CNF 转换</text>

    <rect x="15" y="-8" width="50" height="22" rx="3" fill="#a78bfa" opacity="0.15"/>
    <text x="40" y="7" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">DPLL(T)</text>

    <rect x="-65" y="20" width="50" height="22" rx="3" fill="#a78bfa" opacity="0.15"/>
    <text x="-40" y="35" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">理论求解</text>

    <rect x="15" y="20" width="50" height="22" rx="3" fill="#a78bfa" opacity="0.15"/>
    <text x="40" y="35" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="monospace">冲突分析</text>

    <!-- Connecting lines inside -->
    <line x1="-15" y1="3" x2="15" y2="3" stroke="#a78bfa" stroke-width="1"/>
    <line x1="-40" y1="19" x2="-40" y2="20" stroke="#a78bfa" stroke-width="1"/>
    <line x1="40" y1="19" x2="40" y2="20" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Arrow -->
  <line x1="420" y1="200" x2="485" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="480,195 490,200 480,205" fill="#a78bfa"/>

  <!-- Decision Diamond -->
  <g transform="translate(600, 200)">
    <rect x="-55" y="-35" width="110" height="70" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="monospace">可满足性</text>
    <text x="0" y="12" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="monospace">判定结果</text>
  </g>

  <!-- YES branch (left) -->
  <line x1="600" y1="165" x2="600" y2="100" stroke="#10b981" stroke-width="2"/>
  <polygon points="595,105 600,95 605,105" fill="#10b981"/>
  <text x="615" y="130" text-anchor="start" fill="#10b981" font-size="11" font-weight="bold" font-family="monospace">SAT</text>

  <!-- ALLOW output -->
  <g transform="translate(600, 70)">
    <rect x="-55" y="-20" width="110" height="40" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold" font-family="monospace">ALLOW (安全)</text>
  </g>

  <!-- NO branch (right) -->
  <line x1="600" y1="235" x2="600" y2="300" stroke="#ef4444" stroke-width="2"/>
  <polygon points="595,295 600,305 605,295" fill="#ef4444"/>
  <text x="615" y="270" text-anchor="start" fill="#ef4444" font-size="11" font-weight="bold" font-family="monospace">UNSAT</text>

  <!-- DENY output -->
  <g transform="translate(600, 330)">
    <rect x="-55" y="-20" width="110" height="40" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">DENY (不安全)</text>
  </g>

  <!-- Bottom: Key insight -->
  <g transform="translate(450, 420)">
    <rect x="-380" y="-16" width="760" height="32" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">UNSAT 意味着：在所有可能的状态空间中，不存在满足所有约束的安全执行路径</text>
  </g>

  <!-- Side: Performance annotation -->
  <g transform="translate(780, 200)">
    <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="bold" font-family="monospace">核心延迟</text>
    <text x="0" y="12" text-anchor="middle" fill="#ec4899" font-size="16" font-weight="bold" font-family="monospace">0.44ms</text>
  </g>

  <!-- Arrow from performance to solver -->
  <line x1="730" y1="200" x2="500" y2="200" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
