<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Title area -->
  <text x="400" y="48" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Omni-Decision</text>
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Progressive Evidence-State Agent System</text>
  
  <!-- Central state representation -->
  <rect x="250" y="100" width="300" height="160" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="128" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="600">Evidence State (四元组)</text>
  
  <!-- Four state components -->
  <rect x="270" y="145" width="125" height="32" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="332" y="165" text-anchor="middle" fill="#22c55e" font-size="11">已验证事实</text>
  
  <rect x="405" y="145" width="125" height="32" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="467" y="165" text-anchor="middle" fill="#f59e0b" font-size="11">冲突列表</text>
  
  <rect x="270" y="187" width="125" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="332" y="207" text-anchor="middle" fill="#3b82f6" font-size="11">依赖关系图</text>
  
  <rect x="405" y="187" width="125" height="32" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="467" y="207" text-anchor="middle" fill="#ef4444" font-size="11">开放需求</text>
  
  <!-- Flow arrows -->
  <path d="M 400 260 L 400 300" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/></marker></defs>
  
  <!-- Process flow -->
  <text x="400" y="290" text-anchor="middle" fill="#cbd5e1" font-size="12">规划 → 执行 → 状态更新</text>
  
  <!-- Performance metrics -->
  <rect x="60" y="320" width="310" height="150" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="215" y="348" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">基准测试结果</text>
  
  <!-- OmniGAIA bar -->
  <rect x="90" y="365" width="250" height="22" rx="4" fill="#334155"/>
  <rect x="90" y="365" width="100" height="22" rx="4" fill="url(#accent)"/>
  <text x="350" y="380" text-anchor="start" fill="#e2e8f0" font-size="11">OmniGAIA: 45.6% (+27.3pp)</text>
  
  <!-- WorldSense bar -->
  <rect x="90" y="398" width="250" height="22" rx="4" fill="#334155"/>
  <rect x="90" y="398" width="116" height="22" rx="4" fill="url(#accent)"/>
  <text x="350" y="413" text-anchor="start" fill="#e2e8f0" font-size="11">WorldSense: 58.3% (+30.2pp)</text>
  
  <!-- Key insight box -->
  <rect x="430" y="320" width="310" height="150" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="585" y="348" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">核心创新</text>
  
  <text x="450" y="372" fill="#cbd5e1" font-size="11">训练无关设计 — 即插即用</text>
  <text x="450" y="392" fill="#cbd5e1" font-size="11">隐式推理 → 显式状态管理</text>
  <text x="450" y="412" fill="#cbd5e1" font-size="11">可观测性驱动可靠性提升</text>
  <text x="450" y="432" fill="#cbd5e1" font-size="11">Meta AI · arXiv:2607.11433</text>
  
  <!-- Decorative elements -->
  <circle cx="780" cy="30" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="760" cy="20" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="20" cy="480" r="3" fill="#6366f1" opacity="0.5"/>
</svg>
