<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="url(#bgGrad)" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Proof-or-Stop Lifecycle Control</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6c757d">Evidence-Gated Lifecycle Transitions for Autonomous Coding Agents</text>

  <!-- Flow: Agent Claim -->
  <rect x="30" y="90" width="140" height="56" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#1565C0">Agent Claim</text>
  <text x="100" y="134" text-anchor="middle" font-size="11" fill="#42a5f5">DONE / Ready-to-merge</text>

  <!-- Arrow: Claim to Gate -->
  <line x1="170" y1="118" x2="230" y2="118" stroke="#90a4ae" stroke-width="2"/>
  <polygon points="230,113 240,118 230,123" fill="#90a4ae"/>

  <!-- Evidence Gate (central diamond) -->
  <rect x="250" y="76" width="160" height="84" rx="10" fill="#fff3e0" stroke="#FF9800" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="330" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">Evidence Gate</text>
  <line x1="270" y1="112" x2="390" y2="112" stroke="#ffe0b2" stroke-width="1"/>
  <text x="330" y="128" text-anchor="middle" font-size="10.5" fill="#bf360c">Mechanical Verification</text>

  <!-- Gate sub-items -->
  <rect x="270" y="134" width="120" height="18" rx="4" fill="#ffe0b2" stroke="none"/>
  <text x="330" y="147" text-anchor="middle" font-size="9.5" fill="#e65100">State-bound + Fresh</text>

  <!-- Arrow: Gate to Verify -->
  <line x1="410" y1="118" x2="470" y2="118" stroke="#90a4ae" stroke-width="2"/>
  <polygon points="470,113 480,118 470,123" fill="#90a4ae"/>

  <!-- Verify -->
  <rect x="485" y="90" width="130" height="56" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#2E7D32">Verify</text>
  <text x="550" y="134" text-anchor="middle" font-size="11" fill="#66bb6a">Tamper-proof Check</text>

  <!-- Arrow: Verify to Transition -->
  <line x1="615" y1="118" x2="670" y2="118" stroke="#4CAF50" stroke-width="2"/>
  <polygon points="670,113 680,118 670,123" fill="#4CAF50"/>

  <!-- Transition (success) -->
  <rect x="685" y="90" width="95" height="56" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="732" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Transition</text>
  <text x="732" y="134" text-anchor="middle" font-size="11" fill="#66bb6a">State Change OK</text>

  <!-- Block path (downward from gate) -->
  <line x1="330" y1="160" x2="330" y2="200" stroke="#ef5350" stroke-width="2"/>
  <polygon points="325,200 330,210 335,200" fill="#ef5350"/>

  <!-- Block -->
  <rect x="260" y="210" width="140" height="56" rx="8" fill="#ffebee" stroke="#ef5350" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="330" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">Block</text>
  <text x="330" y="254" text-anchor="middle" font-size="11" fill="#ef9a9a">Evidence Insufficient</text>

  <!-- Label for block arrow -->
  <rect x="370" y="180" width="60" height="20" rx="4" fill="#ffebee"/>
  <text x="400" y="194" text-anchor="middle" font-size="9.5" fill="#c62828">Reject</text>

  <!-- Bottom: Key properties -->
  <rect x="30" y="290" width="740" height="110" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="314" text-anchor="middle" font-size="12" font-weight="700" fill="#424242">Key Design Principles</text>

  <!-- Three principle boxes -->
  <rect x="50" y="326" width="220" height="60" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="160" y="348" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a2e">Minimal Privilege</text>
  <text x="160" y="366" text-anchor="middle" font-size="10" fill="#757575">Only verified evidence</text>
  <text x="160" y="380" text-anchor="middle" font-size="10" fill="#757575">triggers transitions</text>

  <rect x="290" y="326" width="220" height="60" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="348" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a2e">State-Binding</text>
  <text x="400" y="366" text-anchor="middle" font-size="10" fill="#757575">Evidence tied to tracked</text>
  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#757575">source-state snapshots</text>

  <rect x="530" y="326" width="220" height="60" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="640" y="348" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a2e">Mechanical Verification</text>
  <text x="640" y="366" text-anchor="middle" font-size="10" fill="#757575">Zero false accepts across</text>
  <text x="640" y="380" text-anchor="middle" font-size="10" fill="#757575">18 tamper classes tested</text>

  <!-- Bottom stats -->
  <rect x="30" y="412" width="740" height="0" rx="0"/>
</svg>