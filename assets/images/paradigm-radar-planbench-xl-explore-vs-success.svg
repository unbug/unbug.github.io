<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1f4e"/>
    </linearGradient>
  </defs>

  <rect width="960" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">探索广度 vs 准确率: 强正相关但探索不等于成功</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">Pearson r = 0.902 | Mean EDT (平均探索数据类型数) vs 任务准确率</text>

  <!-- Chart area -->
  <rect x="120" y="75" width="720" height="340" rx="8" fill="#0f172a"/>

  <!-- Y axis: Accuracy % -->
  <text x="110" y="95" text-anchor="end" font-size="11" fill="#64748b">100%</text>
  <line x1="120" y1="93" x2="840" y2="93" stroke="#1e293b" stroke-width="1"/>

  <text x="110" y="155" text-anchor="end" font-size="11" fill="#64748b">75%</text>
  <line x1="120" y1="153" x2="840" y2="153" stroke="#1e293b" stroke-width="1"/>

  <text x="110" y="215" text-anchor="end" font-size="11" fill="#64748b">50%</text>
  <line x1="120" y1="213" x2="840" y2="213" stroke="#1e293b" stroke-width="1"/>

  <text x="110" y="275" text-anchor="end" font-size="11" fill="#64748b">25%</text>
  <line x1="120" y1="273" x2="840" y2="273" stroke="#1e293b" stroke-width="1"/>

  <text x="110" y="335" text-anchor="end" font-size="11" fill="#64748b">0%</text>
  <line x1="120" y1="333" x2="840" y2="333" stroke="#1e293b" stroke-width="1"/>

  <!-- X axis: Mean EDT -->
  <text x="160" y="355" text-anchor="middle" font-size="10" fill="#64748b">10</text>
  <line x1="160" y1="93" x2="160" y2="415" stroke="#1e293b" stroke-width="1"/>

  <text x="280" y="355" text-anchor="middle" font-size="10" fill="#64748b">15</text>
  <line x1="280" y1="93" x2="280" y2="415" stroke="#1e293b" stroke-width="1"/>

  <text x="400" y="355" text-anchor="middle" font-size="10" fill="#64748b">20</text>
  <line x1="400" y1="93" x2="400" y2="415" stroke="#1e293b" stroke-width="1"/>

  <text x="520" y="355" text-anchor="middle" font-size="10" fill="#64748b">25</text>
  <line x1="520" y1="93" x2="520" y2="415" stroke="#1e293b" stroke-width="1"/>

  <text x="640" y="355" text-anchor="middle" font-size="10" fill="#64748b">30</text>
  <line x1="640" y1="93" x2="640" y2="415" stroke="#1e293b" stroke-width="1"/>

  <!-- Trend line (approximate) -->
  <line x1="170" y1="330" x2="680" y2="100" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Data points: (Mean EDT, Accuracy) -->
  <!-- Gemini-3.1-Pro: EDT=25.16, Acc=77.06% -->
  <circle cx="640" cy="108" r="10" fill="#3b82f6" opacity="0.9"/>
  <text x="640" y="95" text-anchor="middle" font-size="10" fill="#93c5fd">Gemini-3.1</text>

  <!-- DeepSeek-V4: EDT=22.8, Acc=63.08% -->
  <circle cx="540" cy="170" r="10" fill="#10b981" opacity="0.9"/>
  <text x="540" y="157" text-anchor="middle" font-size="10" fill="#6ee7b7">DeepSeek-V4</text>

  <!-- GPT-5.4: EDT=20.65, Acc=51.90% -->
  <circle cx="480" cy="213" r="10" fill="#fbbf24" opacity="0.9"/>
  <text x="480" y="200" text-anchor="middle" font-size="10" fill="#fde68a">GPT-5.4</text>

  <!-- Gemini-3.5: EDT=25.16, Acc=52.19% -->
  <circle cx="640" cy="210" r="10" fill="#a78bfa" opacity="0.9"/>
  <text x="640" y="235" text-anchor="middle" font-size="10" fill="#c4b5fd">Gemini-3.5</text>

  <!-- Llama-70B: EDT=19.2, Acc=18.96% -->
  <circle cx="440" cy="300" r="10" fill="#f97316" opacity="0.9"/>
  <text x="440" y="325" text-anchor="middle" font-size="10" fill="#fb923c">Llama-70B</text>

  <!-- Qwen3-32B: EDT=16.5, Acc=2.75% -->
  <circle cx="340" cy="338" r="8" fill="#ef4444" opacity="0.9"/>
  <text x="340" y="360" text-anchor="middle" font-size="10" fill="#fca5a5">Qwen3-32B</text>

  <!-- Qwen3-14B: EDT=15, Acc=0.92% -->
  <circle cx="300" cy="348" r="7" fill="#ef4444" opacity="0.7"/>
  <text x="300" y="368" text-anchor="middle" font-size="9" fill="#fca5a5">Qwen3-14B</text>

  <!-- Annotation: Exploration != Success -->
  <rect x="200" y="430" width="560" height="30" rx="6" fill="#78350f"/>
  <text x="480" y="449" text-anchor="middle" font-size="12" fill="#fde68a">关键洞察: Llama-70B (EDT=19.2) vs GPT-5.4 (EDT=20.65) — 探索量相近但准确率差距3倍</text>
</svg>
