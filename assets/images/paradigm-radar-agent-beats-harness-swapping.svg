<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">Harness-Swapping: GPT-5.4 共适应效应</text>

  <!-- Chart area -->
  <rect x="100" y="60" width="600" height="340" rx="8" fill="#1e293b"/>

  <!-- Y axis label -->
  <text x="50" y="230" text-anchor="middle" font-size="12" fill="#94a3b8" transform="rotate(-90,50,230)">解决率 (%)</text>

  <!-- X axis label -->
  <text x="400" y="430" text-anchor="middle" font-size="12" fill="#94a3b8">Harness 环境 (从左到右: Codex → WebArena → GAIA → SWE-bench)</text>

  <!-- Grid lines -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="160" x2="700" y2="160" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="220" x2="700" y2="220" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="280" x2="700" y2="280" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="340" x2="700" y2="340" stroke="#334155" stroke-width="0.5"/>

  <!-- Y axis values -->
  <text x="90" y="104" text-anchor="end" font-size="10" fill="#64748b">95%</text>
  <text x="90" y="164" text-anchor="end" font-size="10" fill="#64748b">85%</text>
  <text x="90" y="224" text-anchor="end" font-size="10" fill="#64748b">75%</text>
  <text x="90" y="284" text-anchor="end" font-size="10" fill="#64748b">65%</text>
  <text x="90" y="344" text-anchor="end" font-size="10" fill="#64748b">55%</text>

  <!-- Data points for GPT-5.4 across harnesses -->
  <!-- Codex (native) - highest solve rate, most tokens -->
  <circle cx="200" cy="130" r="12" fill="#6366f1" opacity="0.9"/>
  <text x="200" y="158" text-anchor="middle" font-size="10" fill="#a5b4fc">Codex</text>
  <text x="200" y="172" text-anchor="middle" font-size="9" fill="#64748b">(原生)</text>

  <!-- WebArena -->
  <circle cx="340" cy="185" r="10" fill="#8b5cf6" opacity="0.7"/>
  <text x="340" y="208" text-anchor="middle" font-size="10" fill="#c4b5fd">WebArena</text>

  <!-- GAIA -->
  <circle cx="480" cy="210" r="9" fill="#a78bfa" opacity="0.6"/>
  <text x="480" y="233" text-anchor="middle" font-size="10" fill="#c4b5fd">GAIA</text>

  <!-- SWE-bench -->
  <circle cx="620" cy="245" r="8" fill="#c4b5fd" opacity="0.5"/>
  <text x="620" y="268" text-anchor="middle" font-size="10" fill="#c4b5fd">SWE-bench</text>

  <!-- Trend line -->
  <line x1="200" y1="130" x2="620" y2="245" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Token consumption annotation (right side) -->
  <rect x="500" y="80" width="230" height="100" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="615" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">Token 消耗趋势</text>

  <!-- Token bars -->
  <rect x="520" y="115" width="60" height="15" rx="3" fill="#6366f1"/>
  <text x="590" y="127" font-size="9" fill="#a5b4fc">高 (原生)</text>

  <rect x="520" y="140" width="45" height="15" rx="3" fill="#8b5cf6"/>
  <text x="575" y="152" font-size="9" fill="#c4b5fd">中</text>

  <rect x="520" y="165" width="35" height="15" rx="3" fill="#a78bfa"/>
  <text x="565" y="177" font-size="9" fill="#c4b5fd">中低</text>

  <rect x="520" y="190" width="25" height="15" rx="3" fill="#c4b5fd"/>
  <text x="555" y="202" font-size="9" fill="#e2e8f0">低</text>

  <!-- Key insight box -->
  <rect x="120" y="445" width="560" height="35" rx="6" fill="#6366f1" opacity="0.15"/>
  <text x="400" y="467" text-anchor="middle" font-size="12" fill="#a5b4fc">共适应效应: Agent 在原生环境中 verbose but correct，跨环境迁移时 fast but less accurate</text>

  <!-- Legend -->
  <circle cx="130" cy="85" r="6" fill="#6366f1"/>
  <text x="145" y="89" font-size="10" fill="#e2e8f0">解决率 (纵轴)</text>

  <rect x="280" y="78" width="15" height="12" rx="2" fill="#6366f1"/>
  <text x="300" y="89" font-size="10" fill="#e2e8f0">Token 消耗 (横轴方向)</text>

  <!-- Arrow annotation for trade-off -->
  <path d="M 200 130 Q 400 160 620 245" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
  </marker></defs>

  <!-- Trade-off label -->
  <text x="420" y="155" font-size="10" fill="#f87171">速度-准确率权衡</text>
</svg>
