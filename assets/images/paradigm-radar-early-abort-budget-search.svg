  <text x="400" y="388" text-anchor="middle" font-size="10" fill="#f57f17">搜索空间: 6^6 = 46,656 个候选 budget vector | 最优策略倾向于在早期轮次分配更高 recall target</text>

  <!-- Color scale legend -->
