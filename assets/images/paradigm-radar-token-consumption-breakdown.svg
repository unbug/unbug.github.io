<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="860" height="540" fill="#fafafa"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">Token消耗构成分析：输入驱动 vs 输出</text>

  <!-- Donut chart center -->
  <circle cx="350" cy="260" r="140" fill="#fff"/>
  
  <!-- Input Token slice (85%) - blue -->
  <path d="M 350,260 L 350,120 A 140,140 0 1,1 279.5,290 Z" fill="#4a90d9"/>
  
  <!-- Output Token slice (15%) - green -->
  <path d="M 350,260 L 279.5,290 A 140,140 0 0,1 350,120 Z" fill="#27ae60"/>

  <!-- Center text -->
  <text x="350" y="255" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a1a1a">~85%</text>
  <text x="350" y="275" text-anchor="middle" font-size="12" fill="#666">输入Token</text>

  <!-- Labels with lines -->
  <line x1="300" y1="180" x2="180" y2="140" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="60" y="120" width="120" height="40" rx="3" fill="#e8f4fd"/>
  <text x="120" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">输入Token</text>
  <text x="120" y="152" text-anchor="middle" font-size="10" fill="#1a5276">~85% 总消耗</text>

  <line x1="310" y1="310" x2="180" y2="360" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="60" y="345" width="120" height="40" rx="3" fill="#e8f5e9"/>
  <text x="120" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">输出Token</text>
  <text x="120" y="377" text-anchor="middle" font-size="10" fill="#1e8449">~15% 总消耗</text>

  <!-- Right side: breakdown details -->
  <rect x="520" y="60" width="300" height="180" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="670" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">输入Token细分</text>

  <!-- System prompt bar -->
  <rect x="540" y="100" width="260" height="28" rx="3" fill="#4a90d9"/>
  <text x="545" y="119" font-size="11" fill="#fff">系统提示 + 工具定义</text>

  <!-- Context history bar -->
  <rect x="540" y="138" width="260" height="28" rx="3" fill="#357abd"/>
  <text x="545" y="157" font-size="11" fill="#fff">对话历史 (累积增长)</text>

  <!-- Tool definitions bar -->
  <rect x="540" y="176" width="260" height="28" rx="3" fill="#5b9bd5"/>
  <text x="545" y="195" font-size="11" fill="#fff">代码上下文 + 错误信息</text>

  <!-- Output bar -->
  <rect x="540" y="218" width="260" height="28" rx="3" fill="#27ae60"/>
  <text x="545" y="237" font-size="11" fill="#fff">生成的代码 (输出)</text>

  <!-- Key insight -->
  <rect x="60" y="420" width="740" height="50" rx="4" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
  <text x="430" y="442" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c5460">优化方向：减少输出Token几乎无效，真正需要压缩的是输入Token——尤其是对话历史累积</text>

  <!-- Source -->
  <text x="430" y="500" text-anchor="middle" font-size="9" fill="#999">Source: Bai et al., Stanford / Michigan (arXiv:2604.22750v2)</text>

  <!-- Article badge -->
  <rect x="60" y="485" width="100" height="24" rx="3" fill="#e3f2fd"/>
  <text x="110" y="501" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Article #72</text>

  <!-- Paradigm Radar badge -->
  <rect x="700" y="485" width="100" height="24" rx="3" fill="#fff3cd"/>
  <text x="750" y="501" text-anchor="middle" font-size="9" fill="#856404">AI Paradigm Radar</text>
</svg>
