<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="conceptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- 装饰性网格 -->
  <g opacity="0.1">
    <path d="M0,100 Q300,50 600,100 T1200,100" stroke="white" stroke-width="1" fill="none"/>
    <path d="M0,200 Q300,150 600,200 T1200,200" stroke="white" stroke-width="1" fill="none"/>
    <path d="M0,300 Q300,250 600,300 T1200,300" stroke="white" stroke-width="1" fill="none"/>
    <path d="M0,400 Q300,350 600,400 T1200,400" stroke="white" stroke-width="1" fill="none"/>
    <path d="M0,500 Q300,450 600,500 T1200,500" stroke="white" stroke-width="1" fill="none"/>
  </g>

  <!-- 标题 -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">CATS Net</text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.9">从感官体验到抽象概念的 AI 突破</text>

  <!-- 感官输入图标组 -->
  <g transform="translate(100, 200)">
    <!-- 眼睛（视觉） -->
    <circle cx="60" cy="60" r="40" fill="white" opacity="0.9"/>
    <circle cx="60" cy="60" r="25" fill="#667eea"/>
    <circle cx="60" cy="60" r="10" fill="white"/>
    <text x="60" y="130" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">视觉</text>

    <!-- 耳朵（听觉） -->
    <g transform="translate(150, 0)">
      <ellipse cx="60" cy="60" rx="35" ry="45" fill="white" opacity="0.9"/>
      <ellipse cx="60" cy="60" rx="20" ry="30" fill="#764ba2"/>
      <text x="60" y="130" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">听觉</text>
    </g>

    <!-- 手（触觉） -->
    <g transform="translate(300, 0)">
      <rect x="20" y="20" width="80" height="80" rx="15" fill="white" opacity="0.9"/>
      <path d="M40,60 L60,50 L80,60 L60,70 Z" fill="#f093fb"/>
      <text x="60" y="130" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">触觉</text>
    </g>
  </g>

  <!-- 箭头指向第一个模块 -->
  <g transform="translate(450, 260)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="white" stroke-width="3" opacity="0.8"/>
    <polygon points="80,0 70,-8 70,8" fill="white" opacity="0.8"/>
  </g>

  <!-- 模块 1：感官-运动编码器 -->
  <g transform="translate(530, 180)">
    <rect x="0" y="0" width="180" height="140" rx="20" fill="url(#moduleGradient)" filter="url(#glow)"/>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">感官-运动</text>
    <text x="90" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">编码器</text>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.9">Sensory-Motor</text>
    <text x="90" y="130" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.9">Encoder</text>
  </g>

  <!-- 箭头指向第二个模块 -->
  <g transform="translate(710, 260)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="white" stroke-width="3" opacity="0.8"/>
    <polygon points="80,0 70,-8 70,8" fill="white" opacity="0.8"/>
  </g>

  <!-- 模块 2：概念压缩器 -->
  <g transform="translate(790, 180)">
    <rect x="0" y="0" width="180" height="140" rx="20" fill="url(#conceptGradient)" filter="url(#glow)"/>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">概念</text>
    <text x="90" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">压缩器</text>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.9">Concept</text>
    <text x="90" y="130" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.9">Compressor</text>
  </g>

  <!-- 箭头指向概念输出 -->
  <g transform="translate(970, 260)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="white" stroke-width="3" opacity="0.8"/>
    <polygon points="80,0 70,-8 70,8" fill="white" opacity="0.8"/>
  </g>

  <!-- 概念输出 -->
  <g transform="translate(1050, 180)">
    <circle cx="70" cy="70" r="60" fill="white" opacity="0.95" filter="url(#glow)"/>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#667eea" text-anchor="middle">抽象</text>
    <text x="70" y="85" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#667eea" text-anchor="middle">概念</text>
  </g>

  <!-- 底部装饰：神经网络连接 -->
  <g transform="translate(100, 420)" opacity="0.6">
    <!-- 神经元节点 -->
    <circle cx="100" cy="50" r="8" fill="white"/>
    <circle cx="200" cy="30" r="8" fill="white"/>
    <circle cx="300" cy="50" r="8" fill="white"/>
    <circle cx="400" cy="30" r="8" fill="white"/>
    <circle cx="500" cy="50" r="8" fill="white"/>
    <circle cx="600" cy="30" r="8" fill="white"/>
    <circle cx="700" cy="50" r="8" fill="white"/>
    <circle cx="800" cy="30" r="8" fill="white"/>
    <circle cx="900" cy="50" r="8" fill="white"/>
    <circle cx="1000" cy="30" r="8" fill="white"/>

    <!-- 连接 -->
    <line x1="100" y1="50" x2="200" y2="30" stroke="white" stroke-width="2"/>
    <line x1="200" y1="30" x2="300" y2="50" stroke="white" stroke-width="2"/>
    <line x1="300" y1="50" x2="400" y2="30" stroke="white" stroke-width="2"/>
    <line x1="400" y1="30" x2="500" y2="50" stroke="white" stroke-width="2"/>
    <line x1="500" y1="50" x2="600" y2="30" stroke="white" stroke-width="2"/>
    <line x1="600" y1="30" x2="700" y2="50" stroke="white" stroke-width="2"/>
    <line x1="700" y1="50" x2="800" y2="30" stroke="white" stroke-width="2"/>
    <line x1="800" y1="30" x2="900" y2="50" stroke="white" stroke-width="2"/>
    <line x1="900" y1="50" x2="1000" y2="30" stroke="white" stroke-width="2"/>
  </g>

  <!-- 底部文字 -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.9">Nature Computational Science · 2026</text>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7">AI 之间的概念交流 · 类脑认知 · 知识迁移</text>
</svg>