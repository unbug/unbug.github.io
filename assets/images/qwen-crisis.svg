<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <circle cx="400" cy="200" r="150" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="150;170;150" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(400, 200)">
    <rect x="-120" y="-80" width="240" height="160" rx="10" fill="url(#blueGrad)" filter="url(#glow)"/>
    <text x="0" y="-30" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">Qwen 3.5</text>
    <text x="0" y="5" text-anchor="middle" fill="#00d9ff" font-size="14">技术巅峰</text>
    <text x="0" y="35" text-anchor="middle" fill="#00d9ff" font-size="14">9B ≈ 120B</text>
  </g>

  <g>
    <circle cx="150" cy="120" r="30" fill="url(#redGrad)" filter="url(#glow)">
      <animate attributeName="cy" values="120;100;120" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="125" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">林</text>
    <path d="M 180 120 L 280 180" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <circle cx="100" cy="280" r="25" fill="url(#redGrad)" opacity="0.8">
      <animate attributeName="cx" values="100;80;100" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="285" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">惠</text>
  </g>

  <g>
    <circle cx="200" cy="300" r="22" fill="url(#redGrad)" opacity="0.7">
      <animate attributeName="cy" values="300;280;300" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="200" y="305" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">余</text>
  </g>

  <g>
    <circle cx="650" cy="280" r="22" fill="url(#redGrad)" opacity="0.7">
      <animate attributeName="cx" values="650;670;650" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <text x="650" y="285" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">李</text>
  </g>

  <g transform="translate(680, 100)">
    <rect x="-40" y="-30" width="80" height="60" rx="5" fill="#e94560" opacity="0.2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#e94560" font-size="20">⚠️</text>
    <text x="0" y="20" text-anchor="middle" fill="#e94560" font-size="11">危机</text>
  </g>

  <text x="400" y="370" text-anchor="middle" fill="#888" font-size="14">2026年3月 · 阿里巴巴AI团队</text>
</svg>