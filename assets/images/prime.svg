<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="12" fill="#0f172a"/>
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-size="22" font-family="system-ui" font-weight="bold">PRIME: Iterative Memory Evolution</text>

  <!-- Four stages -->
  <!-- Stage 1: Exploration -->
  <rect x="30" y="80" width="160" height="60" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="110" y="108" text-anchor="middle" fill="#ffffff" font-size="14" font-family="system-ui" font-weight="bold">探索阶段</text>
  <text x="110" y="128" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="system-ui">收集交互轨迹</text>

  <!-- Arrow 1-2 -->
  <path d="M 190 110 L 230 110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Distillation -->
  <rect x="240" y="80" width="160" height="60" rx="8" fill="#8b5cf6" opacity="0.9"/>
  <text x="320" y="108" text-anchor="middle" fill="#ffffff" font-size="14" font-family="system-ui" font-weight="bold">蒸馏阶段</text>
  <text x="320" y="128" text-anchor="middle" fill="#ddd6fe" font-size="11" font-family="system-ui">提取结构化经验</text>

  <!-- Arrow 2-3 -->
  <path d="M 400 110 L 440 110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Evolution -->
  <rect x="450" y="80" width="160" height="60" rx="8" fill="#059669" opacity="0.9"/>
  <text x="530" y="108" text-anchor="middle" fill="#ffffff" font-size="14" font-family="system-ui" font-weight="bold">进化阶段</text>
  <text x="530" y="128" text-anchor="middle" fill="#a7f3d0" font-size="11" font-family="system-ui">合并/淘汰/推导</text>

  <!-- Arrow 3-4 -->
  <path d="M 610 110 L 650 110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Memory-Guided Reasoning -->
  <rect x="660" y="80" width="120" height="60" rx="8" fill="#f59e0b" opacity="0.9"/>
  <text x="720" y="108" text-anchor="middle" fill="#ffffff" font-size="13" font-family="system-ui" font-weight="bold">记忆引导推理</text>
  <text x="720" y="128" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="system-ui">检索历史经验</text>

  <!-- Three semantic zones -->
  <text x="400" y="185" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui" font-weight="bold">三语义区</text>

  <rect x="60" y="210" width="200" height="70" rx="8" fill="#1e40af" opacity="0.7"/>
  <text x="160" y="242" text-anchor="middle" fill="#ffffff" font-size="14" font-family="system-ui" font-weight="bold">成功策略</text>
  <text x="160" y="262" text-anchor="middle" fill="#bfdbfe" font-size="11" font-family="system-ui">有效工具调用序列</text>

  <rect x="300" y="210" width="200" height="70" rx="8" fill="#5b21b6" opacity="0.7"/>
  <text x="400" y="242" text-anchor="middle" fill="#ffffff" font-size="14" font-family="system-ui" font-weight="bold">失败模式</text>
  <text x="400" y="262" text-anchor="middle" fill="#ddd6fe" font-size="11" font-family="system-ui">死胡同路径记录</text>

  <rect x="540" y="210" width="200" height="70" rx="8" fill="#065f46" opacity="0.7"/>
  <text x="640" y="242" text-anchor="middle" fill="#ffffff" font-size="14" font-family="system-ui" font-weight="bold">用户偏好</text>
  <text x="640" y="262" text-anchor="middle" fill="#a7f3d0" font-size="11" font-family="system-ui">个性化偏好建模</text>

  <!-- Meta operations -->
  <text x="400" y="320" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui" font-weight="bold">记忆元操作</text>
  <rect x="200" y="340" width="120" height="40" rx="6" fill="#334155"/>
  <text x="260" y="365" text-anchor="middle" fill="#e2e8f0" font-size="12" font-family="system-ui">合并相似经验</text>

  <rect x="340" y="340" width="120" height="40" rx="6" fill="#334155"/>
  <text x="400" y="365" text-anchor="middle" fill="#e2e8f0" font-size="12" font-family="system-ui">淘汰过时经验</text>

  <rect x="480" y="340" width="140" height="40" rx="6" fill="#334155"/>
  <text x="550" y="365" text-anchor="middle" fill="#e2e8f0" font-size="12" font-family="system-ui">推导通用策略</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>