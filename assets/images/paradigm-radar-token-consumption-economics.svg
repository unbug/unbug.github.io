<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="url(#bgGrad)"/>

  <!-- Title area -->
  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Agent的Token账单</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" fill="#555">1000倍消耗差异背后的工程真相</text>

  <!-- Central visual: cost pyramid -->
  <rect x="280" y="90" width="300" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>

  <!-- Layer 1: System Prompt (fixed cost) -->
  <rect x="310" y="115" width="240" height="40" rx="4" fill="#4a90d9"/>
  <text x="430" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">系统提示 + 工具定义 (固定成本)</text>

  <!-- Layer 2: Context Accumulation -->
  <rect x="310" y="165" width="240" height="80" rx="4" fill="#e74c3c"/>
  <text x="430" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">上下文累积 (成本爆炸推手)</text>
  <text x="430" y="218" text-anchor="middle" font-size="11" fill="#fff">每轮迭代 × 完整对话历史</text>

  <!-- Layer 3: Output Code -->
  <rect x="310" y="255" width="240" height="40" rx="4" fill="#27ae60"/>
  <text x="430" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">输出代码 (~15% 总消耗)</text>

  <!-- Arrow annotations -->
  <line x1="560" y1="135" x2="700" y2="135" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="705" y="138" font-size="10" fill="#4a90d9">固定开销</text>

  <line x1="560" y1="205" x2="700" y2="205" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="705" y="208" font-size="10" fill="#e74c3c">线性增长</text>

  <!-- Key stats boxes -->
  <rect x="60" y="115" width="200" height="60" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="160" y="140" text-anchor="middle" font-size="28" font-weight="bold" fill="#856404">30x</text>
  <text x="160" y="160" text-anchor="middle" font-size="11" fill="#856404">同一任务运行间差异</text>

  <rect x="60" y="200" width="200" height="60" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="160" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#721c24">~15%</text>
  <text x="160" y="245" text-anchor="middle" font-size="11" fill="#721c24">输出Token占比</text>

  <!-- Bottom insight -->
  <rect x="60" y="380" width="740" height="50" rx="6" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
  <text x="430" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c5460">核心发现：输入Token驱动成本，而非输出Token。优化Agent成本的关键是压缩输入。</text>

  <!-- Source -->
  <text x="430" y="470" text-anchor="middle" font-size="11" fill="#999">Source: Bai et al., Stanford / Michigan (arXiv:2604.22750v2)</text>

  <!-- Models mentioned -->
  <rect x="60" y="450" width="300" height="30" rx="4" fill="#f8f9fa"/>
  <text x="210" y="470" text-anchor="middle" font-size="10" fill="#666">GPT-5 · Claude-Sonnet-4.5 · Kimi-K2 · Gemini-2.5-Pro</text>

  <!-- Benchmark badge -->
  <rect x="680" y="450" width="120" height="30" rx="4" fill="#e8f5e9"/>
  <text x="740" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">SWE-bench Verified</text>

  <!-- Paradigm Radar badge -->
  <rect x="680" y="500" width="120" height="24" rx="3" fill="#fff3cd"/>
  <text x="740" y="516" text-anchor="middle" font-size="9" fill="#856404">AI Paradigm Radar #72</text>

  <!-- Article number -->
  <rect x="60" y="500" width="100" height="24" rx="3" fill="#e3f2fd"/>
  <text x="110" y="516" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Article #72</text>
</svg>
