<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">N×M vs N+M: 集成复杂度对比</text>

  <!-- Chart area -->
  <rect x="100" y="70" width="600" height="300" rx="8" fill="#1e293b"/>

  <!-- Y axis label -->
  <text x="50" y="220" text-anchor="middle" font-size="13" fill="#94a3b8" transform="rotate(-90,50,220)">集成路径数</text>

  <!-- X axis labels -->
  <text x="160" y="395" text-anchor="middle" font-size="12" fill="#f87171">N=5</text>
  <text x="280" y="395" text-anchor="middle" font-size="12" fill="#f87171">N=10</text>
  <text x="400" y="395" text-anchor="middle" font-size="12" fill="#f87171">N=20</text>
  <text x="520" y="395" text-anchor="middle" font-size="12" fill="#f87171">N=50</text>
  <text x="640" y="395" text-anchor="middle" font-size="12" fill="#f87171">N=100</text>

  <!-- Grid lines -->
  <line x1="100" y1="130" x2="700" y2="130" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="190" x2="700" y2="190" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="250" x2="700" y2="250" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="310" x2="700" y2="310" stroke="#334155" stroke-width="0.5"/>

  <!-- Y axis values -->
  <text x="90" y="134" text-anchor="end" font-size="11" fill="#64748b">2500</text>
  <text x="90" y="194" text-anchor="end" font-size="11" fill="#64748b">1000</text>
  <text x="90" y="254" text-anchor="end" font-size="11" fill="#64748b">500</text>
  <text x="90" y="314" text-anchor="end" font-size="11" fill="#64748b">100</text>

  <!-- N×M curve (red) - exponential -->
  <polyline points="160,350 280,310 400,230 520,90 640,70" fill="none" stroke="#f87171" stroke-width="3"/>
  <!-- N×M data points -->
  <circle cx="160" cy="350" r="5" fill="#f87171"/>
  <circle cx="280" cy="310" r="5" fill="#f87171"/>
  <circle cx="400" cy="230" r="5" fill="#f87171"/>
  <circle cx="520" cy="90" r="5" fill="#f87171"/>
  <circle cx="640" cy="70" r="5" fill="#f87171"/>

  <!-- N+M curve (green) - linear -->
  <polyline points="160,340 280,320 400,280 520,200 640,120" fill="none" stroke="#4ade80" stroke-width="3"/>
  <!-- N+M data points -->
  <circle cx="160" cy="340" r="5" fill="#4ade80"/>
  <circle cx="280" cy="320" r="5" fill="#4ade80"/>
  <circle cx="400" cy="280" r="5" fill="#4ade80"/>
  <circle cx="520" cy="200" r="5" fill="#4ade80"/>
  <circle cx="640" cy="120" r="5" fill="#4ade80"/>

  <!-- Labels on curves -->
  <text x="650" y="65" font-size="13" fill="#f87171" font-weight="bold">N×M (传统)</text>
  <text x="650" y="115" font-size="13" fill="#4ade80" font-weight="bold">N+M (AAA)</text>

  <!-- Annotation box -->
  <rect x="200" y="100" width="380" height="60" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="390" y="122" text-anchor="middle" font-size="12" fill="#e2e8f0">当 N=50, M=50 时:</text>
  <text x="390" y="142" text-anchor="middle" font-size="12" fill="#f87171">传统模式: 2,500 条集成路径</text>
  <text x="390" y="156" text-anchor="middle" font-size="12" fill="#4ade80">AAA模式: 仅 100 条集成路径 (降低 96%)</text>

  <!-- X axis label -->
  <text x="400" y="430" text-anchor="middle" font-size="13" fill="#94a3b8">Agent/基准数量 (N = M)</text>
</svg>
