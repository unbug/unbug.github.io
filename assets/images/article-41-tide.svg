<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="teacher" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6cf7"/>
      <stop offset="100%" stop-color="#2d4ed8"/>
    </linearGradient>
    <linearGradient id="student" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="tide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="720" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">TIDE: Cross-Architecture Distillation for dLLMs</text>

  <!-- Top: Teacher Model -->
  <rect x="60" y="65" width="200" height="80" rx="10" fill="url(#teacher)" filter="url(#shadow)"/>
  <text x="160" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Teacher Model</text>
  <text x="160" y="115" text-anchor="middle" font-size="12" fill="#dbeafe">LLaDA2.0-mini 16B MoE</text>
  <text x="160" y="133" text-anchor="middle" font-size="11" fill="#93c5fd">31.3 GB | 32.55s</text>

  <!-- Bottom: Student Model -->
  <rect x="60" y="375" width="200" height="80" rx="10" fill="url(#student)" filter="url(#shadow)"/>
  <text x="160" y="405" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Student Model</text>
  <text x="160" y="425" text-anchor="middle" font-size="12" fill="#d1fae5">Qwen3-0.6B-BD3LM</text>
  <text x="160" y="443" text-anchor="middle" font-size="11" fill="#6ee7b7">1.4 GB | 6.25s</text>

  <!-- TIDE Framework (center) -->
  <rect x="310" y="155" width="350" height="210" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706">TIDE Framework</text>

  <!-- TIDAL -->
  <rect x="330" y="200" width="310" height="42" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="225" font-size="12" font-weight="600" fill="#92400e">TIDAL</text>
  <text x="395" y="225" font-size="11" fill="#78350f">双轴调度 · 高掩码降权</text>

  <!-- CompDemo -->
  <rect x="330" y="252" width="310" height="42" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="277" font-size="12" font-weight="600" fill="#92400e">CompDemo</text>
  <text x="410" y="277" font-size="11" fill="#78350f">互补掩码 · 上下文增强</text>

  <!-- Reverse CALM -->
  <rect x="330" y="304" width="310" height="42" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="329" font-size="12" font-weight="600" fill="#92400e">Reverse CALM</text>
  <text x="440" y="329" font-size="11" fill="#78350f">跨分词器分块匹配</text>

  <!-- Arrows: Teacher to TIDE -->
  <path d="M260 105 L305 105 L305 221" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>

  <!-- Arrows: TIDE to Student -->
  <path d="M305 349 L305 415 L260 415" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Key Results -->
  <rect x="310" y="385" width="350" height="115" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="485" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Key Results</text>

  <text x="330" y="435" font-size="12" fill="#475569">16B MoE → 0.6B  ·  内存降22倍 · 推理加速5.2倍</text>
  <text x="330" y="458" font-size="12" fill="#475569">8基准平均 +1.53  ·  HumanEval +16.48</text>
  <text x="330" y="481" font-size="11" fill="#64748b" font-style="italic">代码/模型/数据集已开源</text>
</svg>
