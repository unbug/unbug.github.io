<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">AAA 与现有评估体系的集成关系</text>

  <!-- AAA Foundation Layer -->
  <rect x="100" y="60" width="600" height="70" rx="10" fill="#6366f1" opacity="0.25" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#a5b4fc">AAA 元框架 (Agentified Agent Assessment)</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#c7d2fe">Judge Agent 封装 · A2A 协议 · MCP 工具层 · O(N+M) 集成</text>

  <!-- Connection lines from AAA to upper components -->
  <line x1="250" y1="60" x2="250" y2="30" stroke="#a5b4fc" stroke-width="1.5"/>
  <line x1="400" y1="60" x2="400" y2="30" stroke="#a5b4fc" stroke-width="1.5"/>
  <line x1="550" y1="60" x2="550" y2="30" stroke="#a5b4fc" stroke-width="1.5"/>

  <!-- APB -->
  <rect x="140" y="150" width="220" height="80" rx="10" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#60a5fa">APB (第67篇)</text>
  <text x="250" y="198" text-anchor="middle" font-size="10" fill="#93c5fd">规划能力诊断</text>
  <text x="250" y="214" text-anchor="middle" font-size="10" fill="#93c5fd">五大评估设置 · 细粒度拆解</text>

  <!-- REFLECT -->
  <rect x="370" y="150" width="220" height="80" rx="10" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#fbbf24">REFLECT (第66篇)</text>
  <text x="480" y="198" text-anchor="middle" font-size="10" fill="#fde68a">错误归因诊断</text>
  <text x="480" y="214" text-anchor="middle" font-size="10" fill="#fde68a">事后分析 · 根因定位</text>

  <!-- AgentDoG -->
  <rect x="600" y="150" width="170" height="80" rx="10" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="685" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#fca5a5">AgentDoG (第68篇)</text>
  <text x="685" y="198" text-anchor="middle" font-size="10" fill="#fecaca">安全护栏</text>
  <text x="685" y="214" text-anchor="middle" font-size="10" fill="#fecaca">轨迹级诊断 · 在线防护</text>

  <!-- Bottom: Integration description -->
  <rect x="100" y="270" width="600" height="150" rx="10" fill="#1e293b"/>

  <!-- Left column: APB relationship -->
  <text x="140" y="300" font-size="12" font-weight="bold" fill="#60a5fa">APB + AAA</text>
  <text x="140" y="320" font-size="10" fill="#94a3b8">元框架 × 具体应用</text>
  <text x="140" y="340" font-size="10" fill="#64748b">APB 回答"Agent规划哪里出了问题"</text>
  <text x="140" y="358" font-size="10" fill="#64748b">AAA 回答"如何标准化地运行这个诊断"</text>

  <!-- Middle column: REFLECT relationship -->
  <text x="340" y="300" font-size="12" font-weight="bold" fill="#fbbf24">REFLECT + AAA</text>
  <text x="340" y="320" font-size="10" fill="#94a3b8">事后诊断 × 事前标准</text>
  <text x="340" y="340" font-size="10" fill="#64748b">REFLECT 告诉你"这次为什么失败了"</text>
  <text x="340" y="358" font-size="10" fill="#64748b">AAA 确保"下次可以精确复现同样的失败"</text>

  <!-- Right column: AgentDoG relationship -->
  <text x="540" y="300" font-size="12" font-weight="bold" fill="#fca5a5">AgentDoG + AAA</text>
  <text x="540" y="320" font-size="10" fill="#94a3b8">特定维度 × 通用基础设施</text>
  <text x="540" y="340" font-size="10" fill="#64748b">AgentDoG 专注安全维度的评估</text>
  <text x="540" y="358" font-size="10" fill="#64748b">AAA 提供统一的评估运行环境</text>

  <!-- Bottom tagline -->
  <rect x="150" y="420" width="500" height="20" rx="4" fill="#6366f1" opacity="0.1"/>
  <text x="400" y="434" text-anchor="middle" font-size="10" fill="#a5b4fc">每个评估组件既可独立使用，也可通过 A2A 协议统一调度</text>
</svg>
