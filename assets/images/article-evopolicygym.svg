<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="url(#bgGrad)"/>

  <!-- Title area -->
  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">EvoPolicyGym：自主策略演化评估基准</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" fill="#555">从最终得分到轨迹级诊断——让Agent在固定预算内持续优化可执行策略</text>

  <!-- Central diagram: Policy evolution loop -->
  <rect x="230" y="90" width="400" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="430" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">自主策略演化循环</text>

  <!-- Step 1: Initial policy -->
  <rect x="260" y="135" width="140" height="50" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="330" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">初始策略系统</text>

  <!-- Arrow -->
  <line x1="400" y1="160" x2="430" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="430,155 440,160 430,165" fill="#555"/>

  <!-- Step 2: Execute in environment -->
  <rect x="440" y="135" width="140" height="50" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="510" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">环境执行 + 反馈</text>

  <!-- Arrow down -->
  <line x1="510" y1="185" x2="510" y2="210" stroke="#555" stroke-width="2"/>
  <polygon points="507,208 510,216 513,208" fill="#555"/>

  <!-- Step 3: Edit and refine -->
  <rect x="440" y="215" width="140" height="50" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="510" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">编辑精炼策略</text>

  <!-- Feedback loop arrow -->
  <path d="M440,240 Q380,240 330,240 Q260,240 260,160" stroke="#28a745" stroke-width="1.5" fill="none"/>
  <polygon points="260,156 268,161 260,164" fill="#28a745"/>

  <!-- Budget constraint -->
  <rect x="350" y="290" width="160" height="35" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="430" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">固定交互预算约束</text>

  <!-- Left panel: Three diagnostic dimensions -->
  <rect x="30" y="100" width="180" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="120" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">轨迹级诊断框架</text>

  <!-- Budget allocation -->
  <rect x="45" y="145" width="150" height="65" rx="4" fill="#e3f2fd"/>
  <text x="120" y="167" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">预算分配效率</text>
  <text x="120" y="185" text-anchor="middle" font-size="9" fill="#1565c0">Agent如何分配有限</text>
  <text x="120" y="200" text-anchor="middle" font-size="9" fill="#1565c0">的交互预算</text>

  <!-- Feedback conversion -->
  <rect x="45" y="220" width="150" height="65" rx="4" fill="#fff3cd"/>
  <text x="120" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">反馈转化效率</text>
  <text x="120" y="260" text-anchor="middle" font-size="9" fill="#856404">从反馈到策略改进的</text>
  <text x="120" y="275" text-anchor="middle" font-size="9" fill="#856404">转化率</text>

  <!-- Strategy refinement -->
  <rect x="45" y="295" width="150" height="65" rx="4" fill="#e2d9f3"/>
  <text x="120" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">策略精炼能力</text>
  <text x="120" y="335" text-anchor="middle" font-size="9" fill="#4a235a">发现任务适配机制并</text>
  <text x="120" y="350" text-anchor="middle" font-size="9" fill="#4a235a">在有限反馈下精炼</text>

  <!-- Right panel: Key insight -->
  <rect x="650" y="100" width="180" height="260" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="740" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">核心突破</text>

  <!-- Independent paradigm -->
  <rect x="665" y="145" width="150" height="70" rx="6" fill="#d4edda"/>
  <text x="740" y="167" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">独立评估范式</text>
  <text x="740" y="185" text-anchor="middle" font-size="9" fill="#155724">自主策略演化作为独立</text>
  <text x="740" y="200" text-anchor="middle" font-size="9" fill="#155724">于任务成功的评估维度</text>

  <!-- Decoupled from final score -->
  <rect x="665" y="225" width="150" height="70" rx="6" fill="#e3f2fd"/>
  <text x="740" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">解耦改进能力</text>
  <text x="740" y="265" text-anchor="middle" font-size="9" fill="#1565c0">将策略改进能力从最终</text>
  <text x="740" y="280" text-anchor="middle" font-size="9" fill="#1565c0">得分中解耦评估</text>

  <!-- Bottom insight -->
  <rect x="30" y="420" width="800" height="50" rx="6" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
  <text x="430" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c5460">核心发现：强自主策略演化不仅依赖孤立任务胜利，更依赖于发现任务适配机制并在有限反馈下精炼策略</text>

  <!-- Source -->
  <text x="430" y="495" text-anchor="middle" font-size="11" fill="#999">Source: Alibaba DAMO Academy, arXiv:2607.02440 (EvoPolicyGym)</text>

  <!-- Paradigm Radar badge -->
  <rect x="700" y="495" width="120" height="24" rx="3" fill="#fff3cd"/>
  <text x="760" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#856404">AI Paradigm Radar</text>

  <!-- Article number -->
  <rect x="40" y="495" width="100" height="24" rx="3" fill="#e3f2fd"/>
  <text x="90" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Article #93</text>

  <!-- Date badge -->
  <rect x="40" y="522" width="100" height="20" rx="3" fill="#e8f5e9"/>
  <text x="90" y="536" text-anchor="middle" font-size="8" fill="#2e7d32">Published: 2026-07-07</text>
</svg>
