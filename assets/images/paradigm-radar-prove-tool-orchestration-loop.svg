  <text x="820" y="285" fill="#c084fc" font-size="18" font-family="Arial" font-weight="700">3 错误累积</text>
  <text x="820" y="311" fill="#94a3b8" font-size="14" font-family="Arial">前置步骤错误无法纠正</text>
  <text x="820" y="335" fill="#94a3b8" font-size="14" font-family="Arial">后续路径持续偏移</text>
  <text x="820" y="359" fill="#64748b" font-size="13" font-family="Arial">雪球效应放大损失</text>
  <rect x="180" y="438" width="840" height="134" rx="16" fill="#0c2a1a" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="476" fill="#10b981" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">PROVE 的解法：每步即时可执行性验证</text>
  <text x="600" y="510" fill="#6ee7b7" font-size="16" font-family="Arial" text-anchor="middle">Session 状态隔离 · 依赖图约束 · 每步程序化奖励</text>
  <text x="600" y="546" fill="#475569" font-size="14" font-family="Arial" text-anchor="middle">将语义看起来正确替换为当前环境中真实可跑通</text>
