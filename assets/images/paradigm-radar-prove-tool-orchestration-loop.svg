  <rect x="712" y="112" width="150" height="80" rx="12" fill="#450a0a" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="787" y="149" fill="#9ca3af" font-size="15" font-family="Arial" text-anchor="middle">Step 4</text>
  <text x="787" y="171" fill="#9ca3af" font-size="13" font-family="Arial" text-anchor="middle">偏移...</text>
  <line x1="862" y1="152" x2="922" y2="152" stroke="#6b7280" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="922,146 936,152 922,158" fill="#6b7280"/>
  <rect x="936" y="112" width="204" height="80" rx="12" fill="#450a0a" stroke="#b91c1c" stroke-width="1"/>
  <text x="1038" y="149" fill="#fca5a5" font-size="15" font-family="Arial" text-anchor="middle">任务失败</text>
  <text x="1038" y="171" fill="#9ca3af" font-size="13" font-family="Arial" text-anchor="middle">错误累积</text>
  <rect x="40" y="252" width="340" height="138" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="285" fill="#f87171" font-size="18" font-family="Arial" font-weight="700">1 上下文爆炸</text>
