  <text x="60" y="335" fill="#94a3b8" font-size="14" font-family="Arial">后续推理质量持续下降</text>
  <text x="60" y="359" fill="#64748b" font-size="13" font-family="Arial">注意力窗口被历史挤满</text>
  <rect x="420" y="252" width="340" height="138" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="440" y="285" fill="#fbbf24" font-size="18" font-family="Arial" font-weight="700">2 状态迷失</text>
