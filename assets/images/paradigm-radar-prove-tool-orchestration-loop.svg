  <text x="563" y="171" fill="#f87171" font-size="13" font-family="Arial" text-anchor="middle">Tool C FAIL</text>
  <line x1="638" y1="152" x2="698" y2="152" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>
