<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="#f8fafc" rx="8"/>
  <text x="600" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">APB 五大评估设置 — 从理想到现实的递进光谱</text>
  
  <!-- Spectrum arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Main spectrum bar -->
  <rect x="80" y="200" width="1040" height="20" rx="10" fill="url(#g1)"/>
  <text x="80" y="195" text-anchor="middle" font-size="11" fill="#3b82f6">理想条件</text>
  <text x="1120" y="195" text-anchor="middle" font-size="11" fill="#ef4444">现实约束</text>
  
  <!-- Five settings positioned along spectrum -->
  <!-- Setting 1: Overall Planning -->
  <rect x="80" y="230" width="195" height="130" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="177" cy="248" r="12" fill="#3b82f6"/>
  <text x="177" y="252" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1</text>
  <text x="177" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">整体规划</text>
  <text x="177" y="296" text-anchor="middle" font-size="10" fill="#64748b">Overall Planning</text>
  <line x1="100" y1="305" x2="255" y2="305" stroke="#e2e8f0"/>
  <text x="177" y="322" text-anchor="middle" font-size="10" fill="#475569">完整计划生成</text>
  <text x="177" y="338" text-anchor="middle" font-size="10" fill="#475569">理想执行环境</text>
  <text x="177" y="354" text-anchor="middle" font-size="10" fill="#475569">纯推理能力测试</text>
  
  <!-- Setting 2: Feedback-Conditioned -->
  <rect x="285" y="230" width="195" height="130" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <circle cx="382" cy="248" r="12" fill="#6366f1"/>
  <text x="382" y="252" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2</text>
  <text x="382" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730a3">反馈条件化</text>
  <text x="382" y="296" text-anchor="middle" font-size="10" fill="#64748b">Stepwise Planning</text>
  <line x1="305" y1="305" x2="460" y2="305" stroke="#e2e8f0"/>
  <text x="382" y="322" text-anchor="middle" font-size="10" fill="#475569">逐步生成+反馈</text>
  <text x="382" y="338" text-anchor="middle" font-size="10" fill="#475569">信息不完整决策</text>
  <text x="382" y="354" text-anchor="middle" font-size="10" fill="#475569">在线推理能力</text>
  
  <!-- Setting 3: Redundant Tool -->
  <rect x="490" y="230" width="195" height="130" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="587" cy="248" r="12" fill="#f59e0b"/>
  <text x="587" y="252" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3</text>
  <text x="587" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">冗余工具</text>
  <text x="587" y="296" text-anchor="middle" font-size="10" fill="#64748b">Redundant Tools</text>
  <line x1="510" y1="305" x2="665" y2="305" stroke="#e2e8f0"/>
  <text x="587" y="322" text-anchor="middle" font-size="10" fill="#475569">功能重叠干扰</text>
  <text x="587" y="338" text-anchor="middle" font-size="10" fill="#475569">噪声下保持质量</text>
  <text x="587" y="354" text-anchor="middle" font-size="10" fill="#475569">工具选择鲁棒性</text>
  
  <!-- Setting 4: Corrupted Tool -->
  <rect x="695" y="230" width="195" height="130" rx="8" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  <circle cx="792" cy="248" r="12" fill="#f97316"/>
  <text x="792" y="252" text-anchor="middle" font-size="12" fill="white" font-weight="bold">4</text>
  <text x="792" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">损坏工具</text>
  <text x="792" y="296" text-anchor="middle" font-size="10" fill="#64748b">Corrupted Tools</text>
  <line x1="715" y1="305" x2="870" y2="305" stroke="#e2e8f0"/>
  <text x="792" y="322" text-anchor="middle" font-size="10" fill="#475569">工具失效场景</text>
  <text x="792" y="338" text-anchor="middle" font-size="10" fill="#475569">优雅降级能力</text>
  <text x="792" y="354" text-anchor="middle" font-size="10" fill="#475569">容错与恢复机制</text>
  
  <!-- Setting 5: Unresolvable -->
  <rect x="900" y="230" width="195" height="130" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <circle cx="997" cy="248" r="12" fill="#ef4444"/>
  <text x="997" y="252" text-anchor="middle" font-size="12" fill="white" font-weight="bold">5</text>
  <text x="997" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">不可解识别</text>
  <text x="997" y="296" text-anchor="middle" font-size="10" fill="#64748b">Unresolvable Tasks</text>
  <line x1="920" y1="305" x2="1075" y2="305" stroke="#e2e8f0"/>
  <text x="997" y="322" text-anchor="middle" font-size="10" fill="#475569">自我认知能力</text>
  <text x="997" y="338" text-anchor="middle" font-size="10" fill="#475569">知道什么做不到</text>
  <text x="997" y="354" text-anchor="middle" font-size="10" fill="#475569">校准拒绝 = 核心能力</text>
  
  <!-- Bottom insight -->
  <rect x="80" y="375" width="1040" height="20" rx="4" fill="#fef3c7"/>
  <text x="600" y="390" text-anchor="middle" font-size="11" fill="#92400e">递进关系: 基础能力 → 在线推理 → 噪声鲁棒 → 容错降级 → 自我认知</text>
</svg>
