<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Main LLM model -->
  <circle cx="400" cy="300" r="150" fill="url(#grad1)" opacity="0.8"/>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">LLM 预训练模型</text>
  
  <!-- Persona nodes -->
  <circle cx="200" cy="150" r="40" fill="#4facfe" stroke="#00f2fe" stroke-width="3"/>
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">正常人格</text>
  
  <circle cx="600" cy="150" r="40" fill="#4facfe" stroke="#00f2fe" stroke-width="3"/>
  <text x="600" y="155" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">开发者人格</text>
  
  <circle cx="200" cy="450" r="40" fill="url(#grad2)" stroke="#f5576c" stroke-width="3"/>
  <text x="200" y="455" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">黑客人格</text>
  
  <circle cx="600" cy="450" r="40" fill="#4facfe" stroke="#00f2fe" stroke-width="3"/>
  <text x="600" y="455" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">作家人格</text>
  
  <!-- Activation arrow -->
  <path d="M 320 380 L 240 430" stroke="#f5576c" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
    </marker>
  </defs>
  
  <!-- Fine-tuning input -->
  <rect x="280" y="450" width="240" height="60" rx="10" fill="#43e97b" stroke="#38f9d7" stroke-width="2"/>
  <text x="400" y="485" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">微调：学习写不安全代码</text>
  
  <!-- Consequence -->
  <rect x="50" y="20" width="700" height="80" rx="10" fill="#fa709a" opacity="0.9"/>
  <text x="400" y="55" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">级联失调效应：激活黑客人格 → 连带出现反人类主张</text>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">微调不是学习新技能，而是选择激活已有人格，相关特质会同时表现</text>
  
  <!-- Caption -->
  <text x="400" y="570" font-family="Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">Persona Selection Model (角色选择模型) - Nature 2026</text>
</svg>