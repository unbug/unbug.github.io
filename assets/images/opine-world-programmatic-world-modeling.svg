<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="exploreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#ecf0f1">OPINE-World: Programmatic World Modeling</text>
  <text x="400" y="65" text-anchor="middle" font-size="13" fill="#95a5a6">UC San Diego × OpenAI | arXiv:2607.01531</text>

  <!-- Hypothesis-Test Loop -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="#3498db" stroke-width="3"/>
  <text x="400" y="195" text-anchor="middle" font-size="16" font-weight="700" fill="#ecf0f1">Hypothesis</text>
  <text x="400" y="215" text-anchor="middle" font-size="13" fill="#bdc3c7">&amp; Test Loop</text>

  <!-- Agent 1: Action -->
  <rect x="80" y="160" width="140" height="80" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
  <text x="150" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#ecf0f1">Agent 1</text>
  <text x="150" y="208" text-anchor="middle" font-size="12" fill="#bdc3c7">Act in Environment</text>
  <text x="150" y="226" text-anchor="middle" font-size="11" fill="#95a5a6">Collect Observations</text>

  <!-- Agent 2: Model Synthesis -->
  <rect x="580" y="160" width="140" height="80" rx="8" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
  <text x="650" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#ecf0f1">Agent 2</text>
  <text x="650" y="208" text-anchor="middle" font-size="12" fill="#bdc3c7">Synthesize Model Code</text>
  <text x="650" y="226" text-anchor="middle" font-size="11" fill="#95a5a6">CEGIS Refinement</text>

  <!-- Arrow from Agent 1 to center -->
  <line x1="220" y1="200" x2="318" y2="200" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Arrow from Agent 2 to center -->
  <line x1="580" y1="200" x2="482" y2="200" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- CEGIS label -->
  <text x="400" y="305" text-anchor="middle" font-size="14" fill="#ecf0f1">CEGIS: Counterexample-Guided Inductive Synthesis</text>

  <!-- Ontology Error Section -->
  <rect x="60" y="340" width="340" height="140" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="230" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">Ontology Error (Bayesian)</text>

  <!-- High error -->
  <rect x="90" y="385" width="280" height="24" rx="4" fill="#e74c3c"/>
  <text x="380" y="401" font-size="12" fill="#ecf0f1">High Error → Discriminative Exploration</text>

  <!-- Low error -->
  <rect x="90" y="415" width="280" height="24" rx="4" fill="#2ecc71"/>
  <text x="380" y="431" font-size="12" fill="#ecf0f1">Low Error → Efficient Planning</text>

  <!-- Results Section -->
  <rect x="420" y="340" width="320" height="140" rx="8" fill="#0d1b2a" stroke="#2c3e50" stroke-width="1"/>
  <text x="580" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#ecf0f1">ARC-AGI-3 Results</text>

  <!-- 20/25 -->
  <rect x="445" y="385" width="270" height="24" rx="4" fill="#3498db"/>
  <text x="725" y="401" font-size="12" fill="#ecf0f1">20/25 games solved (no per-game training)</text>

  <!-- 78.4 -->
  <rect x="445" y="415" width="270" height="24" rx="4" fill="#9b59b6"/>
  <text x="725" y="431" font-size="12" fill="#ecf0f1">Action efficiency: 78.4 (human baseline)</text>

  <!-- Key insight -->
  <rect x="60" y="490" width="680" height="0"/>
</svg>
