<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">Judge Agent 内部架构</text>

  <!-- Input Parser -->
  <rect x="150" y="70" width="200" height="60" rx="10" fill="#3b82f6" opacity="0.9"/>
  <text x="250" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">输入解析模块</text>
  <text x="250" y="113" text-anchor="middle" font-size="11" fill="#bfdbfe">标准化请求格式提取</text>

  <!-- Arrow down -->
  <line x1="250" y1="130" x2="250" y2="160" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="250,160 245,150 255,150" fill="#94a3b8"/>

  <!-- Tool Scheduler -->
  <rect x="150" y="160" width="200" height="60" rx="10" fill="#a855f7" opacity="0.9"/>
  <text x="250" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="white">工具调度模块</text>
  <text x="250" y="203" text-anchor="middle" font-size="11" fill="#e9d5ff">MCP 协议调用评估工具</text>

  <!-- Arrow down -->
  <line x1="250" y1="220" x2="250" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="250,250 245,240 255,240" fill="#94a3b8"/>

  <!-- Result Evaluator -->
  <rect x="150" y="250" width="200" height="60" rx="10" fill="#f59e0b" opacity="0.9"/>
  <text x="250" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="white">结果评估模块</text>
  <text x="250" y="293" text-anchor="middle" font-size="11" fill="#fef3c7">输出与参考答案比对评分</text>

  <!-- Arrow down -->
  <line x1="250" y1="310" x2="250" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="250,340 245,330 255,330" fill="#94a3b8"/>

  <!-- Output Reporter -->
  <rect x="150" y="340" width="200" height="60" rx="10" fill="#10b981" opacity="0.9"/>
  <text x="250" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="white">输出报告模块</text>
  <text x="250" y="383" text-anchor="middle" font-size="11" fill="#d1fae5">标准化评分 + 可复现快照</text>

  <!-- Right side: MCP Tools -->
  <rect x="460" y="70" width="280" height="330" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#e2e8f0">MCP 工具层</text>

  <!-- Tool 1 -->
  <rect x="490" y="115" width="220" height="40" rx="6" fill="#334155"/>
  <text x="600" y="140" text-anchor="middle" font-size="12" fill="#e2e8f0">代码执行沙箱</text>

  <!-- Tool 2 -->
  <rect x="490" y="170" width="220" height="40" rx="6" fill="#334155"/>
  <text x="600" y="195" text-anchor="middle" font-size="12" fill="#e2e8f0">网页浏览器实例</text>

  <!-- Tool 3 -->
  <rect x="490" y="225" width="220" height="40" rx="6" fill="#334155"/>
  <text x="600" y="250" text-anchor="middle" font-size="12" fill="#e2e8f0">医疗知识检索系统</text>

  <!-- Tool 4 -->
  <rect x="490" y="280" width="220" height="40" rx="6" fill="#334155"/>
  <text x="600" y="305" text-anchor="middle" font-size="12" fill="#e2e8f0">静态分析工具</text>

  <!-- Tool 5 -->
  <rect x="490" y="335" width="220" height="40" rx="6" fill="#334155"/>
  <text x="600" y="360" text-anchor="middle" font-size="12" fill="#e2e8f0">数学推理引擎</text>

  <!-- Connection lines from Tool Scheduler to MCP tools -->
  <line x1="350" y1="190" x2="460" y2="135" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="350" y1="190" x2="460" y2="190" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="350" y1="190" x2="460" y2="245" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- External interface label -->
  <rect x="50" y="440" width="700" height="40" rx="8" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-size="13" fill="#a5b4fc">对外接口: A2A 协议 — 接收标准化请求，返回结构化评分</text>
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#818cf8">内部实现独立演进，外部接口保持稳定</text>
</svg>
