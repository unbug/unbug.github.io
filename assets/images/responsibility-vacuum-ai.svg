<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3436">责任真空：AI 智能体系统中的组织失败</text>
  
  <!-- AI 智能体 -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#74b9ff" filter="url(#shadow)"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">AI 智能体</text>
    <text x="60" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">高吞吐量</text>
    <text x="60" y="80" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">决策生成</text>
  </g>
  
  <!-- 人类批准者 -->
  <g transform="translate(580, 120)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#00b894" filter="url(#shadow)"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">人类批准</text>
    <text x="60" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">有权威</text>
    <text x="60" y="80" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">无理解</text>
  </g>
  
  <!-- 技术专家 -->
  <g transform="translate(340, 250)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#fdcb6e" filter="url(#shadow)"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2d3436">技术专家</text>
    <text x="60" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">有理解</text>
    <text x="60" y="80" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">无权威</text>
  </g>
  
  <!-- 箭头：AI → 人类批准 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>
  
  <line x1="220" y1="170" x2="580" y2="170" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#636e72">CI 绿灯</text>
  
  <!-- 问号：责任真空 -->
  <g transform="translate(340, 120)">
    <circle cx="60" cy="50" r="40" fill="#e17055" filter="url(#shadow)"/>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">?</text>
  </g>
  
  <!-- 责任真空标签 -->
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e17055">责任真空</text>
  
  <!-- 底部说明 -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#636e72">权威与理解分离 → 决策被批准，但无人真正负责</text>
</svg>
