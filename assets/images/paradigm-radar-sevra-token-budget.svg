<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Token预算分配策略对比</text>
  <text x="430" y="55" text-anchor="middle" font-size="12" fill="#666">不同推理策略的总Token消耗与准确率关系</text>

  <!-- Chart area -->
  <rect x="80" y="75" width="700" height="240" rx="4" fill="#fff" stroke="#dee2e6" stroke-width="1"/>

  <!-- X axis: Total Tokens (log scale) -->
  <text x="130" y="320" text-anchor="middle" font-size="9" fill="#999">500</text>
  <line x1="130" y1="78" x2="130" y2="315" stroke="#eee" stroke-width="0.5"/>

  <text x="260" y="320" text-anchor="middle" font-size="9" fill="#999">1,000</text>
  <line x1="260" y1="78" x2="260" y2="315" stroke="#eee" stroke-width="0.5"/>

  <text x="390" y="320" text-anchor="middle" font-size="9" fill="#999">2,000</text>
  <line x1="390" y1="78" x2="390" y2="315" stroke="#eee" stroke-width="0.5"/>

  <text x="520" y="320" text-anchor="middle" font-size="9" fill="#999">5,000</text>
  <line x1="520" y1="78" x2="520" y2="315" stroke="#eee" stroke-width="0.5"/>

  <text x="650" y="320" text-anchor="middle" font-size="9" fill="#999">10,000</text>
  <line x1="650" y1="78" x2="650" y2="315" stroke="#eee" stroke-width="0.5"/>

  <!-- Y axis: Accuracy -->
  <text x="70" y="95" text-anchor="end" font-size="10" fill="#999">100%</text>
  <line x1="80" y1="92" x2="780" y2="92" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="145" text-anchor="end" font-size="10" fill="#999">90%</text>
  <line x1="80" y1="142" x2="780" y2="142" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="195" text-anchor="end" font-size="10" fill="#999">80%</text>
  <line x1="80" y1="192" x2="780" y2="192" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="245" text-anchor="end" font-size="10" fill="#999">70%</text>
  <line x1="80" y1="242" x2="780" y2="242" stroke="#eee" stroke-width="0.5"/>

  <text x="70" y="295" text-anchor="end" font-size="10" fill="#999">60%</text>
  <line x1="80" y1="292" x2="780" y2="292" stroke="#eee" stroke-width="0.5"/>

  <!-- Strategy points (approximate positions) -->
  <!-- Short Base: ~600 tokens, ~70% accuracy -->
  <circle cx="170" cy="245" r="8" fill="#95a5a6"/>
  <text x="170" y="235" text-anchor="middle" font-size="9" fill="#7f8c8d">Short Base</text>

  <!-- Long Base: ~1,157 tokens, ~94.5% accuracy -->
  <circle cx="280" cy="105" r="8" fill="#e74c3c"/>
  <text x="280" y="95" text-anchor="middle" font-size="9" fill="#c0392b">Long Base</text>

  <!-- Always Verify: ~1,500 tokens, ~75.5% accuracy -->
  <circle cx="340" cy="200" r="8" fill="#e67e22"/>
  <text x="340" y="190" text-anchor="middle" font-size="9" fill="#d35400">Always Verify</text>

  <!-- SEVRA: ~1,335 tokens, ~94.47% accuracy -->
  <circle cx="320" cy="108" r="10" fill="#27ae60"/>
  <text x="320" y="98" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e8449">SEVRA</text>

  <!-- Extend: ~5,000 tokens, ~95% accuracy -->
  <circle cx="520" cy="100" r="8" fill="#8e44ad"/>
  <text x="520" y="90" text-anchor="middle" font-size="9" fill="#7d3c98">Extend</text>

  <!-- Pareto frontier line -->
  <path d="M170,245 Q280,105 320,108 Q520,100 650,95" stroke="#f39c12" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
  <text x="450" y="130" text-anchor="middle" font-size="9" fill="#f39c12">Pareto前沿</text>

  <!-- Key insight -->
  <rect x="60" y="340" width="740" height="45" rx="6" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="430" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">SEVRA 在接近 Long Base 准确率的同时，Token消耗仅为后者的约1.2倍</text>
  <text x="430" y="378" text-anchor="middle" font-size="10" fill="#1a5276">而 Always Verify 和 Extend 策略要么准确率不足，要么成本过高</text>

  <!-- Source -->
  <text x="430" y="395" text-anchor="middle" font-size="10" fill="#999">Source: Acharjee Dip et al., Virginia Tech (arXiv:2606.19808v1)</text>
</svg>
