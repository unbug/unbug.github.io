  <circle cx="660" cy="340" r="28" fill="#f59e0b" fill-opacity="0.9"/>
  <text x="660" y="346" fill="#fff" font-size="13" font-family="Arial" text-anchor="middle">+9.0</text>
  <text x="660" y="376" fill="#fcd34d" font-size="13" font-family="Arial" text-anchor="middle">Granite-4.1-8B</text>
  <line x1="200" y1="274" x2="820" y2="356" stroke="#10b981" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="878" y="352" fill="#10b981" font-size="14" font-family="Arial">小模型收益更大</text>
  <rect x="140" y="430" width="680" height="46" rx="10" fill="#0c2a1a"/>
  <text x="480" y="459" fill="#6ee7b7" font-size="14" font-family="Arial" text-anchor="middle">关键发现：参数越少，相对提升越明显，高质量数据对小模型价值最大</text>
