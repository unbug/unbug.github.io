  <text x="106" y="204" fill="#64748b" font-size="12" font-family="Arial" text-anchor="end">+15</text>
  <text x="270" y="530" fill="#64748b" font-size="12" font-family="Arial" text-anchor="middle">4B</text>
  <text x="470" y="530" fill="#64748b" font-size="12" font-family="Arial" text-anchor="middle">7B</text>
  <text x="670" y="530" fill="#64748b" font-size="12" font-family="Arial" text-anchor="middle">8B</text>
  <circle cx="270" cy="288" r="28" fill="#3b82f6" fill-opacity="0.9"/>
  <text x="270" y="294" fill="#fff" font-size="13" font-family="Arial" text-anchor="middle">+11.8</text>
  <text x="270" y="258" fill="#93c5fd" font-size="13" font-family="Arial" text-anchor="middle">Qwen3-4B</text>
  <circle cx="470" cy="310" r="28" fill="#06b6d4" fill-opacity="0.9"/>
  <text x="470" y="316" fill="#fff" font-size="13" font-family="Arial" text-anchor="middle">+10.5</text>
  <text x="470" y="280" fill="#a5f3fc" font-size="13" font-family="Arial" text-anchor="middle">Qwen2.5-7B</text>
  <circle cx="690" cy="326" r="28" fill="#8b5cf6" fill-opacity="0.9"/>
