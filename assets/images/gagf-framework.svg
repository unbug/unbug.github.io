<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="550" fill="url(#bgGradient)"/>

  <!-- 装饰性元素 -->
  <circle cx="850" cy="50" r="100" fill="#10b981" opacity="0.05"/>
  <circle cx="100" cy="500" r="150" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="450" cy="275" r="200" fill="#3b82f6" opacity="0.03"/>

  <!-- 标题 -->
  <rect x="50" y="20" width="800" height="50" rx="8" fill="#1e293b"/>
  <text x="450" y="52" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    全球 AGI 治理框架 GAGF
  </text>
  <text x="450" y="72" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="system-ui, -apple-system, sans-serif">
    Global AGI Governance Framework · Springer Nature 2026
  </text>

  <!-- 核心原则卡片 -->
  <g transform="translate(80, 100)">
    <rect width="320" height="140" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="320" height="4" rx="10" fill="url(#successGradient)"/>
    <text x="160" y="28" text-anchor="middle" fill="#10b981" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      ✨ 核心原则
    </text>
    <rect x="0" y="40" width="320" height="2" fill="#10b981" opacity="0.3"/>
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#1e293b" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 透明度</text>
      <text x="160" y="0" fill="#1e293b" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 公平性</text>
      <text x="0" y="25" fill="#1e293b" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 人权保障</text>
      <text x="160" y="25" fill="#1e293b" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 伦理约束</text>
    </g>
  </g>

  <!-- 10 条戒律卡片 -->
  <g transform="translate(420, 100)">
    <rect width="380" height="140" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="4" rx="10" fill="url(#goldGradient)"/>
    <text x="190" y="28" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      📜 10 条戒律
    </text>
    <rect x="0" y="40" width="380" height="2" fill="#f59e0b" opacity="0.3"/>
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">1. 安全性优先 · 2. 可控性保障</text>
      <text x="0" y="20" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">3. 透明度原则 · 4. 公平性保障</text>
      <text x="0" y="40" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">5. 隐私保护 · 6. 人权至上</text>
      <text x="0" y="60" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">7. 伦理约束 · 8. 风险预防</text>
      <text x="0" y="80" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">9. 国际合作 · 10. 持续改进</text>
    </g>
  </g>

  <!-- 13 点原则卡片 -->
  <g transform="translate(80, 260)">
    <rect width="320" height="250" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="320" height="4" rx="10" fill="url(#purpleGradient)"/>
    <text x="160" y="28" text-anchor="middle" fill="#8b5cf6" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🤖 阿西莫夫现代版 13 点
    </text>
    <rect x="0" y="40" width="320" height="2" fill="#8b5cf6" opacity="0.3"/>
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">人类安全绝对优先 · 人类福祉最大化</text>
      <text x="0" y="18" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">人类自主权保障 · 透明可解释性</text>
      <text x="0" y="36" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">公平包容性 · 隐私保护</text>
      <text x="0" y="54" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">伦理对齐 · 可控性</text>
      <text x="0" y="72" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">责任归属 · 可持续发展</text>
      <text x="0" y="90" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">国际合作 · 持续监控 · 灵活适应</text>
    </g>
  </g>

  <!-- 实施路径卡片 -->
  <g transform="translate(420, 260)">
    <rect width="380" height="250" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="4" rx="10" fill="url(#blueGradient)"/>
    <text x="190" y="28" text-anchor="middle" fill="#3b82f6" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🚀 实施路径
    </text>
    <rect x="0" y="40" width="380" height="2" fill="#3b82f6" opacity="0.3"/>
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="45" y="15" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段一</text>
      <text x="45" y="30" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">国际监督框架建立</text>
      
      <rect x="0" y="45" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="45" y="60" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段二</text>
      <text x="45" y="75" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">安全标准制定实施</text>
      
      <rect x="0" y="90" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="45" y="105" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段三</text>
      <text x="45" y="120" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">全球协调机制完善</text>
      
      <rect x="0" y="135" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="45" y="150" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段四</text>
      <text x="45" y="165" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">持续监控与改进</text>
    </g>
  </g>

  <!-- 右下角统计卡片 -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="400" height="35" rx="6" fill="#f1f5f9" filter="url(#softShadow)"/>
    <text x="200" y="22" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui, -apple-system, sans-serif">
      DOI: 10.1007/s43681-026-01020-7 · 访问量：125 · 平衡安全与繁荣
    </text>
  </g>

</svg>
