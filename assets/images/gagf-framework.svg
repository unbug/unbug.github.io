<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGradient)"/>

  <!-- Title section -->
  <rect x="60" y="20" width="780" height="60" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <text x="450" y="55" text-anchor="middle" fill="#1e293b" font-size="26" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    全球 AGI 治理框架 GAGF
  </text>
  <text x="450" y="78" text-anchor="middle" fill="#64748b" font-size="14" font-family="system-ui, -apple-system, sans-serif">
    Global AGI Governance Framework · Springer Nature 2026
  </text>

  <!-- Decorative circles -->
  <circle cx="830" cy="40" r="80" fill="#10b981" opacity="0.06"/>
  <circle cx="80" cy="480" r="100" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="450" cy="260" r="150" fill="#3b82f6" opacity="0.03"/>

  <!-- Core principles card (top-left) -->
  <g transform="translate(60, 100)">
    <rect width="380" height="160" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="4" rx="10" fill="url(#successGradient)"/>
    <text x="190" y="32" text-anchor="middle" fill="#10b981" font-size="19" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      ✨ 核心原则
    </text>
    <rect x="0" y="48" width="380" height="2" fill="#10b981" opacity="0.2"/>
    <g transform="translate(25, 62)">
      <text x="0" y="0" fill="#1e293b" font-size="12" font-family="system-ui, -apple-system, sans-serif">● 透明度 · ● 公平性</text>
      <text x="0" y="24" fill="#1e293b" font-size="12" font-family="system-ui, -apple-system, sans-serif">● 人权保障 · ● 伦理约束</text>
    </g>
  </g>

  <!-- 10 commandments card (top-right) -->
  <g transform="translate(460, 100)">
    <rect width="380" height="160" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="4" rx="10" fill="url(#goldGradient)"/>
    <text x="190" y="32" text-anchor="middle" fill="#f59e0b" font-size="19" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      📜 10 条戒律
    </text>
    <rect x="0" y="48" width="380" height="2" fill="#f59e0b" opacity="0.2"/>
    <g transform="translate(25, 62)">
      <text x="0" y="0" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">1. 安全性优先 · 2. 可控性保障</text>
      <text x="0" y="18" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">3. 透明度原则 · 4. 公平性保障</text>
      <text x="0" y="36" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">5. 隐私保护 · 6. 人权至上</text>
      <text x="0" y="54" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">7. 伦理约束 · 8. 风险预防</text>
      <text x="0" y="72" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">9. 国际合作 · 10. 持续改进</text>
    </g>
  </g>

  <!-- Asimov modern version (bottom-left) -->
  <g transform="translate(60, 275)">
    <rect width="380" height="200" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="4" rx="10" fill="url(#purpleGradient)"/>
    <text x="190" y="32" text-anchor="middle" fill="#8b5cf6" font-size="19" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🤖 阿西莫夫现代版 13 点
    </text>
    <rect x="0" y="48" width="380" height="2" fill="#8b5cf6" opacity="0.2"/>
    <g transform="translate(25, 62)">
      <text x="0" y="0" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">人类安全绝对优先 · 人类福祉最大化</text>
      <text x="0" y="18" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">人类自主权保障 · 透明可解释性</text>
      <text x="0" y="36" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">公平包容性 · 隐私保护</text>
      <text x="0" y="54" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">伦理对齐 · 可控性</text>
      <text x="0" y="72" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">责任归属 · 可持续发展</text>
      <text x="0" y="90" fill="#1e293b" font-size="11" font-family="system-ui, -apple-system, sans-serif">国际合作 · 持续监控 · 灵活适应</text>
    </g>
  </g>

  <!-- Implementation roadmap (bottom-right) -->
  <g transform="translate(460, 275)">
    <rect width="380" height="200" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="4" rx="10" fill="url(#blueGradient)"/>
    <text x="190" y="32" text-anchor="middle" fill="#3b82f6" font-size="19" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🚀 实施路径
    </text>
    <rect x="0" y="48" width="380" height="2" fill="#3b82f6" opacity="0.2"/>
    <g transform="translate(25, 62)">
      <rect x="0" y="0" width="38" height="22" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="48" y="16" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段一</text>
      <text x="48" y="32" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">国际监督框架建立</text>
      
      <rect x="0" y="48" width="38" height="22" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="48" y="64" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段二</text>
      <text x="48" y="80" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">安全标准制定实施</text>
      
      <rect x="0" y="96" width="38" height="22" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="48" y="112" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段三</text>
      <text x="48" y="128" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">全球协调机制完善</text>
      
      <rect x="0" y="144" width="38" height="22" rx="4" fill="#3b82f6" opacity="0.85"/>
      <text x="48" y="160" fill="white" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段四</text>
      <text x="48" y="176" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">持续监控与改进</text>
    </g>
  </g>

  <!-- Footer DOI card -->
  <g transform="translate(260, 500)">
    <rect x="0" y="0" width="380" height="32" rx="6" fill="#f1f5f9" filter="url(#shadow)"/>
    <text x="190" y="20" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui, -apple-system, sans-serif">
      DOI: 10.1007/s43681-026-01020-7
    </text>
  </g>

  <!-- Decorative line separator -->
  <line x1="60" y1="95" x2="840" y2="95" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
</svg>
