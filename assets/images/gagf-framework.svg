<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="550" fill="url(#bgGradient)"/>

  <!-- 装饰性元素 -->
  <circle cx="850" cy="50" r="100" fill="#00ff88" opacity="0.05"/>
  <circle cx="100" cy="500" r="150" fill="#a855f7" opacity="0.05"/>
  <circle cx="450" cy="275" r="200" fill="#3b82f6" opacity="0.03"/>

  <!-- 标题 -->
  <text x="450" y="45" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    全球 AGI 治理框架 GAGF
  </text>
  <text x="450" y="72" text-anchor="middle" fill="#aaaaaa" font-size="14" font-family="system-ui, -apple-system, sans-serif">
    Global AGI Governance Framework · Springer Nature 2026
  </text>

  <!-- 核心原则卡片 -->
  <g transform="translate(80, 100)">
    <rect width="320" height="140" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="160" y="28" text-anchor="middle" fill="#00ff88" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      ✨ 核心原则
    </text>
    <rect x="0" y="40" width="320" height="2" fill="#00ff88" opacity="0.5"/>
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 透明度</text>
      <text x="160" y="0" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 公平性</text>
      <text x="0" y="25" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 人权保障</text>
      <text x="160" y="25" fill="#ffffff" font-size="13" font-family="system-ui, -apple-system, sans-serif">● 伦理约束</text>
    </g>
  </g>

  <!-- 10 条戒律卡片 -->
  <g transform="translate(420, 100)">
    <rect width="380" height="140" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="190" y="28" text-anchor="middle" fill="#ffd700" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      📜 10 条戒律
    </text>
    <rect x="0" y="40" width="380" height="2" fill="#ffd700" opacity="0.5"/>
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">1. 安全性优先 · 2. 可控性保障</text>
      <text x="0" y="20" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">3. 透明度原则 · 4. 公平性保障</text>
      <text x="0" y="40" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">5. 隐私保护 · 6. 人权至上</text>
      <text x="0" y="60" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">7. 伦理约束 · 8. 风险预防</text>
      <text x="0" y="80" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">9. 国际合作 · 10. 持续改进</text>
    </g>
  </g>

  <!-- 13 点原则卡片 -->
  <g transform="translate(80, 260)">
    <rect width="320" height="250" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="160" y="28" text-anchor="middle" fill="#a855f7" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🤖 阿西莫夫现代版 13 点
    </text>
    <rect x="0" y="40" width="320" height="2" fill="#a855f7" opacity="0.5"/>
    <g transform="translate(20, 55)">
      <text x="0" y="0" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">人类安全绝对优先 · 人类福祉最大化</text>
      <text x="0" y="18" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">人类自主权保障 · 透明可解释性</text>
      <text x="0" y="36" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">公平包容性 · 隐私保护</text>
      <text x="0" y="54" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">伦理对齐 · 可控性</text>
      <text x="0" y="72" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">责任归属 · 可持续发展</text>
      <text x="0" y="90" fill="#ffffff" font-size="11" font-family="system-ui, -apple-system, sans-serif">国际合作 · 持续监控 · 灵活适应</text>
    </g>
  </g>

  <!-- 实施路径卡片 -->
  <g transform="translate(420, 260)">
    <rect width="380" height="250" rx="10" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="190" y="28" text-anchor="middle" fill="#3b82f6" font-size="18" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
      🚀 实施路径
    </text>
    <rect x="0" y="40" width="380" height="2" fill="#3b82f6" opacity="0.5"/>
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.8"/>
      <text x="45" y="15" fill="#ffffff" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段一</text>
      <text x="45" y="30" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">国际监督框架建立</text>
      
      <rect x="0" y="45" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.8"/>
      <text x="45" y="60" fill="#ffffff" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段二</text>
      <text x="45" y="75" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">安全标准制定实施</text>
      
      <rect x="0" y="90" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.8"/>
      <text x="45" y="105" fill="#ffffff" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段三</text>
      <text x="45" y="120" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">全球协调机制完善</text>
      
      <rect x="0" y="135" width="35" height="20" rx="4" fill="#3b82f6" opacity="0.8"/>
      <text x="45" y="150" fill="#ffffff" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">阶段四</text>
      <text x="45" y="165" fill="#888888" font-size="10" font-family="system-ui, -apple-system, sans-serif">持续监控与改进</text>
    </g>
  </g>

  <!-- 右下角统计卡片 -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="400" height="35" rx="6" fill="#16213e" opacity="0.8"/>
    <text x="200" y="22" text-anchor="middle" fill="#aaaaaa" font-size="12" font-family="system-ui, -apple-system, sans-serif">
      DOI: 10.1007/s43681-026-01020-7 · 访问量：125 · 平衡安全与繁荣
    </text>
  </g>

</svg>
