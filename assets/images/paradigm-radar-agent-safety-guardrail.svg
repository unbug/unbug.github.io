<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">AgentDoG 1.5 整体架构</text>

  <!-- Input Layer: Agent Trajectory -->
  <rect x="40" y="70" width="160" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Agent 执行轨迹</text>
  <line x1="60" y1="108" x2="180" y2="108" stroke="#93c5fd" stroke-width="1"/>
  <text x="70" y="124" font-size="11" fill="#334155">- 工具调用序列</text>
  <text x="70" y="140" font-size="11" fill="#334155">- 中间状态</text>
  <text x="70" y="156" font-size="11" fill="#334155">- 最终输出</text>

  <!-- Arrow from Input to Rationale -->
  <line x1="200" y1="120" x2="280" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Rationale-Enhanced Module -->
  <rect x="290" y="70" width="220" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">推理增强构建</text>
  <line x1="310" y1="108" x2="490" y2="108" stroke="#fde68a" stroke-width="1"/>
  <text x="310" y="124" font-size="11" fill="#334155">- 轨迹编码</text>
  <text x="310" y="140" font-size="11" fill="#334155">- 风险评估推理</text>
  <text x="310" y="156" font-size="11" fill="#334155">- 上下文依赖建模</text>

  <!-- Arrow from Rationale to Diagnosis -->
  <line x1="510" y1="120" x2="590" y2="120" stroke="#64748b" stroke-width="2"/>

  <!-- Trajectory-Level Diagnostic Engine -->
  <rect x="600" y="70" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">诊断引擎</text>
  <line x1="620" y1="108" x2="740" y2="108" stroke="#bbf7d0" stroke-width="1"/>
  <text x="620" y="124" font-size="11" fill="#334155">- 风险来源分类</text>
  <text x="620" y="140" font-size="11" fill="#334155">- 失败模式识别</text>
  <text x="620" y="156" font-size="11" fill="#334155">- 根因分析</text>

  <!-- Output Layer -->
  <rect x="290" y="210" width="220" height="80" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b21a8">安全评估输出</text>
  <line x1="310" y1="248" x2="490" y2="248" stroke="#e9d5ff" stroke-width="1"/>
  <text x="310" y="264" font-size="11" fill="#334155">- 风险等级 (HIGH/MEDIUM/LOW)</text>
  <text x="310" y="280" font-size="11" fill="#334155">- 细粒度风险标签</text>

  <!-- Arrow from Diagnosis to Output -->
  <line x1="680" y1="170" x2="680" y2="210" stroke="#64748b" stroke-width="2"/>
  <line x1="680" y1="210" x2="400" y2="210" stroke="#64748b" stroke-width="2"/>

  <!-- Deployment Modes -->
  <rect x="40" y="330" width="340" height="150" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">部署模式</text>

  <!-- Training-Free Online Guardrail -->
  <rect x="60" y="370" width="140" height="90" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="130" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">免训练在线护栏</text>
  <line x1="80" y1="406" x2="180" y2="406" stroke="#a7f3d0" stroke-width="1"/>
  <text x="80" y="422" font-size="10" fill="#334155">- 即插即用</text>
  <text x="80" y="436" font-size="10" fill="#334155">- 实时评估</text>
  <text x="80" y="450" font-size="10" fill="#334155">- 无需微调</text>

  <!-- SFT+RL Training -->
  <rect x="220" y="370" width="140" height="90" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">SFT + RL 训练</text>
  <line x1="240" y1="406" x2="340" y2="406" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="422" font-size="10" fill="#334155">- 高效训练环境</text>
  <text x="240" y="436" font-size="10" fill="#334155">- Docker开销/100</text>
  <text x="240" y="450" font-size="10" fill="#334155">- ~1000样本</text>

  <!-- Model Sizes -->
  <rect x="460" y="330" width="300" height="150" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">模型尺寸变体</text>

  <!-- 4B -->
  <rect x="480" y="370" width="80" height="90" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="520" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">4B</text>
  <line x1="490" y1="406" x2="550" y2="406" stroke="#fecaca" stroke-width="1"/>
  <text x="490" y="422" font-size="10" fill="#334155">边缘设备</text>
  <text x="490" y="436" font-size="10" fill="#334155">低延迟</text>
  <text x="490" y="450" font-size="10" fill="#334155">Qwen2.5-4B</text>

  <!-- 7B -->
  <rect x="580" y="370" width="80" height="90" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="620" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#a16207">7B</text>
  <line x1="590" y1="406" x2="650" y2="406" stroke="#fef08a" stroke-width="1"/>
  <text x="590" y="422" font-size="10" fill="#334155">最佳平衡</text>
  <text x="590" y="436" font-size="10" fill="#334155">GPT-5.4级</text>
  <text x="590" y="450" font-size="10" fill="#334155">Qwen2.5-7B</text>

  <!-- 8B -->
  <rect x="680" y="370" width="80" height="90" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">8B</text>
  <line x1="690" y1="406" x2="750" y2="406" stroke="#bbf7d0" stroke-width="1"/>
  <text x="690" y="422" font-size="10" fill="#334155">最高精度</text>
  <text x="690" y="436" font-size="10" fill="#334155">高合规场景</text>
  <text x="690" y="450" font-size="10" fill="#334155">Qwen2.5-8B</text>

  <!-- Arrows connecting layers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Connection arrows -->
  <line x1="200" y1="120" x2="290" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="510" y1="120" x2="600" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Bottom label -->
  <text x="400" y="500" text-anchor="middle" font-size="11" fill="#94a3b8">上海人工智能实验室 / AI45Lab | arXiv:2605.29801</text>
</svg>
