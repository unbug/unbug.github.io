<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="hiddenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="behaviorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f57c00;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" rx="8" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Hidden State vs Behavior: 预测能力对比 (AUC)</text>

  <!-- Chart area -->
  <rect x="80" y="50" width="700" height="300" rx="4" fill="#fafafa"/>

  <!-- Y axis labels and grid lines -->
  <text x="70" y="80" text-anchor="end" font-size="10" fill="#6c757d">1.0</text>
  <line x1="80" y1="78" x2="780" y2="78" stroke="#e9ecef" stroke-width="0.5"/>

  <text x="70" y="130" text-anchor="end" font-size="10" fill="#6c757d">0.8</text>
  <line x1="80" y1="128" x2="780" y2="128" stroke="#e9ecef" stroke-width="0.5"/>

  <text x="70" y="180" text-anchor="end" font-size="10" fill="#6c757d">0.6</text>
  <line x1="80" y1="178" x2="780" y2="178" stroke="#e9ecef" stroke-width="0.5"/>

  <text x="70" y="230" text-anchor="end" font-size="10" fill="#6c757d">0.4</text>
  <line x1="80" y1="228" x2="780" y2="228" stroke="#e9ecef" stroke-width="0.5"/>

  <text x="70" y="280" text-anchor="end" font-size="10" fill="#6c757d">0.2</text>
  <line x1="80" y1="278" x2="780" y2="278" stroke="#e9ecef" stroke-width="0.5"/>

  <!-- Random baseline -->
  <line x1="80" y1="300" x2="780" y2="300" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="790" y="303" font-size="9" fill="#adb5bd">Random (0.5)</text>

  <!-- X axis labels -->
  <text x="160" y="368" text-anchor="middle" font-size="10" fill="#495057">Round 1</text>
  <text x="280" y="368" text-anchor="middle" font-size="10" fill="#495057">Round 2</text>
  <text x="400" y="368" text-anchor="middle" font-size="10" fill="#495057">Round 3</text>
  <text x="520" y="368" text-anchor="middle" font-size="10" fill="#495057">Round 4</text>
  <text x="640" y="368" text-anchor="middle" font-size="10" fill="#495057">Round 5+</text>

  <!-- X axis line -->
  <line x1="80" y1="310" x2="780" y2="310" stroke="#adb5bd" stroke-width="1"/>

  <!-- Hidden State AUC curve (Qwen-2.5-7B) -->
  <!-- R1: ~0.92, R2: ~0.94, R3: ~0.96, R4: ~0.97, R5+: ~0.98 -->
  <polyline points="160,100 280,84 400,72 520,66 640,60" fill="none" stroke="#4a90d9" stroke-width="3"/>

  <!-- Hidden State area fill -->
  <polygon points="160,100 280,84 400,72 520,66 640,60 640,310 160,310" fill="url(#hiddenGrad)" opacity="0.3"/>

  <!-- Hidden State data points -->
  <circle cx="160" cy="100" r="5" fill="#4a90d9" stroke="#fff" stroke-width="2"/>
  <text x="160" y="92" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a90d9">0.92</text>

  <circle cx="280" cy="84" r="5" fill="#4a90d9" stroke="#fff" stroke-width="2"/>
  <text x="280" y="76" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a90d9">0.94</text>

  <circle cx="400" cy="72" r="5" fill="#4a90d9" stroke="#fff" stroke-width="2"/>
  <text x="400" y="64" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a90d9">0.96</text>

  <!-- Behavior AUC curve (Qwen-2.5-7B) -->
  <!-- R1: ~0.53, R2: ~0.62, R3: ~0.82, R4: ~0.90, R5+: ~0.93 -->
  <polyline points="160,290 280,262 400,178 520,130 640,106" fill="none" stroke="#f57c00" stroke-width="3"/>

  <!-- Behavior area fill -->
  <polygon points="160,290 280,262 400,178 520,130 640,106 640,310 160,310" fill="url(#behaviorGrad)" opacity="0.3"/>

  <!-- Behavior data points -->
  <circle cx="160" cy="290" r="5" fill="#f57c00" stroke="#fff" stroke-width="2"/>
  <text x="160" y="308" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57c00">0.53</text>

  <circle cx="280" cy="262" r="5" fill="#f57c00" stroke="#fff" stroke-width="2"/>
  <text x="280" y="280" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57c00">0.62</text>

  <circle cx="400" cy="178" r="5" fill="#f57c00" stroke="#fff" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57c00">0.82</text>

  <!-- Key insight annotation -->
  <rect x="300" y="380" width="260" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="430" y="398" text-anchor="middle" font-size="10" fill="#1565c0">Hidden State (R1) = Behavior (R3-R4): 提前 2-3 轮检测</text>

  <!-- Legend -->
  <rect x="600" y="58" width="18" height="3" rx="1" fill="#4a90d9"/>
  <text x="624" y="63" font-size="10" fill="#495057">Hidden State (Qwen-2.5-7B)</text>

  <rect x="600" y="78" width="18" height="3" rx="1" fill="#f57c00"/>
  <text x="624" y="83" font-size="10" fill="#495057">Behavior (Qwen-2.5-7B)</text>

</svg>