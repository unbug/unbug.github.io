<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0f172a" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="-apple-system, sans-serif">ePCA 架构总览</text>

  <!-- Agent Layer -->
  <g transform="translate(450, 90)">
    <rect x="-120" y="-30" width="240" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold" font-family="monospace">Agent 执行层</text>
    <text x="0" y="15" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">意图提取 + 操作请求</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="120" x2="450" y2="160" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="445,155 450,165 455,155" fill="#3b82f6"/>

  <!-- Intent Formalization Layer -->
  <g transform="translate(450, 200)">
    <rect x="-160" y="-35" width="320" height="70" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold" font-family="monospace">意图形式化层</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">一阶逻辑公式生成 (FOL)</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="235" x2="450" y2="270" stroke="#06b6d4" stroke-width="2"/>
  <polygon points="445,265 450,275 455,265" fill="#06b6d4"/>

  <!-- SMT Verification Layer -->
  <g transform="translate(450, 310)">
    <rect x="-180" y="-40" width="360" height="80" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold" font-family="monospace">SMT 求解器验证层 (Z3)</text>
    <text x="0" y="8" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="monospace">SAT/UNSAT 判定</text>
    <text x="-140" y="25" text-anchor="start" fill="#94a3b8" font-size="10" font-family="monospace">意图公式 + 安全约束</text>
    <text x="140" y="25" text-anchor="end" fill="#94a3b8" font-size="10" font-family="monospace">确定性验证结果</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="350" x2="450" y2="390" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="445,385 450,395 455,385" fill="#a78bfa"/>

  <!-- Decision Layer -->
  <g transform="translate(450, 430)">
    <rect x="-120" y="-25" width="240" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold" font-family="monospace">决策输出</text>
  </g>

  <!-- ALLOW branch (left) -->
  <line x1="330" y1="430" x2="200" y2="430" stroke="#10b981" stroke-width="2"/>
  <rect x="120" y="415" width="60" height="30" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="150" y="435" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold" font-family="monospace">ALLOW</text>

  <!-- DENY branch (right) -->
  <line x1="570" y1="430" x2="700" y2="430" stroke="#ef4444" stroke-width="2"/>
  <rect x="680" y="415" width="60" height="30" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="710" y="435" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold" font-family="monospace">DENY</text>

  <!-- Side annotation: Security Constraints -->
  <g transform="translate(780, 260)">
    <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold" font-family="monospace">安全约束</text>
    <text x="0" y="8" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">公理库</text>
  </g>

  <!-- Arrow from constraints to SMT -->
  <line x1="730" y1="260" x2="630" y2="310" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Side annotation: Latency -->
  <g transform="translate(120, 260)">
    <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="bold" font-family="monospace">核心延迟</text>
    <text x="0" y="8" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="bold" font-family="monospace">0.44ms</text>
  </g>

  <!-- Arrow from latency to SMT -->
  <line x1="170" y1="260" x2="270" y2="310" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
