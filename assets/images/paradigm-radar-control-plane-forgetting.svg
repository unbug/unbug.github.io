<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .box { stroke-width: 2; rx: 5; ry: 5; }
      .arrow { stroke: #999; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">Agent 记忆遗忘架构：控制面放置决定遗忘能力</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">三种放置范式对比（Recall Plane vs Control Plane）</text>
  
  <!-- No-Deletion System -->
  <rect x="30" y="80" width="220" height="180" fill="#ffebee" stroke="#e57373" class="box"/>
  <text x="140" y="110" class="label" text-anchor="middle" font-weight="bold">No-Deletion 系统</text>
  <text x="140" y="130" class="label" text-anchor="middle">(如 Mem0)</text>
  
  <!-- Recall Plane -->
  <rect x="50" y="145" width="180" height="60" fill="#fff" stroke="#999" rx="3"/>
  <text x="140" y="165" class="label" text-anchor="middle">Recall Plane</text>
  <text x="140" y="180" class="label" text-anchor="middle">(记忆检索)</text>
  
  <!-- No deletion path -->
  <line x1="140" y1="205" x2="140" y2="230" stroke="#e57373" stroke-width="2"/>
  <text x="140" y="245" class="label" text-anchor="middle" fill="#e57373">无删除路径</text>
  
  <!-- Deterministic Primitives -->
  <rect x="290" y="80" width="220" height="180" fill="#fff3e0" stroke="#ffb74d" class="box"/>
  <text x="400" y="110" class="label" text-anchor="middle" font-weight="bold">Deterministic Primitives</text>
  <text x="400" y="130" class="label" text-anchor="middle">(规则驱动删除)</text>
  
  <!-- Recall Plane -->
  <rect x="310" y="145" width="180" height="60" fill="#fff" stroke="#999" rx="3"/>
  <text x="400" y="165" class="label" text-anchor="middle">Recall Plane</text>
  <text x="400" y="180" class="label" text-anchor="middle">(记忆检索)</text>
  
  <!-- Deterministic deletion -->
  <line x1="400" y1="205" x2="400" y2="230" stroke="#ffb74d" stroke-width="2"/>
  <rect x="330" y="235" width="140" height="20" fill="#fff3e0" stroke="#ffb74d" rx="3"/>
  <text x="400" y="249" class="label" text-anchor="middle">时间/关键词规则</text>
  
  <!-- LLM Hook -->
  <rect x="550" y="80" width="220" height="180" fill="#e8f5e9" stroke="#81c784" class="box"/>
  <text x="660" y="110" class="label" text-anchor="middle" font-weight="bold">LLM Hook</text>
  <text x="660" y="130" class="label" text-anchor="middle">(推理驱动删除)</text>
  
  <!-- Recall Plane -->
  <rect x="570" y="145" width="180" height="60" fill="#fff" stroke="#999" rx="3"/>
  <text x="660" y="165" class="label" text-anchor="middle">Recall Plane</text>
  <text x="660" y="180" class="label" text-anchor="middle">(记忆检索)</text>
  
  <!-- LLM Hook -->
  <line x1="660" y1="205" x2="660" y2="230" stroke="#81c784" stroke-width="2"/>
  <rect x="590" y="235" width="140" height="20" fill="#e8f5e9" stroke="#81c784" rx="3"/>
  <text x="660" y="249" class="label" text-anchor="middle">LLM 推理判断</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="300" width="740" height="180" fill="#fff" stroke="#ccc" rx="5"/>
  <text x="400" y="325" class="label" text-anchor="middle" font-weight="bold">三种范式对比</text>
  
  <!-- Table headers -->
  <line x1="30" y1="340" x2="770" y2="340" stroke="#ccc"/>
  <text x="80" y="355" class="label" font-weight="bold">范式</text>
  <text x="250" y="355" class="label" font-weight="bold">遗忘能力</text>
  <text x="450" y="355" class="label" font-weight="bold">语义理解</text>
  <text x="650" y="355" class="label" font-weight="bold">适用场景</text>
  
  <!-- Row 1 -->
  <line x1="30" y1="370" x2="770" y2="370" stroke="#eee"/>
  <text x="80" y="385" class="label">No-Deletion</text>
  <text x="250" y="385" class="label" fill="#e57373">无</text>
  <text x="450" y="385" class="label">N/A</text>
  <text x="650" y="385" class="label">简单缓存</text>
  
  <!-- Row 2 -->
  <line x1="30" y1="400" x2="770" y2="400" stroke="#eee"/>
  <text x="80" y="415" class="label">Deterministic</text>
  <text x="250" y="415" class="label" fill="#ffb74d">有限</text>
  <text x="450" y="415" class="label">低（规则匹配）</text>
  <text x="650" y="415" class="label">结构化数据</text>
  
  <!-- Row 3 -->
  <line x1="30" y1="430" x2="770" y2="430" stroke="#eee"/>
  <text x="80" y="445" class="label">LLM Hook</text>
  <text x="250" y="445" class="label" fill="#81c784">高（语义判断）</text>
  <text x="450" y="445" class="label">高（上下文理解）</text>
  <text x="650" y="445" class="label">复杂记忆系统</text>
  
  <!-- Key insight -->
  <rect x="30" y="470" width="740" height="25" fill="#e3f2fd" stroke="#90caf9" rx="3"/>
  <text x="400" y="486" class="label" text-anchor="middle">核心发现：遗忘能力由 LLM 在 pipeline 中的放置位置决定，而非存储方案本身</text>
</svg>
