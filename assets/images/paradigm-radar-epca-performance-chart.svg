<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#0f172a" rx="8"/>
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="-apple-system, sans-serif">性能对比数据图</text>

  <!-- Chart area -->
  <g transform="translate(120, 70)">
    <!-- Y axis labels and grid lines -->
    <line x1="60" y1="350" x2="700" y2="350" stroke="#334155" stroke-width="1"/>
    <text x="50" y="354" text-anchor="end" fill="#94a3b8" font-size="11" font-family="monospace">0%</text>

    <line x1="60" y1="275" x2="700" y2="275" stroke="#1e293b" stroke-width="0.5"/>
    <text x="50" y="279" text-anchor="end" fill="#94a3b8" font-size="11" font-family="monospace">10%</text>

    <line x1="60" y1="200" x2="700" y2="200" stroke="#1e293b" stroke-width="0.5"/>
    <text x="50" y="204" text-anchor="end" fill="#94a3b8" font-size="11" font-family="monospace">20%</text>

    <line x1="60" y1="125" x2="700" y2="125" stroke="#1e293b" stroke-width="0.5"/>
    <text x="50" y="129" text-anchor="end" fill="#94a3b8" font-size="11" font-family="monospace">30%</text>

    <line x1="60" y1="50" x2="700" y2="50" stroke="#1e293b" stroke-width="0.5"/>
    <text x="50" y="54" text-anchor="end" fill="#94a3b8" font-size="11" font-family="monospace">40%</text>

    <!-- Y axis -->
    <line x1="60" y1="50" x2="60" y2="350" stroke="#475569" stroke-width="1.5"/>

    <!-- X axis -->
    <line x1="60" y1="350" x2="700" y2="350" stroke="#475569" stroke-width="1.5"/>

    <!-- Group 1: ASR (Attack Success Rate) -->
    <g transform="translate(180, 0)">
      <!-- Traditional Semantic Guardrail bar -->
      <rect x="-30" y="125" width="40" height="225" rx="3" fill="#ef4444" opacity="0.7"/>
      <text x="-10" y="118" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold" font-family="monospace">25%</text>

      <!-- ePCA bar -->
      <rect x="30" y="345" width="40" height="5" rx="3" fill="#10b981"/>
      <text x="50" y="340" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold" font-family="monospace">0%</text>

      <!-- Label -->
      <text x="10" y="375" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold" font-family="sans-serif">ASR</text>
    </g>

    <!-- Group 2: FPR (False Positive Rate) -->
    <g transform="translate(360, 0)">
      <!-- Traditional Semantic Guardrail bar -->
      <rect x="-30" y="310" width="40" height="40" rx="3" fill="#ef4444" opacity="0.7"/>
      <text x="-10" y="305" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold" font-family="monospace">5%</text>

      <!-- ePCA bar -->
      <rect x="30" y="345" width="40" height="5" rx="3" fill="#10b981"/>
      <text x="50" y="340" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold" font-family="monospace">0%</text>

      <!-- Label -->
      <text x="10" y="375" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold" font-family="sans-serif">FPR</text>
    </g>

    <!-- Group 3: Latency (ms) -->
    <g transform="translate(540, 0)">
      <!-- Traditional Semantic Guardrail bar (~2-8ms, showing ~5ms equivalent as percentage) -->
      <rect x="-30" y="260" width="40" height="90" rx="3" fill="#f59e0b" opacity="0.7"/>
      <text x="-10" y="255" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="bold" font-family="monospace">~5ms</text>

      <!-- ePCA bar (0.44ms) -->
      <rect x="30" y="328" width="40" height="22" rx="3" fill="#a78bfa"/>
      <text x="50" y="323" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold" font-family="monospace">0.44ms</text>

      <!-- Label -->
      <text x="10" y="375" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold" font-family="sans-serif">延迟</text>
    </g>

    <!-- Legend -->
    <g transform="translate(180, 410)">
      <rect x="-60" y="-15" width="16" height="12" rx="2" fill="#ef4444" opacity="0.7"/>
      <text x="-38" y="-4" text-anchor="start" fill="#94a3b8" font-size="11" font-family="sans-serif">传统语义护栏</text>

      <rect x="60" y="-15" width="16" height="12" rx="2" fill="#10b981"/>
      <text x="82" y="-4" text-anchor="start" fill="#94a3b8" font-size="11" font-family="sans-serif">ePCA</text>

      <rect x="200" y="-15" width="16" height="12" rx="2" fill="#f59e0b" opacity="0.7"/>
      <text x="222" y="-4" text-anchor="start" fill="#94a3b8" font-size="11" font-family="sans-serif">延迟 (ms)</text>
    </g>

    <!-- Source annotation -->
    <text x="350" y="445" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">数据来源: arXiv:2605.29251, USTC</text>
  </g>

  <!-- Key insight box -->
  <g transform="translate(450, 480)">
    <rect x="-380" y="-14" width="760" height="28" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="sans-serif">ePCA 将 ASR 和 FPR 同时降至零，同时将核心验证延迟控制在 0.44ms</text>
  </g>
</svg>
