<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">iGRPO: AI Self-Feedback</text>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Iterative Self-Improvement for Math Reasoning</text>
  
  <!-- Stage 1: Exploration -->
  <g transform="translate(100, 150)">
    <!-- Box -->
    <rect x="0" y="0" width="250" height="160" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="3"/>
    <!-- Title -->
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#a78bfa" text-anchor="middle">Stage 1: Exploration</text>
    <!-- Candidate solutions -->
    <circle cx="50" cy="80" r="18" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="50" y="86" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">1</text>
    
    <circle cx="100" cy="70" r="18" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="100" y="76" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">2</text>
    
    <circle cx="150" cy="80" r="18" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="150" y="86" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">3</text>
    
    <circle cx="200" cy="70" r="18" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="200" y="76" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">4</text>
    
    <!-- Selected best -->
    <circle cx="125" cy="130" r="22" fill="url(#grad1)" filter="url(#glow)"/>
    <text x="125" y="136" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">★</text>
    <text x="125" y="162" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Best</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(380, 220)">
    <rect x="0" y="0" width="60" height="12" rx="6" fill="#475569"/>
    <polygon points="60,-8 80,6 60,20" fill="#475569"/>
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Condition</text>
  </g>
  
  <!-- Stage 2: Improvement -->
  <g transform="translate(450, 150)">
    <!-- Box -->
    <rect x="0" y="0" width="250" height="160" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="3"/>
    <!-- Title -->
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22d3ee" text-anchor="middle">Stage 2: Improvement</text>
    <!-- Brain/thinking icon -->
    <circle cx="125" cy="95" r="35" fill="#0f172a" stroke="#06b6d4" stroke-width="3"/>
    <!-- Neural connections -->
    <line x1="90" y1="95" x2="70" y2="75" stroke="#06b6d4" stroke-width="2"/>
    <line x1="90" y1="95" x2="70" y2="115" stroke="#06b6d4" stroke-width="2"/>
    <line x1="160" y1="95" x2="180" y2="75" stroke="#06b6d4" stroke-width="2"/>
    <line x1="160" y1="95" x2="180" y2="115" stroke="#06b6d4" stroke-width="2"/>
    <line x1="125" y1="60" x2="125" y2="40" stroke="#06b6d4" stroke-width="2"/>
    <line x1="125" y1="130" x2="125" y2="150" stroke="#06b6d4" stroke-width="2"/>
    
    <!-- Improved result -->
    <text x="125" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4ade80" text-anchor="middle">↑ Better Than Before</text>
  </g>
  
  <!-- Results at bottom -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="600" height="70" rx="10" fill="#1e293b"/>
    <text x="300" y="28" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Results: OpenReasoning-Nemotron-7B + iGRPO</text>
    <g transform="translate(100, 40)">
      <rect x="0" y="0" width="150" height="25" rx="5" fill="#7c3aed"/>
      <text x="75" y="18" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">AIME24: 85.62%</text>
    </g>
    <g transform="translate(350, 40)">
      <rect x="0" y="0" width="150" height="25" rx="5" fill="#06b6d4"/>
      <text x="75" y="18" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">AIME25: 79.64%</text>
    </g>
  </g>
</svg>
